<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      padding: 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .subtitle { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* ── 状态栏 ── */
    .status-bar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      border-bottom: 1px solid #334155;
    }
    .status-bar.connected   { background: #052e16; }
    .status-bar.disconnected { background: #1a2744; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.red   { background: #ef4444; }
    .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .section { padding: 16px; }

    .label {
      font-size: 11px; font-weight: 600;
      color: #64748b; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%; padding: 8px 12px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6366f1; }
    input[type="text"]::placeholder { color: #475569; }

    .btn {
      width: 100%; padding: 9px 16px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger  { background: #ef4444; color: white; }
    .btn-danger:hover  { background: #dc2626; }
    .btn-ghost {
      background: transparent; color: #64748b;
      border: 1px solid #334155; margin-top: 6px;
    }
    .btn-ghost:hover { color: #94a3b8; border-color: #475569; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 就绪卡片 ── */
    .ready-card {
      background: #052e16;
      border: 1px solid #22c55e44;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .ready-card .icon { font-size: 28px; margin-bottom: 8px; }
    .ready-card .title { font-size: 14px; font-weight: 600; color: #4ade80; margin-bottom: 4px; }
    .ready-card .desc  { font-size: 12px; color: #86efac; line-height: 1.6; }

    /* ── 授权请求卡片 ── */
    .request-card {
      background: #1e293b; border: 1px solid #f59e0b44;
      border-radius: 12px; padding: 14px; margin-bottom: 12px;
    }
    .request-card .title { font-size: 13px; font-weight: 600; color: #fbbf24; margin-bottom: 6px; }
    .url-box {
      font-size: 11px; color: #94a3b8; word-break: break-all;
      font-family: monospace; background: #0f172a;
      padding: 6px 8px; border-radius: 6px; margin-bottom: 6px;
    }
    .reason-text { font-size: 12px; color: #cbd5e1; }

    /* ── 抓取中卡片 ── */
    .grab-card {
      background: #1e293b; border: 1px solid #3b82f644;
      border-radius: 12px; padding: 14px; margin-bottom: 12px;
    }
    .grab-card .title { font-size: 13px; font-weight: 600; color: #60a5fa; margin-bottom: 8px; }
    .steps { font-size: 12px; color: #94a3b8; line-height: 1.9; margin-bottom: 8px; }
    .steps span { color: #e2e8f0; }

    .divider { height: 1px; background: #1e293b; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🍪</div>
  <div>
    <h1>Cookie Bridge</h1>
    <div class="subtitle">安全的开发者 Cookie 工具</div>
  </div>
</div>

<!-- 状态栏 -->
<div class="status-bar disconnected" id="status-bar">
  <div class="dot red" id="ws-dot"></div>
  <span id="ws-status-text">未连接</span>
</div>

<!-- 【未连接】配置区域 -->
<div class="section" id="connect-section">
  <div class="label">WebSocket 服务器地址</div>
  <input type="text" id="ws-url"
    placeholder="wss://workspacej9jjy0b2zdgg0ebafo-8081.gz.cloudide.woa.com" />
  <button class="btn btn-primary" id="btn-connect">连接</button>
</div>

<div class="divider"></div>

<!-- 主体内容区 -->
<div class="section" id="main-content">

  <!-- 【已连接·空闲】就绪状态 -->
  <div id="idle-state" class="hidden">
    <div class="ready-card">
      <div class="icon">✅</div>
      <div class="title">已就绪，等待请求</div>
      <div class="desc">
        当 AI 需要某个网站的登录态时，<br>
        这里会弹出授权提示，由你决定是否同意。<br>
        <br>
        无任何请求时，插件静默待机。
      </div>
    </div>
    <button class="btn btn-ghost" id="btn-disconnect">断开连接</button>
  </div>

  <!-- 【已连接·待授权】请求弹窗 -->
  <div id="request-state" class="hidden">
    <div class="request-card">
      <div class="title">⚠️ 收到 Cookie 授权请求</div>
      <div class="label" style="margin-bottom:4px">目标网站</div>
      <div class="url-box" id="req-url"></div>
      <div class="reason-text" id="req-reason"></div>
    </div>
    <button class="btn btn-success" id="btn-approve">✅ 同意 — 打开目标网站</button>
    <button class="btn btn-danger"  id="btn-deny">❌ 拒绝</button>
  </div>

  <!-- 【已连接·抓取中】等待登录 -->
  <div id="grab-state" class="hidden">
    <div class="grab-card">
      <div class="title">🔵 等待你在目标网站登录</div>
      <div class="steps">
        <div>1. <span>在已打开的标签页中完成登录</span></div>
        <div>2. <span>返回此处，点击下方按钮提交</span></div>
      </div>
      <div class="url-box" id="grab-url"></div>
    </div>
    <button class="btn btn-success" id="btn-submit">🚀 已登录，提交 Cookie</button>
    <button class="btn btn-danger"  id="btn-cancel">取消</button>
  </div>

  <!-- 【未连接·提示】 -->
  <div id="not-connected-state">
    <div style="text-align:center;padding:20px 0;color:#475569;font-size:13px">
      <div style="font-size:28px;margin-bottom:8px">🔌</div>
      <div>请先连接到服务器</div>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
