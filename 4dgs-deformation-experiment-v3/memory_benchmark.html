<script>
const logEl = document.getElementById('log');
const progressBar = document.getElementById('progress-bar');
const results = {};

function log(msg, cls = '') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct) {
  progressBar.style.width = pct + '%';
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

function disableButtons(disable) {
  document.getElementById('btn-v3b').disabled = disable;
  document.getElementById('btn-v3c').disabled = disable;
  document.getElementById('btn-both').disabled = disable;
}

async function decompressGzip(buf) {
  const ds = new DecompressionStream('gzip');
  const blob = new Blob([buf]);
  const stream = blob.stream().pipeThrough(ds);
  return await new Response(stream).blob().then(b => b.arrayBuffer());
}

function float16ToFloat32(u16arr) {
  const f32 = new Float32Array(u16arr.length);
  for (let i = 0; i < u16arr.length; i++) {
    const h = u16arr[i];
    const sign = (h >> 15) & 0x1;
    const exp = (h >> 10) & 0x1f;
    const mant = h & 0x3ff;
    if (exp === 0) {
      f32[i] = mant === 0 ? (sign ? -0 : 0) : (sign ? -1 : 1) * Math.pow(2, -14) * (mant / 1024);
    } else if (exp === 31) {
      f32[i] = mant === 0 ? (sign ? -Infinity : Infinity) : NaN;
    } else {
      f32[i] = (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + mant / 1024);
    }
  }
  return f32;
}

function getJSHeap() {
  if (performance.memory) {
    return {
      used: performance.memory.usedJSHeapSize,
      total: performance.memory.totalJSHeapSize,
      limit: performance.memory.jsHeapSizeLimit,
    };
  }
  return null;
}

function logHeap(label) {
  const h = getJSHeap();
  if (h) {
    log(`  [Heap] ${label}: used=${formatBytes(h.used)} total=${formatBytes(h.total)}`, 'dim');
    return h.used;
  }
  return null;
}

// ============================================================
// V3b: С╝ўтїќтЅ?Рђ?Т»ЈтИДтГ?float32 + uint8
// ============================================================
async function benchmarkV3b(dataDir) {
  log('');
  log('========================================', 'highlight');
  log('  V3b Benchmark (С╝ўтїќтЅ? float32 + uint8)', 'highlight');
  log('========================================', 'highlight');

  const memSnapshots = {};

  // Force GC if available
  if (window.gc) { window.gc(); await new Promise(r => setTimeout(r, 200)); }
  memSnapshots.baseline = logHeap('Baseline (GCтљ?');

  // Load manifest
  log('  тіаУйй manifest...');
  const manifestResp = await fetch(dataDir + '/manifest.json);
  const manifest = await manifestResp.json();
  const N = manifest.dynamic_gaussians;
  const numFrames = manifest.p_frame_count;
  log(`  N=${N.toLocaleString()} тіеТђЂжФўТќ? ${numFrames} тИД`);

  // Download bundle
  log('  СИІУйй bundle...');
  setProgress(10);
  const resp = await fetch(dataDir + '/' + manifest.p_frame_bundle + ');
  const compressedBuf = await resp.arrayBuffer();
  log(`  Bundle СИІУййт«їТѕљ: ${formatBytes(compressedBuf.byteLength)}`);
  memSnapshots.afterDownload = logHeap('СИІУййтљ?);
  setProgress(25);

  // Decompress
  log('  gzip УДБтјІ...');
  const raw = await decompressGzip(compressedBuf);
  log(`  УДБтјІт«їТѕљ: ${formatBytes(raw.byteLength)}`);
  memSnapshots.afterDecompress = logHeap('УДБтјІтљ?(compressed+raw тЁ▒тГў)');
  setProgress(40);

  // Parse headers
  const rawView = new DataView(raw);
  const rawBytes = new Uint8Array(raw);
  let pos = 28;
  const frameTable = [];
  const numFramesParsed = rawView.getUint32(8, true);
  const numGaussians = rawView.getUint32(12, true);
  for (let i = 0; i < numFramesParsed; i++) {
    frameTable.push({
      srcIdx: rawView.getUint32(pos, true),
      dataOffset: rawView.getUint32(pos + 4, true),
      flag: rawView.getUint32(pos + 8, true),
    });
    pos += 12;
  }

  // Parse quant params
  const dcMin = [rawView.getFloat32(pos, true), rawView.getFloat32(pos+4, true), rawView.getFloat32(pos+8, true)];
  const dcMax = [rawView.getFloat32(pos+12, true), rawView.getFloat32(pos+16, true), rawView.getFloat32(pos+20, true)];
  const opMin = rawView.getFloat32(pos+24, true);
  const opMax = rawView.getFloat32(pos+28, true);
  const xyzDMin = [rawView.getFloat32(pos+32, true), rawView.getFloat32(pos+36, true), rawView.getFloat32(pos+40, true)];
  const xyzDMax = [rawView.getFloat32(pos+44, true), rawView.getFloat32(pos+48, true), rawView.getFloat32(pos+52, true)];
  pos += 56;
  const xyzDScale = [(xyzDMax[0]-xyzDMin[0])/255, (xyzDMax[1]-xyzDMin[1])/255, (xyzDMax[2]-xyzDMin[2])/255];

  // Parse SPZ baseline
  const spzBaselineSize = rawView.getUint32(pos, true);
  pos += 4;
  const spzXyz16 = new Uint16Array(raw, pos, numGaussians * 3);
  const spzBaselineXyz = float16ToFloat32(spzXyz16);
  pos += spzBaselineSize;

  const dataStart = pos;
  const xyzBytesBase = N * 3 * 2;
  const xyzBytesInt8 = N * 3;
  const dcBytes = N * 3;

  // Decode all frames Рђ?V3b style (float32 + uint8)
  log('  т╝ђтДІУДБуа?(V3b: Т»ЈтИДтГ?float32 + uint8)...');
  const decodedFrames = [];
  let prevXyz = null, prevDcQ = null, prevOpQ = null;
  let baseXyz = null, baseDcQ = null, baseOpQ = null;
  let totalAllocatedBytes = 0;
  const t0 = performance.now();

  for (let fi = 0; fi < numFramesParsed; fi++) {
    const ft = frameTable[fi];
    let fStart = dataStart + ft.dataOffset;
    const isBaseFrame = ft.flag === 1;
    const isRefresh = ft.flag === 2;

    let fXyzDelta;
    if (isBaseFrame) {
      const fXyz16 = new Uint16Array(raw, fStart, N * 3);
      fXyzDelta = float16ToFloat32(fXyz16);
      fStart += xyzBytesBase;
    } else {
      const fXyzI8 = new Int8Array(raw, fStart, N * 3);
      fXyzDelta = new Float32Array(N * 3);
      for (let c = 0; c < 3; c++) {
        for (let i = 0; i < N; i++) {
          fXyzDelta[i*3+c] = (fXyzI8[i*3+c]+128)*xyzDScale[c]+xyzDMin[c];
        }
      }
      fStart += xyzBytesInt8;
    }

    const frame = {
      xyz: new Float32Array(N * 3),
      shs_dc: new Float32Array(N * 3),
      opacity: new Float32Array(N),
      dcQ: new Uint8Array(N * 3),
      opQ: new Uint8Array(N),
    };

    // Track allocated bytes per frame
    const frameBytes = frame.xyz.byteLength + frame.shs_dc.byteLength + frame.opacity.byteLength
                     + frame.dcQ.byteLength + frame.opQ.byteLength;
    totalAllocatedBytes += frameBytes;

    if (isBaseFrame) {
      const fDcU8 = new Uint8Array(raw, fStart, N * 3); fStart += dcBytes;
      const fOpU8 = new Uint8Array(raw, fStart, N);
      for (let i = 0; i < N*3; i++) frame.xyz[i] = spzBaselineXyz[i] + fXyzDelta[i];
      frame.dcQ.set(fDcU8);
      frame.opQ.set(fOpU8);
      for (let c = 0; c < 3; c++) {
        const s = (dcMax[c]-dcMin[c])/255;
        for (let i = 0; i < N; i++) frame.shs_dc[i*3+c] = fDcU8[i*3+c]*s+dcMin[c];
      }
      { const s = (opMax-opMin)/255; for (let i = 0; i < N; i++) frame.opacity[i] = fOpU8[i]*s+opMin; }
      baseXyz = frame.xyz; baseDcQ = frame.dcQ; baseOpQ = frame.opQ;
    } else {
      const refXyz = isRefresh ? baseXyz : prevXyz;
      const refDcQ = isRefresh ? baseDcQ : prevDcQ;
      const refOpQ = isRefresh ? baseOpQ : prevOpQ;
      const fDcDelta = new Int8Array(raw, fStart, N*3); fStart += dcBytes;
      const fOpDelta = new Int8Array(raw, fStart, N);
      for (let i = 0; i < N*3; i++) frame.xyz[i] = refXyz[i] + fXyzDelta[i];
      for (let i = 0; i < N*3; i++) { let q = refDcQ[i]+fDcDelta[i]; frame.dcQ[i] = q<0?0:(q>255?255:q); }
      for (let c = 0; c < 3; c++) { const s = (dcMax[c]-dcMin[c])/255; for (let i = 0; i < N; i++) frame.shs_dc[i*3+c]=frame.dcQ[i*3+c]*s+dcMin[c]; }
      for (let i = 0; i < N; i++) { let q = refOpQ[i]+fOpDelta[i]; frame.opQ[i] = q<0?0:(q>255?255:q); }
      { const s = (opMax-opMin)/255; for (let i = 0; i < N; i++) frame.opacity[i]=frame.opQ[i]*s+opMin; }
    }

    decodedFrames[fi] = frame;
    prevXyz = frame.xyz; prevDcQ = frame.dcQ; prevOpQ = frame.opQ;

    if (fi % 50 === 0 || fi === numFramesParsed - 1) {
      setProgress(40 + Math.round(fi/numFramesParsed * 55));
      await new Promise(r => setTimeout(r, 0));
    }
  }

  const decodeTime = ((performance.now() - t0) / 1000).toFixed(2);
  memSnapshots.afterDecode = logHeap('УДБуаЂт«їТѕљ (ТЅђТюЅтИД + raw)');
  setProgress(98);

  // Calculate per-frame breakdown
  const perFrameFloat32 = (N * 3 * 4) + (N * 3 * 4) + (N * 4); // xyz + shs_dc + opacity
  const perFrameUint8 = (N * 3) + N; // dcQ + opQ
  const perFrameTotal = perFrameFloat32 + perFrameUint8;

  log('');
  log('--- V3b т«ъТхІу╗ЊТъю ---', 'warn');
  log(`  УДБуаЂУђЌТЌХ: ${decodeTime}s`);
  log(`  тИДТЋ░: ${numFramesParsed}`);
  log(`  Т»ЈтИД TypedArray тѕєжЁЇ:`, 'highlight');
  log(`    xyz (Float32Array):     ${formatBytes(N * 3 * 4)}`);
  log(`    shs_dc (Float32Array):  ${formatBytes(N * 3 * 4)}`);
  log(`    opacity (Float32Array): ${formatBytes(N * 4)}`);
  log(`    dcQ (Uint8Array):       ${formatBytes(N * 3)}`);
  log(`    opQ (Uint8Array):       ${formatBytes(N)}`);
  log(`    РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ`);
  log(`    Т»ЈтИДт░ЈУ«А:               ${formatBytes(perFrameTotal)} (${(perFrameTotal/1024/1024).toFixed(3)} MB)`);
  log('');
  log(`  тЁежЃетИДТЋ░ТЇ?(${numFramesParsed} тИ?:`, 'highlight');
  log(`    TypedArray Тђ╗жЄЈ:        ${formatBytes(totalAllocatedBytes)}`, 'warn');
  log(`    тЁХСИГ float32 жЃетѕє:      ${formatBytes(perFrameFloat32 * numFramesParsed)}`);
  log(`    тЁХСИГ uint8 жЃетѕє:        ${formatBytes(perFrameUint8 * numFramesParsed)}`);
  log(`  raw buffer (УДБтјІТЋ░ТЇ«):    ${formatBytes(raw.byteLength)}`);
  log(`  spzBaselineXyz:           ${formatBytes(spzBaselineXyz.byteLength)}`);
  log('');

  const totalDataMem = totalAllocatedBytes + raw.byteLength + spzBaselineXyz.byteLength;
  log(`  ­ЪЊі ТаИт┐ЃТЋ░ТЇ«тєЁтГўТђ╗жЄЈ:      ${formatBytes(totalDataMem)}`, 'highlight');

  results.v3b = {
    perFrameBytes: perFrameTotal,
    totalFrameDataBytes: totalAllocatedBytes,
    rawBufferBytes: raw.byteLength,
    baselineXyzBytes: spzBaselineXyz.byteLength,
    totalDataMem,
    decodeTime: parseFloat(decodeTime),
    numFrames: numFramesParsed,
    numGaussians: N,
    heapUsed: memSnapshots.afterDecode,
    heapBaseline: memSnapshots.baseline,
  };

  // Cleanup
  decodedFrames.length = 0;
  setProgress(100);
  log('  Рю?V3b ТхІУ»Ћт«їТѕљ\n', 'good');
}

// ============================================================
// V3c: С╝ўтїќтљ?Рђ?Т»ЈтИДтЈфтГў uint8
// ============================================================
async function benchmarkV3c(dataDir) {
  log('');
  log('========================================', 'highlight');
  log('  V3c Benchmark (С╝ўтїќтљ? uint8 only)', 'highlight');
  log('========================================', 'highlight');

  const memSnapshots = {};

  if (window.gc) { window.gc(); await new Promise(r => setTimeout(r, 200)); }
  memSnapshots.baseline = logHeap('Baseline (GCтљ?');

  log('  тіаУйй manifest...');
  const manifestResp = await fetch(dataDir + '/manifest.json);
  const manifest = await manifestResp.json();
  const N = manifest.dynamic_gaussians;
  const numFrames = manifest.p_frame_count;
  log(`  N=${N.toLocaleString()} тіеТђЂжФўТќ? ${numFrames} тИД`);

  log('  СИІУйй bundle...');
  setProgress(10);
  const resp = await fetch(dataDir + '/' + manifest.p_frame_bundle + ');
  let compressedBuf = new Uint8Array(await resp.arrayBuffer());
  log(`  Bundle СИІУййт«їТѕљ: ${formatBytes(compressedBuf.byteLength)}`);
  memSnapshots.afterDownload = logHeap('СИІУййтљ?);
  setProgress(25);

  log('  gzip УДБтјІ...');
  const raw = await decompressGzip(compressedBuf.buffer);
  compressedBuf = null; // V3c: уФІтЇ│жЄіТћЙ
  log(`  УДБтјІт«їТѕљ: ${formatBytes(raw.byteLength)} (compressedBuf ти▓жЄіТћ?`);
  memSnapshots.afterDecompress = logHeap('УДБтјІтљ?(compressedBuf ти▓жЄіТћ?');
  setProgress(40);

  const rawView = new DataView(raw);
  const rawBytes = new Uint8Array(raw);
  let pos = 28;
  const frameTable = [];
  const numFramesParsed = rawView.getUint32(8, true);
  const numGaussians = rawView.getUint32(12, true);
  for (let i = 0; i < numFramesParsed; i++) {
    frameTable.push({
      srcIdx: rawView.getUint32(pos, true),
      dataOffset: rawView.getUint32(pos + 4, true),
      flag: rawView.getUint32(pos + 8, true),
    });
    pos += 12;
  }

  const dcMin = [rawView.getFloat32(pos, true), rawView.getFloat32(pos+4, true), rawView.getFloat32(pos+8, true)];
  const dcMax = [rawView.getFloat32(pos+12, true), rawView.getFloat32(pos+16, true), rawView.getFloat32(pos+20, true)];
  const opMin = rawView.getFloat32(pos+24, true);
  const opMax = rawView.getFloat32(pos+28, true);
  const xyzDMin = [rawView.getFloat32(pos+32, true), rawView.getFloat32(pos+36, true), rawView.getFloat32(pos+40, true)];
  const xyzDMax = [rawView.getFloat32(pos+44, true), rawView.getFloat32(pos+48, true), rawView.getFloat32(pos+52, true)];
  pos += 56;
  const xyzDScale = [(xyzDMax[0]-xyzDMin[0])/255, (xyzDMax[1]-xyzDMin[1])/255, (xyzDMax[2]-xyzDMin[2])/255];

  const spzBaselineSize = rawView.getUint32(pos, true);
  pos += 4;
  const spzXyz16 = new Uint16Array(raw, pos, numGaussians * 3);
  const spzBaselineXyz = float16ToFloat32(spzXyz16);
  pos += spzBaselineSize;

  const dataStart = pos;
  const xyzBytesBase = N * 3 * 2;
  const xyzBytesInt8 = N * 3;
  const dcBytes = N * 3;

  function quantizeXyzToU8(absDelta, n) {
    const result = new Uint8Array(n * 3);
    for (let c = 0; c < 3; c++) {
      const scale = 255.0 / (xyzDMax[c] - xyzDMin[c] + 1e-10);
      for (let i = 0; i < n; i++) {
        let q = Math.round((absDelta[i*3+c] - xyzDMin[c]) * scale);
        result[i*3+c] = q < 0 ? 0 : (q > 255 ? 255 : q);
      }
    }
    return result;
  }

  // Decode all frames Рђ?V3c style (uint8 only)
  log('  т╝ђтДІУДБуа?(V3c: Т»ЈтИДтЈфтГў uint8)...');
  const decodedFrames = [];
  let prevXyzQ = null, prevDcQ = null, prevOpQ = null;
  let baseXyzQ = null, baseDcQ = null, baseOpQ = null;
  let totalAllocatedBytes = 0;
  const t0 = performance.now();

  for (let fi = 0; fi < numFramesParsed; fi++) {
    const ft = frameTable[fi];
    let fStart = dataStart + ft.dataOffset;
    const isBaseFrame = ft.flag === 1;
    const isRefresh = ft.flag === 2;

    const frame = {
      xyzQ: new Uint8Array(N * 3),
      dcQ: new Uint8Array(N * 3),
      opQ: new Uint8Array(N),
    };

    const frameBytes = frame.xyzQ.byteLength + frame.dcQ.byteLength + frame.opQ.byteLength;
    totalAllocatedBytes += frameBytes;

    if (isBaseFrame) {
      const fXyz16 = new Uint16Array(raw, fStart, N * 3);
      const fXyzDelta = float16ToFloat32(fXyz16);
      fStart += xyzBytesBase;
      const fDcU8 = new Uint8Array(raw, fStart, N * 3); fStart += dcBytes;
      const fOpU8 = new Uint8Array(raw, fStart, N);
      frame.dcQ.set(fDcU8);
      frame.opQ.set(fOpU8);
      frame.xyzQ = quantizeXyzToU8(fXyzDelta, N);
      // recalc bytes since xyzQ was replaced
      totalAllocatedBytes -= N * 3; // remove old
      totalAllocatedBytes += frame.xyzQ.byteLength; // add new (same size but be explicit)
      baseXyzQ = frame.xyzQ; baseDcQ = frame.dcQ; baseOpQ = frame.opQ;
    } else {
      const refXyzQ = isRefresh ? baseXyzQ : prevXyzQ;
      const refDcQ = isRefresh ? baseDcQ : prevDcQ;
      const refOpQ = isRefresh ? baseOpQ : prevOpQ;
      const fXyzI8 = new Int8Array(raw, fStart, N * 3); fStart += xyzBytesInt8;
      const fDcI8 = new Int8Array(raw, fStart, N * 3); fStart += dcBytes;
      const fOpI8 = new Int8Array(raw, fStart, N);
      for (let i = 0; i < N*3; i++) { let q = refXyzQ[i]+fXyzI8[i]; frame.xyzQ[i] = q<0?0:(q>255?255:q); }
      for (let i = 0; i < N*3; i++) { let q = refDcQ[i]+fDcI8[i]; frame.dcQ[i] = q<0?0:(q>255?255:q); }
      for (let i = 0; i < N; i++) { let q = refOpQ[i]+fOpI8[i]; frame.opQ[i] = q<0?0:(q>255?255:q); }
    }

    decodedFrames[fi] = frame;
    prevXyzQ = frame.xyzQ; prevDcQ = frame.dcQ; prevOpQ = frame.opQ;

    if (fi % 50 === 0 || fi === numFramesParsed - 1) {
      setProgress(40 + Math.round(fi/numFramesParsed * 55));
      await new Promise(r => setTimeout(r, 0));
    }
  }

  const decodeTime = ((performance.now() - t0) / 1000).toFixed(2);
  memSnapshots.afterDecode = logHeap('УДБуаЂт«їТѕљ');
  setProgress(98);

  const perFrameUint8 = (N * 3) + (N * 3) + N; // xyzQ + dcQ + opQ
  const perFrameTotal = perFrameUint8;

  log('');
  log('--- V3c т«ъТхІу╗ЊТъю ---', 'good');
  log(`  УДБуаЂУђЌТЌХ: ${decodeTime}s`);
  log(`  тИДТЋ░: ${numFramesParsed}`);
  log(`  Т»ЈтИД TypedArray тѕєжЁЇ:`, 'highlight');
  log(`    xyzQ (Uint8Array):  ${formatBytes(N * 3)}`);
  log(`    dcQ (Uint8Array):   ${formatBytes(N * 3)}`);
  log(`    opQ (Uint8Array):   ${formatBytes(N)}`);
  log(`    РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ`);
  log(`    Т»ЈтИДт░ЈУ«А:           ${formatBytes(perFrameTotal)} (${(perFrameTotal/1024/1024).toFixed(3)} MB)`);
  log('');
  log(`  тЁежЃетИДТЋ░ТЇ?(${numFramesParsed} тИ?:`, 'highlight');
  log(`    TypedArray Тђ╗жЄЈ:    ${formatBytes(totalAllocatedBytes)}`, 'good');
  log(`  raw buffer (УДБтјІТЋ░ТЇ«): ${formatBytes(raw.byteLength)}`);
  log(`  spzBaselineXyz:       ${formatBytes(spzBaselineXyz.byteLength)}`);
  log('');

  const totalDataMem = totalAllocatedBytes + raw.byteLength + spzBaselineXyz.byteLength;
  log(`  ­ЪЊі ТаИт┐ЃТЋ░ТЇ«тєЁтГўТђ╗жЄЈ:  ${formatBytes(totalDataMem)}`, 'highlight');

  results.v3c = {
    perFrameBytes: perFrameTotal,
    totalFrameDataBytes: totalAllocatedBytes,
    rawBufferBytes: raw.byteLength,
    baselineXyzBytes: spzBaselineXyz.byteLength,
    totalDataMem,
    decodeTime: parseFloat(decodeTime),
    numFrames: numFramesParsed,
    numGaussians: N,
    heapUsed: memSnapshots.afterDecode,
    heapBaseline: memSnapshots.baseline,
  };

  decodedFrames.length = 0;
  setProgress(100);
  log('  Рю?V3c ТхІУ»Ћт«їТѕљ\n', 'good');
}

function showComparison() {
  if (!results.v3b || !results.v3c) return;
  const sec = document.getElementById('comparison-section');
  sec.style.display = 'block';

  const a = results.v3b, b = results.v3c;
  const reduction = ((1 - b.totalFrameDataBytes / a.totalFrameDataBytes) * 100).toFixed(1);
  const totalReduction = ((1 - b.totalDataMem / a.totalDataMem) * 100).toFixed(1);
  const perFrameRatio = (a.perFrameBytes / b.perFrameBytes).toFixed(1);
  const speedDiff = ((b.decodeTime - a.decodeTime) / a.decodeTime * 100).toFixed(1);

  let html = `<table>
    <tr><th>ТїЄТаЄ</th><th>V3b (С╝ўтїќтЅ?</th><th>V3c (С╝ўтїќтљ?</th><th>тЈўтїќ</th></tr>
    <tr><td class="label">Т»ЈтИДтєЁтГў</td><td>${formatBytes(a.perFrameBytes)}</td><td>${formatBytes(b.perFrameBytes)}</td><td style="color:#4a9">Рє?${perFrameRatio}x</td></tr>
    <tr><td class="label">тИДТЋ░ТЇ«Тђ╗жЄЈ (${a.numFrames}тИ?</td><td>${formatBytes(a.totalFrameDataBytes)}</td><td>${formatBytes(b.totalFrameDataBytes)}</td><td style="color:#4a9">Рє?${reduction}%</td></tr>
    <tr><td class="label">raw buffer</td><td>${formatBytes(a.rawBufferBytes)}</td><td>${formatBytes(b.rawBufferBytes)}</td><td>уЏИтљї</td></tr>
    <tr><td class="label">SPZ baseline</td><td>${formatBytes(a.baselineXyzBytes)}</td><td>${formatBytes(b.baselineXyzBytes)}</td><td>уЏИтљї</td></tr>
    <tr><td class="label">ТаИт┐ЃТЋ░ТЇ«Тђ╗тєЁтГ?/td><td style="color:#f74">${formatBytes(a.totalDataMem)}</td><td style="color:#4a9">${formatBytes(b.totalDataMem)}</td><td style="color:#4a9">Рє?${totalReduction}%</td></tr>
    <tr><td class="label">УДБуаЂУђЌТЌХ</td><td>${a.decodeTime}s</td><td>${b.decodeTime}s</td><td>${speedDiff > 0 ? '+' : ''}${speedDiff}%</td></tr>`;

  if (a.heapUsed && b.heapUsed && a.heapBaseline && b.heapBaseline) {
    const heapDeltaA = a.heapUsed - a.heapBaseline;
    const heapDeltaB = b.heapUsed - b.heapBaseline;
    const heapReduction = ((1 - heapDeltaB / heapDeltaA) * 100).toFixed(1);
    html += `<tr><td class="label">JS Heap тбъжЄЈ (т«ъТхІ)</td><td style="color:#f74">${formatBytes(heapDeltaA)}</td><td style="color:#4a9">${formatBytes(heapDeltaB)}</td><td style="color:#4a9">Рє?${heapReduction}%</td></tr>`;
    html += `<tr><td class="label">JS Heap у╗Ют»╣тђ?(УДБуаЂтљ?</td><td>${formatBytes(a.heapUsed)}</td><td>${formatBytes(b.heapUsed)}</td><td></td></tr>`;
  }

  html += `</table>`;
  html += `<p style="margin-top:12px;color:#888;font-size:11px">* "ТаИт┐ЃТЋ░ТЇ«Тђ╗тєЁтГ? = тИДТЋ░ТЇ?+ raw buffer + SPZ baseline (СИЇтљФ Three.js/Spark.js уГЅТИ▓ТЪЊт╝ђжћђ)</p>`;
  html += `<p style="color:#888;font-size:11px">* "JS Heap" ТЋ░ТЇ«ТЮЦУЄф performance.memory API (Chrome only№╝їжюђ --enable-precise-memory-info ТЏ┤у▓ЙуА?</p>`;
  html += `<p style="color:#888;font-size:11px">* V3c уе│ТђЂтєЁтГўТЏ┤Сйј№╝џraw buffer тюетЄйТЋ░У┐ћтЏътљјтЈ»УбФ GC тЏъТћХ№╝їС╗ЁтЅЕтИДТЋ░ТЇ«</p>`;

  document.getElementById('comparison').innerHTML = html;

  // Also log summary
  log('');
  log('РЋћРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋЌ', 'highlight');
  log('РЋ?       ­ЪЊі т»╣Т»ћТђ╗у╗Њ (т«ъТхІТЋ░ТЇ«)             РЋ?, 'highlight');
  log('РЋџРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋЮ', 'highlight');
  log(`  тИДТЋ░ТЇ? ${formatBytes(a.totalFrameDataBytes)} Рє?${formatBytes(b.totalFrameDataBytes)} (Рє?{reduction}%)`, 'good');
  log(`  ТаИт┐ЃТЋ░ТЇ«Тђ╗жЄЈ: ${formatBytes(a.totalDataMem)} Рє?${formatBytes(b.totalDataMem)} (Рє?{totalReduction}%)`, 'good');
  log(`  Т»ЈтИД: ${formatBytes(a.perFrameBytes)} Рє?${formatBytes(b.perFrameBytes)} (${perFrameRatio}x тјІу╝Е)`, 'good');
  if (a.heapUsed && b.heapUsed && a.heapBaseline && b.heapBaseline) {
    const heapDeltaA = a.heapUsed - a.heapBaseline;
    const heapDeltaB = b.heapUsed - b.heapBaseline;
    log(`  JS Heap тбъжЄЈ: ${formatBytes(heapDeltaA)} Рє?${formatBytes(heapDeltaB)} (Рє?{((1-heapDeltaB/heapDeltaA)*100).toFixed(1)}%)`, 'good');
  }
}

async function runBenchmark(version) {
  disableButtons(true);
  logEl.innerHTML = '';
  setProgress(0);

  log(`­Ъћг т╝ђтДІтєЁтГўтЪ║тЄєТхІУ»?Рђ?${new Date().toLocaleString()}`, 'highlight');
  log(`  тіеТђЂжФўТќ»ТЋ░(N): 128,062`);
  log(`  тИДТЋ░: 299`);
  log(`  performance.memory тЈ»уће: ${!!performance.memory}`);
  log('');

  try {
    // V3b and V3c share data_v3c since the bundle format is the same
    if (version === 'v3b') {
      await benchmarkV3b('data_v3c');
    } else {
      await benchmarkV3c('data_v3c');
    }
  } catch (err) {
    log(`РЮ?жћЎУ»»: ${err.message}`, 'warn');
    console.error(err);
  }

  disableButtons(false);
}

async function runBoth() {
  disableButtons(true);
  logEl.innerHTML = '';
  setProgress(0);

  log(`­Ъћг т╝ђтД?V3b vs V3c тєЁтГўт»╣Т»ћтЪ║тЄєТхІУ»Ћ Рђ?${new Date().toLocaleString()}`, 'highlight');
  log(`  тіеТђЂжФўТќ»ТЋ░(N): 128,062`);
  log(`  тИДТЋ░: 299`);
  log(`  performance.memory тЈ»уће: ${!!performance.memory}`);
  log('');

  try {
    await benchmarkV3b('data_v3c');
    // Wait for GC
    log('  РЈ?уГЅтЙЁ GC (3уД?...', 'dim');
    if (window.gc) window.gc();
    await new Promise(r => setTimeout(r, 3000));

    setProgress(0);
    await benchmarkV3c('data_v3c');

    showComparison();
  } catch (err) {
    log(`РЮ?жћЎУ»»: ${err.message}`, 'warn');
    console.error(err);
  }

  disableButtons(false);
}
