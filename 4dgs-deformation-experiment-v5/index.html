<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4DGS Deformation Viewer V5 — Per-frame OPFS Slice Read</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<iframe id="v5frame" src="index_v5.html" allowfullscreen></iframe>
<script>
  // Relay hash from parent URL to iframe src
  var f = document.getElementById('v5frame');
  if (location.hash) f.src = 'index_v5.html' + location.hash;
  window.addEventListener('hashchange', function() { f.src = 'index_v5.html' + location.hash; });
</script>
</body>
</html>
