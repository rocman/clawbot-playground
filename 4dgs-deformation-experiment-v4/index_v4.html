<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { SplatMesh, dyno } from "@sparkjsdev/spark";

// ============================================================
// Configuration — Memory-optimized: only 2 GOPs in memory
// ============================================================
const MAX_CACHED_GOPS = 2;   // current + next (was 7-8 in old version)
const DELTA_K = 256;
const STRIDE = 7; // bytes per gaussian per frame: xyz(3) + dc(3) + op(1)

// ============================================================
// L2 Persistent Cache — OPFS (preferred) + IndexedDB (fallback)
// Stores raw gzip bytes so page refresh skips network entirely.
// Cache key = manifestVersion + "/" + filename (invalidated on version change)
// ============================================================
class GopPersistCache {
  constructor() {
    this._mode = null;  // 'opfs' | 'idb' | null
    this._opfsRoot = null;
    this._idbDB = null;
    this._ready = this._init();
  }

  async _init() {
    // Try OPFS first
    try {
      if (navigator.storage && navigator.storage.getDirectory) {
        const root = await navigator.storage.getDirectory();
        this._opfsRoot = await root.getDirectoryHandle('4dgs-v4-cache', { create: true });
        this._mode = 'opfs';
        console.log('[PersistCache] Using OPFS');
        return;
      }
    } catch (e) {
      console.warn('[PersistCache] OPFS unavailable:', e.message);
    }
    // Fallback to IndexedDB
    try {
      this._idbDB = await new Promise((resolve, reject) => {
        const req = indexedDB.open('4dgs-v4-cache', 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('blobs')) {
            db.createObjectStore('blobs');
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      this._mode = 'idb';
      console.log('[PersistCache] Using IndexedDB');
    } catch (e) {
      console.warn('[PersistCache] IndexedDB unavailable:', e.message);
      this._mode = null;
    }
  }

  _key(manifestVersion, filename) {
    return `${manifestVersion}/${filename}`;
  }

  async get(manifestVersion, filename) {
    await this._ready;
    const key = this._key(manifestVersion, filename);
    if (this._mode === 'opfs') {
      return this._opfsGet(key);
    } else if (this._mode === 'idb') {
      return this._idbGet(key);
    }
    return null;
  }

  async put(manifestVersion, filename, arrayBuffer) {
    await this._ready;
    const key = this._key(manifestVersion, filename);
    if (this._mode === 'opfs') {
      return this._opfsPut(key, arrayBuffer);
    } else if (this._mode === 'idb') {
      return this._idbPut(key, arrayBuffer);
    }
  }

  // --- OPFS ---
  async _opfsGet(key) {
    try {
      // key = "v3d/gop_000.bin.gz" → use flat filename with safe chars
      const safeName = key.replace(/\//g, '__');
      const fh = await this._opfsRoot.getFileHandle(safeName);
      const file = await fh.getFile();
      return await file.arrayBuffer();
    } catch (e) {
      return null; // NotFoundError → cache miss
    }
  }
  async _opfsPut(key, buf) {
    try {
      const safeName = key.replace(/\//g, '__');
      const fh = await this._opfsRoot.getFileHandle(safeName, { create: true });
      const writable = await fh.createWritable();
      await writable.write(buf);
      await writable.close();
    } catch (e) {
      console.warn('[PersistCache] OPFS write failed:', e.message);
    }
  }

  // --- IndexedDB ---
  async _idbGet(key) {
    return new Promise((resolve) => {
      try {
        const tx = this._idbDB.transaction('blobs', 'readonly');
        const req = tx.objectStore('blobs').get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      } catch (e) { resolve(null); }
    });
  }
  async _idbPut(key, buf) {
    return new Promise((resolve) => {
      try {
        const tx = this._idbDB.transaction('blobs', 'readwrite');
        tx.objectStore('blobs').put(buf, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      } catch (e) { resolve(); }
    });
  }

  // Delete a specific cache entry
  async delete(manifestVersion, filename) {
    await this._ready;
    const key = this._key(manifestVersion, filename);
    if (this._mode === 'opfs') {
      try {
        const safeName = key.replace(/\//g, '__');
        await this._opfsRoot.removeEntry(safeName);
      } catch (e) {}
    } else if (this._mode === 'idb') {
      try {
        const tx = this._idbDB.transaction('blobs', 'readwrite');
        tx.objectStore('blobs').delete(key);
      } catch (e) {}
    }
  }

  // Invalidate all entries not matching current manifest version
  async purgeOldVersions(currentVersion) {
    await this._ready;
    const prefix = currentVersion + '/';
    if (this._mode === 'opfs') {
      try {
        const safePrefix = prefix.replace(/\//g, '__');
        for await (const [name] of this._opfsRoot) {
          if (!name.startsWith(safePrefix)) {
            await this._opfsRoot.removeEntry(name).catch(() => {});
          }
        }
      } catch (e) {}
    } else if (this._mode === 'idb') {
      try {
        const tx = this._idbDB.transaction('blobs', 'readwrite');
        const store = tx.objectStore('blobs');
        const req = store.getAllKeys();
        req.onsuccess = () => {
          for (const k of req.result) {
            if (!k.startsWith(prefix)) store.delete(k);
          }
        };
      } catch (e) {}
    }
  }

  get mode() { return this._mode; }
}

const persistCache = new GopPersistCache();

// Helper: fetch with L2 persistent cache
// Returns raw ArrayBuffer (still gzip-compressed for GOP/meta/mask files)
async function cachedFetch(url, cacheFilename) {
  const ver = manifest ? (manifest.version || 'unknown') : 'unknown';
  // Try L2 cache first
  const cached = await persistCache.get(ver, cacheFilename);
  if (cached && cached.byteLength > 0) {
    diagStatsAccum.cacheHits++;
    diagLog('info', `L2 cache HIT: ${cacheFilename} (${(cached.byteLength/1024).toFixed(0)} KB)`);
    updateCacheStatus();
    return cached;
  } else if (cached && cached.byteLength === 0) {
    // Stale empty entry — purge it
    diagLog('warn', `L2 cache has empty entry for ${cacheFilename}, purging`);
    persistCache.delete(ver, cacheFilename).catch(() => {});
  }
  // L3: network fetch with retry (no cache-busting timestamp)
  diagStatsAccum.cacheMisses++;
  const fullUrl = new URL(url, location.href).href;
  diagLog('info', `L2 cache MISS: ${cacheFilename}, fetching from network: ${fullUrl}`);
  const MAX_RETRIES = 3;
  let lastErr = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status} for ${fullUrl}`);
      }
      const buf = await resp.arrayBuffer();
      if (buf.byteLength === 0) {
        throw new Error(`Empty response for ${fullUrl}`);
      }
      // Store in L2 (fire-and-forget)
      persistCache.put(ver, cacheFilename, buf).catch(() => {});
      updateCacheStatus();
      if (attempt > 1) diagLog('info', `${cacheFilename} succeeded on attempt ${attempt}`);
      return buf;
    } catch (e) {
      lastErr = e;
      diagLog('warn', `Fetch attempt ${attempt}/${MAX_RETRIES} failed for ${cacheFilename}: ${e.message} (url: ${fullUrl})`);
      if (attempt < MAX_RETRIES) {
        await new Promise(r => setTimeout(r, 500 * attempt)); // backoff: 500ms, 1000ms
      }
    }
  }
  throw lastErr;
}

function updateCacheStatus() {
  const el = document.getElementById('stat-cache');
  if (el) {
    const mode = persistCache.mode || 'none';
    el.textContent = `${mode.toUpperCase()} ${diagStatsAccum.cacheHits}/${diagStatsAccum.cacheHits + diagStatsAccum.cacheMisses} hits`;
  }
}

// ============================================================
// State
// ============================================================
let manifest = null;
let dynamicMask = null;
let splatMesh = null;
let currentFrame = 0;
let isPlaying = false;
let viewMode = 'animated';
let playbackSpeedMult = 1.0;
let targetFPS = 30;

let uFrameIndex = null;
let uViewMode = null;
let deltaSampler = null;
let maskSampler = null;
let deltaTexture = null;
let maskTexture = null;

// Data state (previously in Worker)
let N = 0; // dynamic gaussians count
let qXyzDMin = null, qXyzDMax = null, qXyzDScale = null;
let qDcMin = null, qDcMax = null;
let qOpMin = 0, qOpMax = 0;
let baseData = null; // Uint8Array(N * 7)

// GOP cache — only MAX_CACHED_GOPS entries
// gopIndex -> { data: Uint8Array(numFrames * N * 7), numFrames, startFrame, endFrame, lastAccess }
const gopCache = new Map();
const gopLoadingSet = new Set(); // GOPs currently being fetched
const gopFailedSet = new Set();  // GOPs that failed to load (prevents infinite retry)

// Frame packing pre-allocated buffers
const _f32View = new Float32Array(1);
const _i32View = new Int32Array(_f32View.buffer);

// Delta texture dimensions
let deltaTexW = 0, deltaTexH = 0;

// Reusable texture data buffer (avoids re-allocation every frame)
let reusableTexData = null;

const TOTAL_DURATION_DEFAULT = 10.0;
let TOTAL_DURATION = TOTAL_DURATION_DEFAULT;

// Diagnostic
const diagLogs = [];
const DIAG_LOG_MAX = 300;
let diagStatsAccum = { framesRequested: 0, framesApplied: 0, framesDropped: 0, stallFrames: 0, cacheHits: 0, cacheMisses: 0 };
function diagLog(level, msg, data) {
  const entry = { ts: performance.now(), level, msg, ...(data || {}) };
  diagLogs.push(entry);
  if (diagLogs.length > DIAG_LOG_MAX) diagLogs.shift();
  if (level === 'warn' || level === 'error') console.warn(`[V4:${level}]`, msg, data || '');
}

// ============================================================
// DOM refs
// ============================================================
const loadingOverlay = document.getElementById('loading-overlay');
const loadingBar = document.getElementById('loading-bar');
const loadingText = document.getElementById('loading-text');
const playBtn = document.getElementById('play-btn');
const timeline = document.getElementById('timeline');
const frameLabel = document.getElementById('frame-label');
const gopStatus = document.getElementById('gop-status');
const gopBar = document.getElementById('gop-bar');
const gopStrip = document.getElementById('gop-strip');
const memBadge = document.getElementById('mem-badge');

function setLoading(pct, text) {
  loadingBar.style.width = pct + '%';
  if (text) loadingText.textContent = text;
}

// ============================================================
// Memory monitoring
// ============================================================
function updateMemoryBadge() {
  if (performance.memory) {
    const usedMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(0);
    const totalMB = (performance.memory.totalJSHeapSize / 1024 / 1024).toFixed(0);

}

// ============================================================
// Utility functions (previously in Worker)
// ============================================================
async function decompressGzip(buf) {
  const ds = new DecompressionStream('gzip');
  const blob = new Blob([buf]);
  const stream = blob.stream().pipeThrough(ds);
  return await new Response(stream).blob().then(b => b.arrayBuffer());
}

function float16ToFloat32(u16arr) {
  const f32 = new Float32Array(u16arr.length);
  for (let i = 0; i < u16arr.length; i++) {
    const h = u16arr[i];
    const sign = (h >> 15) & 0x1;
    const exp = (h >> 10) & 0x1f;
    const mant = h & 0x3ff;
    if (exp === 0) {
      f32[i] = mant === 0 ? (sign ? -0 : 0) : (sign ? -1 : 1) * Math.pow(2, -14) * (mant / 1024);
    } else if (exp === 31) {
      f32[i] = mant === 0 ? (sign ? -Infinity : Infinity) : NaN;
    } else {
      f32[i] = (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + mant / 1024);
    }
  }
  return f32;
}

function float32ToFloat16(val) {
  _f32View[0] = val;
  const f = _i32View[0];
  const sign = (f >> 31) & 0x1;
  let exp = ((f >> 23) & 0xff) - 127 + 15;
  let mant = (f >> 13) & 0x3ff;
  if (exp <= 0) {
    if (exp < -10) return sign << 15;
    mant = (mant | 0x400) >> (1 - exp);
    return (sign << 15) | mant;
  }
  if (exp >= 31) return (sign << 15) | (31 << 10) | (mant ? 1 : 0);
  return (sign << 15) | (exp << 10) | mant;
}

function getFrameSlice(gopData, localIdx) {
  const offset = localIdx * N * STRIDE;
  return new Uint8Array(gopData.buffer, gopData.byteOffset + offset, N * STRIDE);
}

// ============================================================
// Pack frame → HalfFloat texture (reuses buffer to avoid GC)
// ============================================================
function packFrameToHalfFloat(frame) {
  const dcScale0 = (qDcMax[0] - qDcMin[0]) / 255.0;
  const dcScale1 = (qDcMax[1] - qDcMin[1]) / 255.0;
  const dcScale2 = (qDcMax[2] - qDcMin[2]) / 255.0;
  const opScale = (qOpMax - qOpMin) / 255.0;

  // Reuse pre-allocated buffer
  const texData = reusableTexData;
  texData.fill(0);

  for (let i = 0; i < N; i++) {
    const bOff = i * STRIDE;
    const row = Math.floor(i / DELTA_K);
    const col = (i % DELTA_K) * 2;

    const dx = frame[bOff + 0] * qXyzDScale[0] + qXyzDMin[0];
    const dy = frame[bOff + 1] * qXyzDScale[1] + qXyzDMin[1];
    const dz = frame[bOff + 2] * qXyzDScale[2] + qXyzDMin[2];
    const dc0 = frame[bOff + 3] * dcScale0 + qDcMin[0];
    const dc1 = frame[bOff + 4] * dcScale1 + qDcMin[1];
    const dc2 = frame[bOff + 5] * dcScale2 + qDcMin[2];
    const op = frame[bOff + 6] * opScale + qOpMin;

    let off = (row * deltaTexW + col) * 4;
    texData[off + 0] = float32ToFloat16(dx);
    texData[off + 1] = float32ToFloat16(dy);
    texData[off + 2] = float32ToFloat16(dz);
    texData[off + 3] = float32ToFloat16(dc0);

    off = (row * deltaTexW + col + 1) * 4;
    texData[off + 0] = float32ToFloat16(dc1);
    texData[off + 1] = float32ToFloat16(dc2);
    texData[off + 2] = float32ToFloat16(op);
    texData[off + 3] = 0;
  }
  return texData;
}

// ============================================================
// Data Loading
// ============================================================
async function loadManifest() {
  setLoading(5, 'Loading manifest...');
  // Manifest always fetches from network (cache-bust) to detect version changes
  const isRefresh = location.hash === '#refresh';
  const resp = await fetch('data_v3d/manifest.json' + (isRefresh ? '?t=' + Date.now() : ''), {
    cache: isRefresh ? 'reload' : 'default'
  });
  manifest = await resp.json();
  targetFPS = manifest.target_fps || 30;
  TOTAL_DURATION = (manifest.p_frame_count || 299) / targetFPS;
  N = manifest.dynamic_gaussians;

  // Purge old version cache entries (fire-and-forget)
  const ver = manifest.version || 'unknown';
  persistCache.purgeOldVersions(ver).catch(() => {});
  console.log(`[PersistCache] Version: ${ver}, mode: ${persistCache.mode || 'none'}`);

  document.getElementById('stat-total').textContent = manifest.total_gaussians.toLocaleString();
  document.getElementById('stat-dynamic').textContent = manifest.dynamic_gaussians.toLocaleString();
  document.getElementById('stat-static').textContent =
    (manifest.total_gaussians - manifest.dynamic_gaussians).toLocaleString();
  timeline.max = manifest.p_frame_count;

  // Build GOP strip
  gopStrip.innerHTML = '';
  for (let i = 0; i < manifest.gop_count; i++) {
    const seg = document.createElement('div');
    seg.className = 'gop-seg';
    seg.id = `gop-seg-${i}`;
    seg.title = `GOP ${i}: frames ${manifest.gop_index[i].start_frame}-${manifest.gop_index[i].end_frame - 1}`;
    gopStrip.appendChild(seg);
  }
}

async function loadDynamicMask() {
  const compressed = await cachedFetch('data_v3d/' + manifest.dynamic_mask, manifest.dynamic_mask);
  const raw = await decompressGzip(compressed);
  const view = new DataView(raw);
  const totalN = view.getUint32(0, true);
  dynamicMask = new Uint8Array(raw, 4, totalN);
}

// ============================================================
// GOP Meta — parse quantization params + base frame
// ============================================================
async function loadGopMeta() {
  gopStatus.textContent = 'Meta: downloading...';
  const compressed = await cachedFetch(`data_v3d/${manifest.gop_meta}`, manifest.gop_meta);
  const raw = await decompressGzip(compressed);
  const rawView = new DataView(raw);

  // Header (28 bytes)
  let pos = 28;

  // Quant params (56 bytes)
  qDcMin = [rawView.getFloat32(pos, true), rawView.getFloat32(pos+4, true), rawView.getFloat32(pos+8, true)];
  qDcMax = [rawView.getFloat32(pos+12, true), rawView.getFloat32(pos+16, true), rawView.getFloat32(pos+20, true)];
  qOpMin = rawView.getFloat32(pos+24, true);
  qOpMax = rawView.getFloat32(pos+28, true);
  qXyzDMin = [rawView.getFloat32(pos+32, true), rawView.getFloat32(pos+36, true), rawView.getFloat32(pos+40, true)];
  qXyzDMax = [rawView.getFloat32(pos+44, true), rawView.getFloat32(pos+48, true), rawView.getFloat32(pos+52, true)];
  pos += 56;

  qXyzDScale = [
    (qXyzDMax[0] - qXyzDMin[0]) / 255.0,
    (qXyzDMax[1] - qXyzDMin[1]) / 255.0,
    (qXyzDMax[2] - qXyzDMin[2]) / 255.0,
  ];

  // Skip SPZ baseline
  const spzSize = rawView.getUint32(pos, true);
  pos += 4 + spzSize;

  // Parse base frame
  const xyzBytesBase = N * 3 * 2;
  const dcBytes = N * 3;
  const baseXyz16 = new Uint16Array(raw, pos, N * 3);
  const baseXyzDelta = float16ToFloat32(baseXyz16);
  pos += xyzBytesBase;

  const baseDcRaw = new Uint8Array(raw, pos, N * 3);
  pos += dcBytes;
  const baseOpRaw = new Uint8Array(raw, pos, N);

  baseData = new Uint8Array(N * STRIDE);
  for (let i = 0; i < N; i++) {
    for (let c = 0; c < 3; c++) {
      const scale = 255.0 / (qXyzDMax[c] - qXyzDMin[c] + 1e-10);
      let q = Math.round((baseXyzDelta[i * 3 + c] - qXyzDMin[c]) * scale);
      baseData[i * STRIDE + c] = q < 0 ? 0 : (q > 255 ? 255 : q);
    }
    baseData[i * STRIDE + 3] = baseDcRaw[i * 3];
    baseData[i * STRIDE + 4] = baseDcRaw[i * 3 + 1];
    baseData[i * STRIDE + 5] = baseDcRaw[i * 3 + 2];
    baseData[i * STRIDE + 6] = baseOpRaw[i];
  }

  gopStatus.textContent = 'Meta: loaded';
  diagLog('info', 'GOP meta loaded, quant params ready');
}

// ============================================================
// GOP Loading & Decoding — main thread, async
// ============================================================
async function loadGop(gopIdx) {
  if (gopCache.has(gopIdx) || gopLoadingSet.has(gopIdx) || gopFailedSet.has(gopIdx)) return;
  if (gopIdx < 0 || gopIdx >= manifest.gop_count) return;

  gopLoadingSet.add(gopIdx);
  updateGopStripUI(gopIdx, 'loading');
  diagLog('info', `GOP ${gopIdx} loading started`);
  const loadStart = performance.now();

  const gopInfo = manifest.gop_index[gopIdx];
  try {
    const compressed = await cachedFetch(`data_v3d/${gopInfo.filename}`, gopInfo.filename);
    const raw = await decompressGzip(compressed);
    const rawView = new DataView(raw);

    // GOP header (16 bytes)
    const numFrames = rawView.getUint32(8, true);
    const xyzBytesBase = N * 3 * 2;
    const xyzBytesInt8 = N * 3;
    const dcBytes = N * 3;
    const opBytes = N;

    const gopData = new Uint8Array(numFrames * N * STRIDE);
    let prevOffset = -1;
    let pos = 16;

    for (let fi = 0; fi < numFrames; fi++) {
      const globalFrameIdx = gopInfo.start_frame + fi;
      const isBaseFrame = globalFrameIdx === 0;
      const isRefresh = !isBaseFrame && (globalFrameIdx % manifest.gop_size === 0);
      const frameOffset = fi * N * STRIDE;

      if (isBaseFrame) {
        const fXyz16 = new Uint16Array(raw, pos, N * 3);
        const fXyzDelta = float16ToFloat32(fXyz16);
        pos += xyzBytesBase;
        const fDcU8 = new Uint8Array(raw, pos, N * 3);
        pos += dcBytes;
        const fOpU8 = new Uint8Array(raw, pos, N);
        pos += opBytes;

        for (let i = 0; i < N; i++) {
          const bOff = frameOffset + i * STRIDE;
          for (let c = 0; c < 3; c++) {
            const scale = 255.0 / (qXyzDMax[c] - qXyzDMin[c] + 1e-10);
            let q = Math.round((fXyzDelta[i * 3 + c] - qXyzDMin[c]) * scale);
            gopData[bOff + c] = q < 0 ? 0 : (q > 255 ? 255 : q);
          }
          gopData[bOff + 3] = fDcU8[i * 3];
          gopData[bOff + 4] = fDcU8[i * 3 + 1];
          gopData[bOff + 5] = fDcU8[i * 3 + 2];
          gopData[bOff + 6] = fOpU8[i];
        }
      } else {
        const fXyzI8 = new Int8Array(raw, pos, N * 3);
        pos += xyzBytesInt8;
        const fDcI8 = new Int8Array(raw, pos, N * 3);
        pos += dcBytes;
        const fOpI8 = new Int8Array(raw, pos, N);
        pos += opBytes;

        const refData = isRefresh ? baseData : gopData;
        const refOffset = isRefresh ? 0 : prevOffset;

        for (let i = 0; i < N; i++) {
          const bOff = frameOffset + i * STRIDE;
          const rOff = refOffset + i * STRIDE;
          for (let c = 0; c < 3; c++) {
            let q = refData[rOff + c] + fXyzI8[i * 3 + c];
            gopData[bOff + c] = q < 0 ? 0 : (q > 255 ? 255 : q);
          }
          for (let c = 0; c < 3; c++) {
            let q = refData[rOff + 3 + c] + fDcI8[i * 3 + c];
            gopData[bOff + 3 + c] = q < 0 ? 0 : (q > 255 ? 255 : q);
          }
          let q = refData[rOff + 6] + fOpI8[i];
          gopData[bOff + 6] = q < 0 ? 0 : (q > 255 ? 255 : q);
        }
      }
      prevOffset = frameOffset;
    }

    gopCache.set(gopIdx, {
      data: gopData,
      numFrames,
      startFrame: gopInfo.start_frame,
      endFrame: gopInfo.end_frame,
      lastAccess: performance.now(),
    });

    gopLoadingSet.delete(gopIdx);
    const loadMs = (performance.now() - loadStart).toFixed(0);
    diagLog('info', `GOP ${gopIdx} loaded in ${loadMs}ms`);
    updateGopStripUI(gopIdx, 'loaded');
    reportStats();

  } catch (err) {
    gopLoadingSet.delete(gopIdx);
    gopFailedSet.add(gopIdx);
    // Allow retry after 5 seconds
    setTimeout(() => gopFailedSet.delete(gopIdx), 5000);
    const gopUrl = new URL(`data_v3d/${gopInfo.filename}`, location.href).href;
    diagLog('error', `GOP ${gopIdx} load failed: ${err.message} (url: ${gopUrl})`, { stack: err.stack });
    console.error(`[V4] GOP ${gopIdx} load failed:`, err, `\nFull URL: ${gopUrl}`);
    updateGopStripUI(gopIdx, 'error');
  }
}

// ============================================================
// Eviction — keep only MAX_CACHED_GOPS (current + next)
// ============================================================
function evictDistantGops(currentGopIdx) {
  const totalGops = manifest.gop_count;
  const keepSet = new Set();
  keepSet.add(currentGopIdx);
  // Keep next GOP for seamless playback
  const nextGop = (currentGopIdx + 1) % totalGops;
  keepSet.add(nextGop);

  let evicted = 0;
  for (const [idx] of gopCache) {
    if (!keepSet.has(idx)) {
      gopCache.delete(idx);
      updateGopStripUI(idx, 'evicted');
      evicted++;
    }
  }
  if (evicted > 0) {
    diagLog('info', `Evicted ${evicted} GOPs, kept: [${[...keepSet].sort((a,b)=>a-b).join(',')}]`);
  }
  reportStats();
}

function reportStats() {
  const loaded = gopCache.size;
  const total = manifest ? manifest.gop_count : 0;
  const frameMemMB = loaded * (manifest?.gop_size || 30) * N * STRIDE / 1024 / 1024;
  document.getElementById('stat-gops').textContent = `${loaded}/${total}`;
  document.getElementById('stat-window').textContent = `${frameMemMB.toFixed(1)} MB (${loaded} GOPs)`;
  const pct = total > 0 ? Math.round(loaded / Math.min(MAX_CACHED_GOPS, total) * 100) : 0;
  gopBar.style.width = pct + '%';
}

// ============================================================
// Textures
// ============================================================
function createMaskTexture() {
  const totalN = manifest.total_gaussians;
  const texW = Math.ceil(Math.sqrt(totalN));
  const texH = Math.ceil(totalN / texW);
  const texData = new Float32Array(texW * texH * 2);
  let dynIdx = 0;
  for (let i = 0; i < totalN; i++) {
    const off = i * 2;
    const isDyn = dynamicMask[i];
    texData[off + 0] = isDyn ? 1.0 : 0.0;
    texData[off + 1] = isDyn ? dynIdx : -1.0;
    if (isDyn) dynIdx++;
  }
  for (let i = totalN; i < texW * texH; i++) {
    texData[i * 2 + 0] = 0.0;
    texData[i * 2 + 1] = -1.0;
  }
  const tex = new THREE.DataTexture(texData, texW, texH, THREE.RGFormat, THREE.FloatType);
  tex.needsUpdate = true;
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  return { texture: tex, width: texW, height: texH };
}

function createDeltaTexture() {
  deltaTexW = DELTA_K * 2;
  deltaTexH = Math.ceil(N / DELTA_K);
  const texData = new Uint16Array(deltaTexW * deltaTexH * 4);
  const tex = new THREE.DataTexture(texData, deltaTexW, deltaTexH, THREE.RGBAFormat, THREE.HalfFloatType);
  tex.needsUpdate = true;
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  // Pre-allocate reusable buffer for packFrameToHalfFloat
  reusableTexData = new Uint16Array(deltaTexW * deltaTexH * 4);
  return tex;
}

// ============================================================
// UI helpers
// ============================================================
function updateGopStripUI(gopIdx, state) {
  const seg = document.getElementById(`gop-seg-${gopIdx}`);
  if (!seg) return;
  seg.className = 'gop-seg';
  if (state === 'loaded') seg.classList.add('loaded');
  else if (state === 'active') seg.classList.add('active');
  else if (state === 'loading') seg.classList.add('loading');
}

function getGopIndexForFrame(globalFrame) {
  if (globalFrame === 0) return -1;
  const pFrameIdx = globalFrame - 1;
  return Math.floor(pFrameIdx / manifest.gop_size);
}

// ============================================================
// Scene setup
// ============================================================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Frame update — synchronous (no Worker, no postMessage)
// ============================================================
function applyFrameData(globalFrame) {
  if (globalFrame === 0) {
    uFrameIndex.value = 0;
    return true;
  }

  const gopIdx = getGopIndexForFrame(globalFrame);
  const gop = gopCache.get(gopIdx);
  if (!gop) return false; // GOP not loaded yet

  const pFrameIdx = globalFrame - 1;
  const localIdx = pFrameIdx - gop.startFrame;
  if (localIdx < 0 || localIdx >= gop.numFrames) return false;

  gop.lastAccess = performance.now();
  const frameSlice = getFrameSlice(gop.data, localIdx);
  const texData = packFrameToHalfFloat(frameSlice);

  // Write directly into texture (no postMessage, no transfer)
  deltaTexture.image.data.set(texData);
  deltaTexture.needsUpdate = true;
  uFrameIndex.value = globalFrame;
  diagStatsAccum.framesApplied++;
  return true;
}

// Prefetch next GOP in background (fire-and-forget async)
let prefetchPromise = null;
function triggerPrefetch(currentGopIdx) {
  const totalGops = manifest.gop_count;
  const nextGop = (currentGopIdx + 1) % totalGops;
  if (!gopCache.has(nextGop) && !gopLoadingSet.has(nextGop)) {
    prefetchPromise = loadGop(nextGop);
  }
  // Also prefetch GOP 0 when near end (for loop)
  if (currentGopIdx >= totalGops - 2) {
    if (!gopCache.has(0) && !gopLoadingSet.has(0)) {
      loadGop(0);
    }
  }
  evictDistantGops(currentGopIdx);
}

// ============================================================
// Init
// ============================================================
async function init() {
  const t0 = performance.now();

  await loadManifest();
  // Clear #refresh hash after manifest loaded (used by viewctl refresh)
  if (location.hash === '#refresh') {
    history.replaceState(null, '', location.pathname + location.search);
  }

  setLoading(10, 'Loading dynamic mask...');
  await loadDynamicMask();

  setLoading(20, 'Creating textures (Float16 optimized)...');
  deltaTexture = createDeltaTexture();
  const maskInfo = createMaskTexture();
  maskTexture = maskInfo.texture;
  const maskTexWidth = maskInfo.width;

  // Release dynamicMask after creating texture
  dynamicMask = null;

  setLoading(30, 'Loading GOP meta (quant params)...');
  await loadGopMeta();

  setLoading(50, 'Loading SPZ I-frame...');
  uFrameIndex = dyno.dynoInt(0);
  uViewMode = dyno.dynoInt(0);
  deltaSampler = dyno.dynoSampler2D(deltaTexture);
  maskSampler = dyno.dynoSampler2D(maskTexture);

  const iFrameBuf = await cachedFetch('data_v3d/' + manifest.i_frame, manifest.i_frame);
  const iFrameBytes = new Uint8Array(iFrameBuf);
  console.log(`[V4] SPZ I-frame loaded: ${(iFrameBytes.byteLength/1024/1024).toFixed(2)} MB`);

  setLoading(70, 'Initializing Spark.js...');
  splatMesh = new SplatMesh({ fileBytes: iFrameBytes });

  // Shader (identical to old V4)
  splatMesh.objectModifier = dyno.dynoBlock(
    { gsplat: dyno.Gsplat },
    { gsplat: dyno.Gsplat },
    ({ gsplat }) => {
      const d = new dyno.Dyno({
        inTypes: {
          gsplat: dyno.Gsplat,
          frameIdx: "int",
          mode: "int",
          deltaTex: "sampler2D",
          maskTex: "sampler2D",
          maskW: "int",
          deltaK: "int",
        },
        outTypes: { gsplat: dyno.Gsplat },
        globals: () => [
          dyno.unindent(`
            vec2 lookupMaskV4(sampler2D mTex, int idx, int mW) {
              int r = idx / mW;
              int c = idx - r * mW;
              return texelFetch(mTex, ivec2(c, r), 0).rg;
            }
            void fetchDeltaV4(sampler2D dTex, int dIdx, int K,
                              out vec3 dPos, out vec3 dDC, out float dOp) {
              int sr = dIdx / K;
              int sc = (dIdx - sr * K) * 2;
              vec4 t0 = texelFetch(dTex, ivec2(sc, sr), 0);
              vec4 t1 = texelFetch(dTex, ivec2(sc+1, sr), 0);
              dPos = t0.xyz;
              dDC  = vec3(t0.w, t1.xy);
              dOp  = t1.z;
            }
          `)
        ],
        statements: ({ inputs, outputs }) => dyno.unindentLines(`
          ${outputs.gsplat} = ${inputs.gsplat};
          int sIdx = ${inputs.gsplat}.index;
          vec2 md = lookupMaskV4(${inputs.maskTex}, sIdx, ${inputs.maskW});
          float isDyn = md.r;
          int dIdx = int(md.g);

          if (${inputs.mode} == 2) {
            if (isDyn > 0.5)
              ${outputs.gsplat}.rgba.rgb = mix(${inputs.gsplat}.rgba.rgb, vec3(1.0,0.5,0.2), 0.6);
            else
              ${outputs.gsplat}.rgba.rgb = mix(${inputs.gsplat}.rgba.rgb, vec3(0.2,0.7,0.6), 0.4);
          }

          if (${inputs.mode} == 0 && ${inputs.frameIdx} > 0 && isDyn > 0.5 && dIdx >= 0) {
            vec3 dp, ddc; float dop;
            fetchDeltaV4(${inputs.deltaTex}, dIdx, ${inputs.deltaK}, dp, ddc, dop);
            float SH_C0 = 0.28209479177;
            ${outputs.gsplat}.center += dp;
            ${outputs.gsplat}.rgba.rgb = SH_C0 * ddc + 0.5;
            ${outputs.gsplat}.rgba.a = dop;
          }
        `)
      });
      gsplat = d.apply({
        gsplat,
        frameIdx: uFrameIndex,
        mode: uViewMode,
        deltaTex: deltaSampler,
        maskTex: maskSampler,
        maskW: dyno.dynoInt(maskTexWidth),
        deltaK: dyno.dynoInt(DELTA_K),
      }).gsplat;
      return { gsplat };
    }
  );

  splatMesh.quaternion.set(1, 0, 0, 0);
  splatMesh.position.set(0, 0, 0);
  scene.add(splatMesh);

  camera.position.set(0.5, 4.5, 15.0);

  setLoading(85, 'Preloading first GOP...');
  await loadGop(0);
  // Fire-and-forget prefetch of GOP 1
  loadGop(1);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(2.435, -2.0, -15.003);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.screenSpacePanning = true;
  controls.minDistance = 0.5;
  controls.maxDistance = 100;
  controls.update();

  setLoading(100, 'Ready!');
  const loadTime = ((performance.now() - t0) / 1000).toFixed(1);
  console.log(`[V4] Ready in ${loadTime}s (no-worker, memory-optimized)`);

  setTimeout(() => {
    loadingOverlay.classList.add('hidden');
    splatMesh.updateGenerator();
    isPlaying = true;
    playBtn.textContent = '\u23F8';
  }, 300);

  // ============================================================
  // 30Hz Animation Loop — synchronous frame application
  // ============================================================
  let frameCount = 0, lastFpsTime = performance.now();
  let lastFrameTime = performance.now();
  const FRAME_INTERVAL = 1000 / targetFPS;

  renderer.setAnimationLoop(function animate() {
    const now = performance.now();

    if (isPlaying && viewMode === 'animated') {
      const adjustedInterval = FRAME_INTERVAL / playbackSpeedMult;
      if (now - lastFrameTime >= adjustedInterval) {
        lastFrameTime = now;

        const maxFrame = manifest.p_frame_count;
        const nextFrame = (currentFrame + 1) % (maxFrame + 1);

        // Try to apply frame data synchronously
        const applied = applyFrameData(nextFrame);
        if (applied) {
          currentFrame = nextFrame;
          timeline.value = nextFrame;
          const timeSec = (nextFrame / targetFPS).toFixed(1);
          const gopIdx = getGopIndexForFrame(nextFrame);
          if (nextFrame === 0) {
            frameLabel.textContent = `I-Frame (${timeSec}s / ${TOTAL_DURATION.toFixed(1)}s)`;
          } else {
            frameLabel.textContent = `P-Frame ${nextFrame}/${maxFrame} (${timeSec}s / ${TOTAL_DURATION.toFixed(1)}s) [GOP ${gopIdx}]`;
          }
          // Update GOP strip highlight
          if (gopIdx >= 0) {
            const segs = gopStrip.querySelectorAll('.gop-seg');
            segs.forEach(s => { if (s.classList.contains('active')) s.classList.replace('active', 'loaded'); });
            const activeSeg = document.getElementById(`gop-seg-${gopIdx}`);
            if (activeSeg) { activeSeg.className = 'gop-seg active'; }
          }
          // Prefetch next GOP asynchronously
          if (gopIdx >= 0) triggerPrefetch(gopIdx);
        } else {
          // GOP not loaded — stall: hold current frame, trigger load
          diagStatsAccum.stallFrames++;
          const gopIdx = getGopIndexForFrame(nextFrame);
          frameLabel.textContent = `Loading GOP ${gopIdx}...`;
          if (gopIdx >= 0 && !gopCache.has(gopIdx) && !gopLoadingSet.has(gopIdx)) {
            loadGop(gopIdx);
          }
        }
      }
    }

    splatMesh.updateVersion();
    controls.update();
    renderer.render(scene, camera);

    frameCount++;
    if (now - lastFpsTime > 500) {
      document.getElementById('stat-fps').textContent =
        Math.round(frameCount / ((now - lastFpsTime) / 1000));
      frameCount = 0;
      lastFpsTime = now;
    }
  });

  // ============================================================
  // WebSocket for viewctl (preserved from old V4)
  // ============================================================
  const _isLocalhost = ['localhost', '127.0.0.1', '0.0.0.0', '[::1]'].includes(location.hostname);
  const wsUrl = 'ws://' + location.host + '/';
  let ws = null;
  window._viewctlWs = null;

  function connectWS() {
    if (!_isLocalhost) return;
    try {
      ws = new WebSocket(wsUrl);
      window._viewctlWs = ws;
      ws.onopen = () => console.log('[WS] Connected to viewctl');
      ws.onclose = () => { window._viewctlWs = null; setTimeout(connectWS, 3000); };
      ws.onerror = () => {};
      ws.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'setCamera') {
            if (msg.position) camera.position.fromArray(msg.position);
            if (msg.target) controls.target.fromArray(msg.target);
            controls.update();
            reportCamera();
          } else if (msg.type === 'rotateCamera') {
            const az = (msg.azimuth || 0) * Math.PI / 180;
            const el = (msg.elevation || 0) * Math.PI / 180;
            const off = new THREE.Vector3().subVectors(camera.position, controls.target);
            const r = off.length();
            let theta = Math.acos(Math.max(-1, Math.min(1, off.y / r)));
            let phi = Math.atan2(off.x, off.z);
            phi += az; theta = Math.max(0.01, Math.min(Math.PI - 0.01, theta + el));
            off.set(r * Math.sin(theta) * Math.sin(phi), r * Math.cos(theta),
                    r * Math.sin(theta) * Math.cos(phi));
            camera.position.copy(controls.target).add(off);
            controls.update();
            reportCamera();
          } else if (msg.type === 'setFrame') {
            updateFrame(msg.frame || 0);
          } else if (msg.type === 'requestScreenshot') {
            renderer.render(scene, camera);
            const dataUrl = renderer.domElement.toDataURL('image/png');
            ws.send(JSON.stringify({
              type: 'screenshotResult', dataUrl,
              width: renderer.domElement.width, height: renderer.domElement.height,
              camera: { position: camera.position.toArray(), target: controls.target.toArray() },
            }));
          } else if (msg.type === 'getDiagLogs') {
            ws.send(JSON.stringify({
              type: 'diagLogDump',
              logs: diagLogs.slice(-100),
              stats: diagStatsAccum,
              currentFrame,
            }));
          } else if (msg.type === 'refresh') {
            location.hash = '#refresh';
            location.reload();
          }
        } catch (e) {}
      };
    } catch (e) { setTimeout(connectWS, 3000); }
  }

  function reportCamera() {
    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({ type: 'cameraState',
        position: camera.position.toArray(), target: controls.target.toArray(),
        up: camera.up.toArray() }));
  }
  setInterval(() => {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: 'v4DiagStats',
        stats: { ...diagStatsAccum },
        currentFrame,
        gopCacheSize: gopCache.size,
      }));
    }
  }, 5000);
  setInterval(reportCamera, 1000);
  renderer.domElement.addEventListener('pointerup', () => setTimeout(reportCamera, 100));
  connectWS();
}

// ============================================================
// Frame management (direct — no Worker)
// ============================================================
function updateFrame(idx) {
  const applied = applyFrameData(idx);
  if (applied) {
    currentFrame = idx;
    timeline.value = idx;
    const timeSec = (idx / targetFPS).toFixed(1);
    const gopIdx = getGopIndexForFrame(idx);
    if (idx === 0) {
      frameLabel.textContent = `I-Frame (${timeSec}s / ${TOTAL_DURATION.toFixed(1)}s)`;
    } else {
      frameLabel.textContent = `P-Frame ${idx}/${manifest.p_frame_count} (${timeSec}s / ${TOTAL_DURATION.toFixed(1)}s) [GOP ${gopIdx}]`;
    }
    if (gopIdx >= 0) {
      const segs = gopStrip.querySelectorAll('.gop-seg');
      segs.forEach(s => { if (s.classList.contains('active')) s.classList.replace('active', 'loaded'); });
      const activeSeg = document.getElementById(`gop-seg-${gopIdx}`);
      if (activeSeg) activeSeg.className = 'gop-seg active';
      triggerPrefetch(gopIdx);
    }
  } else {
    // GOP not loaded — trigger async load
    const gopIdx = getGopIndexForFrame(idx);
    if (gopIdx >= 0) {
      loadGop(gopIdx).then(() => {
        // Retry applying after load
        if (currentFrame === idx || !isPlaying) {
          applyFrameData(idx);
          currentFrame = idx;
        }
      });
    }
  }
  diagStatsAccum.framesRequested++;
}

// ============================================================
// UI: Play/Pause, Timeline, Modes, Speed
// ============================================================
playBtn.addEventListener('click', () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '\u23F8' : '\u25B6';
});

timeline.addEventListener('input', (e) => {
  isPlaying = false;
  playBtn.textContent = '\u25B6';
  updateFrame(parseInt(e.target.value));
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    viewMode = btn.dataset.mode;
    if (viewMode === 'animated') {
      uViewMode.value = 0;
    } else if (viewMode === 'i-frame') {
      uViewMode.value = 1;
      uFrameIndex.value = 0;
      currentFrame = 0;
      timeline.value = 0;
      isPlaying = false;
      playBtn.textContent = '\u25B6';
    } else if (viewMode === 'highlight') {
      uViewMode.value = 2;
      uFrameIndex.value = 0;
      isPlaying = false;
      playBtn.textContent = '\u25B6';
    }
    splatMesh.updateGenerator();
  });
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playbackSpeedMult = parseFloat(btn.dataset.speed);
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); playBtn.click(); }
  else if (e.key === 'ArrowRight') updateFrame(Math.min(currentFrame + 1, manifest.p_frame_count));
  else if (e.key === 'ArrowLeft') updateFrame(Math.max(currentFrame - 1, 0));
});

window._viewer = {
  updateFrame: (f) => updateFrame(f),
  getFrame: () => currentFrame,
  setSpeed: (s) => { playbackSpeedMult = s; },
  getMemory: () => performance.memory ? {
    usedMB: (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1),
    totalMB: (performance.memory.totalJSHeapSize / 1024 / 1024).toFixed(1),
  } : null,
  getDiag: () => ({
    stats: { ...diagStatsAccum },
    currentFrame,
    gopCacheSize: gopCache.size,
    cacheMode: persistCache.mode,
    logs: diagLogs.slice(-50),
  }),
  dumpDiag: () => {
    const d = window._viewer.getDiag();
    console.table([d.stats]);
    console.log('[V4 Diag] Recent logs:', d.logs);
    return d;
  },
};

init().catch(err => { console.error('Init failed:', err); loadingText.textContent = 'Error: ' + err.message; });
</script>
</body>
</html>
