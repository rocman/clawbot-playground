<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tower Battle — 双人联机</title>
<meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1b2e;color:#eee;
  font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;}
html{font-size:80%;}
body{display:flex;flex-direction:column;}

/* ── Header ── */
#top-bar{
  flex-shrink:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;gap:8px;
}
#top-bar h1{justify-self:start;}
#conn-badge{justify-self:center;}
#hud-area{justify-self:end;}
#top-bar h1{font-size:1rem;letter-spacing:1px;color:#e94560;white-space:nowrap;}
.hud-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.hud-item{font-size:0.78rem;color:#fdcb6e;font-weight:bold;white-space:nowrap;}
.conn-badge{font-size:0.72rem;padding:2px 8px;border-radius:12px;font-weight:bold;white-space:nowrap;}
.conn-badge.waiting{background:#444;color:#aaa;}
.conn-badge.connected{background:#00b894;color:#fff;}
.conn-badge.disconnected{background:#e94560;color:#fff;}

/* ── Content ── */
#content{flex:1;min-height:0;display:flex;overflow:hidden;}

/* Landscape */
@media (orientation:landscape){
  #content{flex-direction:row;align-items:stretch;}
  #map-wrap{
    flex:0 0 min(100vh, calc(100vw - 420px));
    width:min(100vh, calc(100vw - 420px));
    height:min(100vh, calc(100vw - 420px));
    align-self:center;
  }
  #sidebar{
    display:flex!important;flex-direction:column;
    flex:1 1 420px;min-width:420px;min-height:0;align-self:stretch;
    background:#16213e;border-left:2px solid #0f3460;overflow:hidden;
  }
  #panel-scroll-pt{display:none!important;}
}

/* Portrait */
@media (orientation:portrait){
  #content{flex-direction:column;align-items:center;flex:1;min-height:0;}
  #sidebar{display:none!important;}
  #map-wrap{width:100%;flex:0 0 auto;}
  #panel-scroll-pt{display:flex!important;flex:1;min-height:0;width:100%;}
}

/* ── Map ── */
#map-wrap{display:flex;align-items:center;justify-content:center;
  background:#0d1b2e;overflow:hidden;padding:8px;}
#map-area{flex-shrink:0;position:relative;overflow:hidden;aspect-ratio:1/1;width:100%;}
canvas{display:block;width:100%;height:100%;}

/* ── Toast ── */
#toast-container{
  position:absolute;inset:0;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;z-index:50;
}
.toast{
  padding:10px 22px;border-radius:10px;font-size:1rem;font-weight:bold;
  text-align:center;white-space:pre-line;line-height:1.4;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  animation:toastIn .25s ease, toastOut .5s ease 2.2s forwards;
  max-width:85%;
}
.toast.breach{background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;}
.toast.milestone{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#2d3436;font-size:1.1rem;}
.toast.warn{background:linear-gradient(135deg,#e17055,#d35400);color:#fff;}
.toast.info{background:linear-gradient(135deg,#0984e3,#0652dd);color:#fff;}
.toast.skill{background:linear-gradient(135deg,#6c5ce7,#5541d1);color:#fff;}
@keyframes toastIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes toastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.8)}}

/* ── Target overlay ── */
#target-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.6);z-index:80;
  align-items:center;justify-content:center;
}
#target-overlay.show{display:flex;}
#target-panel{
  background:#16213e;border:2px solid #e94560;border-radius:12px;
  padding:14px 16px;min-width:200px;max-width:90vw;
}
#target-panel h3{color:#e94560;font-size:.9rem;margin-bottom:10px;text-align:center;}
#target-list{display:flex;flex-direction:column;gap:6px;}
.target-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:8px;
  background:#0f3460;border:1px solid #0984e3;cursor:pointer;
  font-size:.82rem;
}
.target-item:hover{background:#1a4a8a;}
.target-item .t-hp{margin-left:auto;color:#aaa;font-size:.75rem;}
#target-cancel{
  margin-top:10px;width:100%;padding:7px;
  background:#444;color:#eee;border:none;border-radius:8px;
  cursor:pointer;font-size:.82rem;
}
#target-cancel:hover{background:#555;}

/* ── Sidebar ── */
#sidebar{display:none;}
#sidebar-header{
  flex-shrink:0;padding:8px 12px;border-bottom:1px solid #0f3460;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
#sidebar-header h2{font-size:0.85rem;color:#fdcb6e;}
#panel-scroll{
  flex:1;min-height:0;flex-direction:column;
  flex-wrap:nowrap;width:100%;display:flex;
  padding:6px 8px 8px;gap:6px;overflow:hidden;
}

/* ── Portrait panel scroll ── */
#panel-scroll-pt{
  display:none;flex-direction:column;overflow:hidden;
  padding:0;gap:0;box-sizing:border-box;
}
#wave-bar-pt{
  display:flex;flex-shrink:0;width:100%;
  flex-direction:row;align-items:stretch;
  gap:5px;padding:6px 8px;background:#16213e;border-top:1px solid #0f3460;
}

/* ── Panels ── */
.panel{
  flex:1;min-width:0;min-height:0;
  background:#16213e;border:1px solid #0f3460;border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-title{
  font-size:0.68rem;font-weight:bold;color:#aaa;letter-spacing:.5px;text-transform:uppercase;
  padding:6px 8px 4px;border-bottom:1px solid #0f3460;flex-shrink:0;
}
.panel-tabs{display:flex;flex-shrink:0;border-bottom:1px solid #0f3460;}
.ptab{
  flex:1;padding:6px 0;border:none;background:none;
  color:#aaa;font-size:0.72rem;font-weight:bold;cursor:pointer;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.ptab.active{color:#fdcb6e;border-bottom-color:#fdcb6e;}
.tab-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:6px;}
.tab-body.hidden{display:none!important;}

/* ── Unit cards ── */
.unit-card{background:#1a2a4a;border:1px solid #0f3460;border-radius:6px;
  padding:5px 8px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.unit-card.hover{background:#1e3360;}
.unit-card.pressed{background:#162040;}
.unit-card.disabled{opacity:.4;cursor:not-allowed;}
.unit-icon{font-size:1.3rem;flex-shrink:0;}
.unit-info{flex:1;min-width:0;}
.unit-name{font-size:0.76rem;font-weight:bold;}
.unit-desc{font-size:0.6rem;color:#aaa;margin-top:1px;}
.unit-cost{font-size:0.72rem;color:#fdcb6e;font-weight:bold;flex-shrink:0;}

/* ── Skill cards ── */
.skill-card{
  background:#1a2a4a;border:1px solid #0f3460;border-radius:6px;
  padding:5px 8px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.skill-card.hover{background:#1e3360;}
.skill-card.pressed{background:#162040;}
.skill-card.disabled{opacity:.4;cursor:not-allowed;}
.skill-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6);}
.skill-icon{font-size:1.3rem;flex-shrink:0;}
.skill-info{flex:1;min-width:0;}
.skill-name{font-size:0.76rem;font-weight:bold;}
.skill-desc{font-size:0.6rem;color:#aaa;margin-top:1px;}
.skill-cost{font-size:0.72rem;color:#fdcb6e;font-weight:bold;flex-shrink:0;}
.skill-lock-tag{font-size:0.58rem;color:#e94560;margin-top:1px;}
.skill-inline-tag{font-size:0.62rem;margin-left:5px;opacity:.85;vertical-align:middle;}

/* ── Turret cards (defender) ── */
.turret-card{
  background:#1a2a4a;border:1px solid #0f3460;border-radius:6px;
  padding:6px 8px;display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.turret-card.active{border-color:#00b894;}
.turret-card.dead{opacity:.5;border-color:#636e72;}
.turret-icon{font-size:1.2rem;flex-shrink:0;}
.turret-info{flex:1;min-width:0;}
.turret-name{font-size:0.74rem;font-weight:bold;}
.turret-stats{font-size:0.58rem;color:#aaa;margin-top:1px;}
.turret-hp-bar{height:4px;border-radius:2px;background:#333;margin-top:3px;overflow:hidden;}
.turret-hp-fill{height:100%;border-radius:2px;transition:width .3s;}
.turret-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.tbt{
  padding:4px 8px;border:none;border-radius:4px;cursor:pointer;
  font-size:0.66rem;font-weight:bold;white-space:nowrap;
}
.tbt.build{background:#0984e3;color:#fff;}
.tbt.build:hover:not(:disabled){background:#0773c5;}
.tbt.repair{background:#00b894;color:#fff;}
.tbt.repair:hover:not(:disabled){background:#009b7d;}
.tbt:disabled{background:#444;color:#666;cursor:not-allowed;}

/* ── Queue ── */
#queue-list{
  padding:4px 6px;
  display:flex;flex-direction:column;gap:2px;
  min-width:0;overflow:hidden;
}
.qi-row-wrap{display:flex;align-items:center;gap:4px;height:40px;flex-shrink:0;min-width:0;overflow-y:hidden;}
.queue-bottom-bar{display:flex;align-items:center;gap:4px;min-width:0;}
.queue-bottom-bar .qi-row-wrap{flex:1;min-width:0;}
.queue-bottom-bar .btn-send-inline{flex-shrink:0;}
.qi-row-label{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-size:0.58rem;color:#666;letter-spacing:1px;
  flex-shrink:0;white-space:nowrap;
}
.qi-row{
  display:flex;flex-wrap:nowrap;
  flex:1;min-width:0;
  overflow-x:auto;
  padding:2px 0 4px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.qi-row::-webkit-scrollbar{display:none;}
@keyframes chipIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.qi-chip-wrap{display:inline-flex;overflow:hidden;margin-right:6px;flex-shrink:0;vertical-align:top;}
.qi-chip{overflow:hidden;
  width:30px;height:30px;margin-right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:6px;border:1.5px solid;
  font-size:1rem;line-height:1;
  flex-shrink:0;position:relative;
  user-select:none;
}
.qi-chip.field{background:#0a1a2e;border-color:#0984e3;}
.qi-chip.pending{background:#0a2a1a;border-color:#00b894;cursor:pointer;}
.qi-chip.new{animation:chipIn .2s ease forwards;}
.qi-chip .qi-badge{
  position:absolute;bottom:2px;right:3px;
  font-size:0.5rem;color:#aaa;line-height:1;
}
.queue-empty-msg{color:#555;font-size:0.72rem;padding:8px;text-align:center;}

/* ── Wave bar ── */
.wave-bar{
  flex-shrink:0;display:flex;flex-direction:row;align-items:stretch;
  gap:5px;padding:7px 8px;background:#16213e;border-top:1px solid #0f3460;
}
.wave-btn{
  flex:1;border:none;border-radius:6px;cursor:pointer;
  font-size:0.8rem;font-weight:bold;transition:background .2s;
  display:flex;align-items:center;justify-content:center;height:44px;
}
.wave-btn:disabled{background:#444;color:#888;cursor:not-allowed;}
.btn-send-inline{
  flex-shrink:0;
  height:30px;padding:0 8px;
  background:#e94560;color:#fff;
  border:none;border-radius:6px;
  font-size:0.72rem;font-weight:700;cursor:pointer;
  white-space:nowrap;align-self:center;
}
.btn-send-inline:hover:not(:disabled){background:#c0392b;}
.btn-send-inline:disabled{background:#555;color:#888;cursor:not-allowed;}
.speed-group{flex:1;display:flex;flex-direction:row;align-items:stretch;height:44px;}
.speed-adj{
  flex:0 0 40px;width:40px;
  padding:0;font-size:1.2rem;font-weight:bold;text-align:center;
  background:#0f3460;color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.speed-adj:hover:not(:disabled){background:#1a4a8a;}
.speed-adj:disabled{color:#555;cursor:not-allowed;}
#btn-speed-dn{border-radius:6px 0 0 6px;}
#btn-speed-up{border-radius:0 6px 6px 0;}
#speed-display{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:bold;color:#0f3460;background:#fff;
}

/* ── Log ── */
#log{flex:1;min-height:0;overflow-y:auto;padding:6px 8px;font-size:0.68rem;color:#aaa;line-height:1.6;}
#log p{margin-bottom:2px;}

/* ── Overlay ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);gap:14px;z-index:100;padding:20px;
}
#overlay.hidden{display:none;}
#overlay h2{font-size:1.5rem;color:#e94560;}
#overlay p{color:#aaa;font-size:0.88rem;text-align:center;max-width:320px;}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:bold;}
.btn.red{background:#e94560;color:#fff;}
.btn.blue{background:#0984e3;color:#fff;}
.btn.green{background:#00b894;color:#fff;}
.btn.gray{background:#444;color:#eee;}

/* ── QR / connection ── */
#qr-wrap{background:#fff;padding:10px;border-radius:8px;display:inline-block;}
#qr-wrap canvas{display:block;}
.join-url{font-size:0.72rem;color:#74b9ff;word-break:break-all;text-align:center;max-width:320px;}

/* ── Peer info corner ── */
#peer-info{
  position:absolute;top:4px;right:4px;z-index:20;
  background:rgba(22,33,62,.85);border:1px solid #0f3460;
  border-radius:8px;padding:5px 8px;font-size:0.65rem;color:#aaa;
  line-height:1.5;min-width:120px;max-width:160px;
}
#peer-info .pi-row{display:flex;justify-content:space-between;gap:6px;}
#peer-info .pi-val{color:#fdcb6e;font-weight:bold;}
</style>
</head>
<body>

<!-- Top bar -->
<header id="top-bar">
  <h1>🗼 Tower Battle</h1>
  <span class="conn-badge waiting" id="conn-badge">⏳ 等待连接</span>
  <div class="hud-row" id="hud-area">
    <span class="hud-item">💰<span id="hud-gold">0</span></span>
    <span class="hud-item">🌊<span id="hud-wave">0/15</span></span>
    <span class="hud-item" id="hud-quota-wrap">⚡<span id="hud-quota">—</span></span>
  </div>
</header>

<div id="content">
  <!-- Map -->
  <div id="map-wrap">
    <div id="map-area">
      <canvas id="canvas"></canvas>
      <div id="toast-container"></div>
      <div id="target-overlay">
        <div id="target-panel">
          <h3>🎯 选择打击目标</h3>
          <div id="target-list"></div>
          <button id="target-cancel">取消</button>
        </div>
      </div>
      <!-- Peer overview corner -->
      <div id="peer-info" style="display:none"></div>
    </div>
  </div>

  <!-- Portrait scroll -->
  <div id="panel-scroll-pt">
    <div style="flex:1;min-height:0;display:flex;flex-direction:row;padding:4px 8px;gap:6px;overflow:hidden;" id="pt-cols">
      <!-- left panel -->
      <div class="panel" id="left-panel-pt" style="flex:0 0 calc(50% - 3px);min-width:0;overflow:hidden;">
        <div class="panel-tabs" id="tab-row-pt">
          <button class="ptab active" data-tab="units" onclick="switchTab('units')">🪖 兵种</button>
          <button class="ptab" data-tab="skills" onclick="switchTab('skills')">✨ 技能</button>
          <button class="ptab" data-tab="turrets" onclick="switchTab('turrets')" id="tab-turrets-pt" style="display:none">🏰 炮台</button>
        </div>
        <div id="unit-list-pt" class="tab-body"></div>
        <div id="skill-list-pt" class="tab-body hidden"></div>
        <div id="turret-list-pt" class="tab-body hidden"></div>
      </div>
      <!-- right panel: queue + log -->
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;overflow:hidden;">
        <div class="panel" style="flex:0 0 auto;">
          <div class="panel-title">⚔️ 队列</div>
          <div id="queue-list-pt"><div class="queue-empty-msg">暂无</div></div>
          <button class="btn-send-inline" id="btn-send-pt" disabled>发兵</button>
        </div>
        <div class="panel" style="flex:1 1 0;min-height:0;">
          <div class="panel-title">📡 战报</div>
          <div id="log-pt" style="flex:1;min-height:0;overflow-y:auto;padding:4px 6px;font-size:0.62rem;color:#aaa;line-height:1.5;"></div>
        </div>
      </div>
    </div>
    <div class="wave-bar" id="wave-bar-pt">
      <button class="wave-btn" id="btn-mode-pt" style="flex:0 0 25%;background:#6c5ce7;color:#fff;">单发 ↓</button>
      <div class="speed-group">
        <button class="speed-adj" id="btn-speed-dn-pt">−</button>
        <div id="speed-display-pt" style="flex:1;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:bold;color:#0f3460;background:#fff;">1×</div>
        <button class="speed-adj" id="btn-speed-up-pt">+</button>
      </div>
      <button class="wave-btn" id="btn-pause-pt" disabled style="flex:0 0 25%;background:#fdcb6e;color:#2d3436;">⏸ 暂停</button>
    </div>
  </div>

  <!-- Sidebar (landscape) -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2 id="role-title">⚔️ 攻方控制台</h2>
      <div class="hud-row">
        <span class="hud-item">💰<span id="hud-gold-l">0</span></span>
        <span class="hud-item">🌊<span id="hud-wave-l">0/15</span></span>
        <span class="hud-item" id="hud-quota-wrap-l">⚡<span id="hud-quota-l">—</span></span>
      </div>
    </div>
    <div id="panel-scroll">
      <div class="panel" id="left-panel" style="flex:2 1 0;">
        <div class="panel-tabs" id="tab-row">
          <button class="ptab active" data-tab="units" onclick="switchTab('units')">🪖 兵种</button>
          <button class="ptab" data-tab="skills" onclick="switchTab('skills')">✨ 技能</button>
          <button class="ptab" data-tab="turrets" onclick="switchTab('turrets')" id="tab-turrets" style="display:none">🏰 炮台</button>
        </div>
        <div id="unit-list" class="tab-body"></div>
        <div id="skill-list" class="tab-body hidden"></div>
        <div id="turret-list" class="tab-body hidden"></div>
      </div>
      <div class="panel" id="queue-panel" style="flex:0 0 auto;">
        <div class="panel-title">⚔️ 场上/队列</div>
        <div id="queue-list"><div class="queue-empty-msg">暂无</div></div>
        <button class="btn-send-inline" id="btn-send" disabled>发兵</button>
      </div>
      <div class="panel" id="log-panel" style="flex:1 1 0;min-height:60px;">
        <div class="panel-title">📡 战报</div>
        <div id="log"></div>
      </div>
    </div>
    <div class="wave-bar" id="wave-bar">
      <button class="wave-btn" id="btn-mode" style="flex:0 0 25%;background:#6c5ce7;color:#fff;">单发 ↓</button>
      <div class="speed-group">
        <button class="speed-adj" id="btn-speed-dn">−</button>
        <div id="speed-display">1×</div>
        <button class="speed-adj" id="btn-speed-up">+</button>
      </div>
      <button class="wave-btn" id="btn-pause" disabled style="flex:0 0 25%;background:#fdcb6e;color:#2d3436;">⏸ 暂停</button>
    </div>
  </div>
</div>

<!-- Main overlay (lobby / end game) -->
<div id="overlay">
  <h2>🗼 Tower Battle</h2>
  <p>双人联机塔防对战</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn red" id="btn-host">🏠 建立主机（攻方）</button>
    <button class="btn blue" id="btn-join-ui">📱 扫码加入（守方）</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
document.addEventListener('dblclick', e => e.preventDefault(), {passive:false});

// ═══════════════════════════════════════════════
//  GAME CONSTANTS
// ═══════════════════════════════════════════════
const COLS=12,ROWS=12;

function updateCanvasResolution(){
  const size=Math.round(mapArea.getBoundingClientRect().width);
  if(size<60)return;
  if(canvas.width===size&&canvas.height===size)return;
  TILE=size/COLS; canvas.width=size; canvas.height=size;
  rebuildWP(); drawMap();
}
let roTimer;
const ro=new ResizeObserver(()=>{clearTimeout(roTimer);roTimer=setTimeout(updateCanvasResolution,30);});
ro.observe(mapArea);

function buildPath(){
  let start=null;
  outer:for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(MAP_LAYOUT[r][c]===T_START){start={c,r};break outer;}
  const visited=new Set(), path=[];
  let cur=start; visited.add(`${cur.c},${cur.r}`);
  path.push({x:cur.c*TILE+TILE/2,y:cur.r*TILE+TILE/2});
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(true){
    let moved=false;
    for(const[dc,dr]of dirs){
      const nc=cur.c+dc,nr=cur.r+dr,key=`${nc},${nr}`;
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS||visited.has(key))continue;
      const t=MAP_LAYOUT[nr][nc];
      if(t===T_PATH||t===T_END){
        visited.add(key);path.push({x:nc*TILE+TILE/2,y:nr*TILE+TILE/2});
        cur={c:nc,r:nr};moved=true;if(t===T_END)return path;break;
      }
    }
    if(!moved)break;
  }
  return path;
}
function rebuildWP(){PATH_WP=buildPath();}

const TC={[T_GRASS]:'#0d1b2e',[T_PATH]:'#c8a05a',[T_START]:'#e94560',[T_END]:'#00b894'};
function drawMap(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t=MAP_LAYOUT[r][c];
    ctx.fillStyle=TC[t]??TC[T_GRASS]; ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=.5;ctx.strokeRect(c*TILE,r*TILE,TILE,TILE);
    if(t===T_START||t===T_END){
      ctx.font=`${TILE*.52}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(t===T_START?'🚩':'🏁',c*TILE+TILE/2,r*TILE+TILE/2);
    }
  }
}

//  TURRET SCALING
// ═══════════════════════════════════════════════
function scaleTurrets(wave){
  const w=Math.max(1,wave);
  const dmgMult=1+(w-1)*0.025;
  const rateMult=1+(w-1)*0.012;
  const rangeBon=Math.floor((w-1)/5)*0.30;
  for(const t of FAKE_TURRETS){
    t.dmg=t.baseDmg*dmgMult;
    t.rate=t.baseRate*rateMult;
    t.range=t.baseRange+rangeBon;
    t.tier=w<=4?0:w<=8?1:w<=12?2:3;
    const baseHp=t.buildCost*3;
    if(t.maxHp===undefined||!t.active) t.maxHp=baseHp*(1+(w-1)*0.08);
    if(t.hp===undefined||!t.active) t.hp=t.maxHp;
  }
}

function addBlast(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, spd=40+Math.random()*90;
    blasts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,r:3+Math.random()*4});
  }
}
function updateBlasts(dt){
  for(let i=blasts.length-1;i>=0;i--){
    const b=blasts[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.vx*=0.85;b.vy*=0.85;b.life-=dt*2;
    if(b.life<=0)blasts.splice(i,1);
  }
}
function drawBlasts(){
  for(const b of blasts){
    ctx.globalAlpha=Math.max(0,b.life);
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*b.life,0,Math.PI*2);
    ctx.fillStyle=`hsl(${20+Math.random()*40},100%,60%)`;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function kindHue(kind){return {basic:0,gatling:150,sniper:210,slow:185,splash:20}[kind]??0;}

function drawFakeTurrets(){
  for(const t of FAKE_TURRETS){
    if(!t.active)continue;
    const tx=t.c*TILE+TILE/2,ty=t.r*TILE+TILE/2,r=TILE*.35;
    const tier=t.tier??0,kind=t.kind??'basic';
    const kdef=TURRET_KINDS[kind];
    const bodyCol=tier===0?kdef.color:`hsl(${kindHue(kind)},40%,${12+tier*5}%)`;
    const ringCol=kdef.ring;
    ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);
    ctx.fillStyle=bodyCol;ctx.fill();
    ctx.strokeStyle=ringCol;ctx.lineWidth=tier>0?2:1.5;ctx.stroke();
    if(tier>=2){ctx.strokeStyle=ringCol+'44';ctx.lineWidth=4;ctx.beginPath();ctx.arc(tx,ty,r+3,0,Math.PI*2);ctx.stroke();}
    ctx.font=`${TILE*.34}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(kdef.icon,tx,ty);
    if(tier>0){ctx.font=`bold ${TILE*.22}px sans-serif`;ctx.fillStyle=ringCol;ctx.fillText(['','★','★★','★★★'][tier],tx,ty+r+TILE*.18);}
    if(t.hp!=null&&t.maxHp){
      const pct=t.hp/t.maxHp;
      const bw=TILE*.7,bh=4,bx=tx-bw/2,by=Math.max(1,ty-r-8);
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=pct>0.6?'#00b894':pct>0.3?'#fdcb6e':'#e17055';
      ctx.fillRect(bx,by,bw*pct,bh);
    }
  }
}

function updateFakeTurrets(dt){
  for(const t of FAKE_TURRETS){
    if(!t.active)continue;
    if(t.cd>0){t.cd-=dt*gameSpeed;continue;}
    const range=(t.range??2.2)*TILE;
    const tx=t.c*TILE+TILE/2,ty=t.r*TILE+TILE/2;
    const kind=t.kind??'basic';
    const kdef=TURRET_KINDS[kind];
    const ringCol=(kdef?.ring??'#636e72')+'99';
    // check blind skill
    const rateMultiplier=activeSkills.blind?0.5:1;
    const inRange=enemies.filter(e=>!e.dead&&!e.reached&&Math.hypot(e.x-tx,e.y-ty)<range);
    if(!inRange.length)continue;
    let target=null;
    if(kind==='gatling')target=inRange.reduce((a,b)=>a.hp<b.hp?a:b);
    else if(kind==='sniper')target=inRange.reduce((a,b)=>a.wpIdx>b.wpIdx?a:b);
    else target=inRange.reduce((a,b)=>Math.hypot(a.x-tx,a.y-ty)<Math.hypot(b.x-tx,b.y-ty)?a:b);
    t.cd=1/((t.rate??1)*rateMultiplier);
    if(kind==='splash'){
      const splashR=TILE*1.2;
      inRange.forEach(e=>{if(Math.hypot(e.x-target.x,e.y-target.y)<splashR)e.takeDamage(t.dmg??12);});
      ctx.strokeStyle=ringCol;ctx.lineWidth=2;ctx.beginPath();ctx.arc(target.x,target.y,splashR,0,Math.PI*2);ctx.stroke();
    } else {
      target.takeDamage(t.dmg??18);
      if(kind==='slow'){target.slowTimer=2.0;target.speed=target.def.speed*(target.mods?.speedMult??1)*0.5;}
    }
    ctx.strokeStyle=ringCol;ctx.lineWidth=kind==='sniper'?2.5:1.5;
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(target.x,target.y);ctx.stroke();
  }
}

// ═══════════════════════════════════════════════
//  ENEMY CLASS
// ═══════════════════════════════════════════════
class Enemy{
  constructor(type,mods){
    this.id=++_enemyIdCounter;
    this.type=type; this.def=UNIT_DEFS[type];
    this.mods=mods||{};
    this.hp=this.def.hp*(mods?.hpMult??1); this.maxHp=this.hp;
    this.speed=this.def.speed*(mods?.speedMult??1);
    this.hasShield=mods?.shield??false;
    this.progress=0; this.wpIdx=0;
    if(!PATH_WP.length)rebuildWP();
    this.x=PATH_WP[0]?.x??0; this.y=PATH_WP[0]?.y??0;
    this.dead=false; this.reached=false;
    onFieldUnits.set(this.id,{icon:this.def.icon,name:this.def.name});
  }
  takeDamage(d){
    if(this.hasShield){this.hasShield=false;return;}
    this.hp-=d;
    if(this.hp<=0){
      this.dead=true;onFieldUnits.delete(this.id);
      defenderGold+=Math.round(this.def.cost*0.35);
    }
  }
  update(dt){
    if(this.dead||this.reached)return;
    if(this.slowTimer>0){
      this.slowTimer-=dt*gameSpeed;
      if(this.slowTimer<=0){this.slowTimer=0;this.speed=this.def.speed*(this.mods?.speedMult??1);}
    }
    let rem=this.speed*dt*gameSpeed;
    while(rem>0){
      const wp=PATH_WP[Math.floor(this.progress)+1];
      if(!wp){this.reached=true;onBreach(this);onFieldUnits.delete(this.id);return;}
      const dx=wp.x-this.x,dy=wp.y-this.y,dist=Math.hypot(dx,dy);
      if(dist<=rem){this.x=wp.x;this.y=wp.y;this.progress++;this.wpIdx++;rem-=dist;}
      else{this.x+=dx/dist*rem;this.y+=dy/dist*rem;this.progress+=rem/TILE;rem=0;}
    }
  }
  draw(){
    if(this.dead||this.reached)return;
    const r=this.def.size*(TILE/40);
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=this.def.color;ctx.fill();
    if(this.hasShield){ctx.strokeStyle='#74b9ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(this.x,this.y,r+3,0,Math.PI*2);ctx.stroke();}
    ctx.font=`${TILE*.32}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.def.icon,this.x,this.y);
    const bw=r*2.2,bh=3,bx=this.x-bw/2,by=this.y-r-5;
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=this.hp/this.maxHp>.5?'#55efc4':'#fdcb6e';
    ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
  }
}

function showToast(msg,kind='breach'){
  const tc=document.getElementById('toast-container');
  if(!tc)return;
  const d=document.createElement('div');
  d.className=`toast ${kind}`;d.textContent=msg;
  tc.appendChild(d);setTimeout(()=>d.remove(),2800);
}

function log(msg){
  ['log','log-pt'].forEach(id=>{
    const div=document.getElementById(id);if(!div)return;
    const p=document.createElement('p');p.textContent=msg;
    div.appendChild(p);div.scrollTop=div.scrollHeight;
  });
}

function calcQuota(wave){return 4+wave*3.0;}
function calcQueueWeight(queue){
  return queue.reduce((s,i)=>{
    if(i.kind==='unit') return s+(UNIT_DEFS[i.key]?.weight??1);
    if(i.kind==='skill') return s+(SKILL_DEFS[i.key]?.weight??0);
    return s;
  },0);
}
function waveGold(n){
  const base=300+(n-1)*80+Math.max(0,n-5)*40+(n>=10?(n-9)*80:0);
  return Math.round(base);
}

function updateHUD(){
  const g=role==='guest'?defenderGold:gold;
  const qCost=pendingQueue.reduce((s,i)=>s+i.cost,0);
  const qWeight=calcQueueWeight(pendingQueue);
  const dispGold=role==='guest'?defenderGold:(gold-qCost);
  const wv=`${waveNum}/15`;
  const fmt=v=>Number.isInteger(v)?v:v.toFixed(1);
  const quota=role==='host'?(waveActive?`${fmt(Math.max(0,waveQuota-quotaUsed-qWeight))}`:`${fmt(Math.max(0,calcQuota(waveNum+1)+_bonusQuota-qWeight))}`):null;
  document.getElementById('hud-gold').textContent=dispGold;
  document.getElementById('hud-wave').textContent=wv;
  if(document.getElementById('hud-gold-l')) document.getElementById('hud-gold-l').textContent=dispGold;
  if(document.getElementById('hud-wave-l')) document.getElementById('hud-wave-l').textContent=wv;
  const qw=document.getElementById('hud-quota-wrap');
  const qwl=document.getElementById('hud-quota-wrap-l');
  if(role==='host'){
    if(qw){qw.style.display='';document.getElementById('hud-quota').textContent=quota;}
    if(qwl){qwl.style.display='';document.getElementById('hud-quota-l').textContent=quota;}
  } else {
    if(qw) qw.style.display='none';
    if(qwl) qwl.style.display='none';
  }
}

function sapperDmg(t){return Math.max(80,(t.maxHp??200)*0.15);}
function damageTurret(t,dmg,isSapper=false){
  const d=isSapper?sapperDmg(t):dmg;
  t.hp=Math.max(0,(t.hp??t.maxHp??100)-d);
  if(t.hp<=0){t.active=false;t.hp=0;return true;}
  return false;
}

function onBreach(enemy){
  if(enemy.def.saboteur){
    const targets=FAKE_TURRETS.filter(t=>t.active);
    if(targets.length){
      const t=targets.reduce((a,b)=>((a.hp??a.maxHp??1)<(b.hp??b.maxHp??1))?a:b);
      const destroyed=damageTurret(t,0,true);
      const tx=t.c*TILE+TILE/2,ty=t.r*TILE+TILE/2;
      if(destroyed)addBlast(tx,ty);
      const hpPct=destroyed?0:Math.ceil((t.hp??0)/(t.maxHp??1)*100);
      showToast(destroyed?`🧨 工兵摧毁一座炮塔！`:`🧨 工兵重创炮塔！HP ${hpPct}%`,'breach');
      log(`🧨 工兵突入，炮台HP ${hpPct}%${destroyed?' ✅已摧毁':''}`);
      if(role==='guest')buildTurretCards();
    } else {
      breachCount++;gold+=enemy.def.cost*2;
      showToast(`🧨 ${enemy.def.name}突破（无塔可炸）`,'breach');
      log(`🧨 工兵突入但无炮塔可摧毁`);
    }
    updateHUD();return;
  }
  const reward=enemy.def.cost*2;
  breachCount++;gold+=reward;
  showToast(`💥 ${enemy.def.icon}${enemy.def.name} 突破！\n+💰${reward}`,'breach');
  log(`💥 ${enemy.def.name}突破！+💰${reward}（累计${breachCount}次）`);
  checkMilestones();updateHUD();buildUnitCards();buildSkillCards();
}

function checkMilestones(){
  for(const ms of MILESTONES){
    if(!reachedMilestones.has(ms.at)&&breachCount>=ms.at){
      reachedMilestones.add(ms.at);
      gold+=ms.gold;
      if(ms.unlock)unlockedSkills.add(ms.unlock);
      showToast(`🏆 ${ms.label}\n+💰${ms.gold}${ms.unlock?' · 解锁'+SKILL_DEFS[ms.unlock].icon:''}`, 'milestone');
      log(`🏆 里程碑：${ms.desc} +💰${ms.gold}`);
      updateHUD();buildUnitCards();buildSkillCards();
    }
  }
}

// ═══════════════════════════════════════════════
//  CARD EVENTS
// ═══════════════════════════════════════════════
function bindCardEvents(card,isDisabled,onClick){
  if(isDisabled)return;
  let touchMoved=false;
  card.addEventListener('touchstart',()=>{touchMoved=false;card.classList.add('pressed');},{passive:true});
  card.addEventListener('touchmove',()=>{touchMoved=true;card.classList.remove('pressed');},{passive:true});
  card.addEventListener('touchend',e=>{
    card.classList.remove('pressed');
    if(!touchMoved){e.preventDefault();onClick();}
  });
  card.addEventListener('mouseenter',()=>card.classList.add('hover'));
  card.addEventListener('mouseleave',()=>card.classList.remove('hover','pressed'));
  card.addEventListener('mousedown',()=>card.classList.add('pressed'));
  card.addEventListener('mouseup',()=>card.classList.remove('pressed'));
  card.addEventListener('click',()=>onClick());
}

// ═══════════════════════════════════════════════
//  UNIT CARDS (attacker)
// ═══════════════════════════════════════════════
function buildUnitCards(){
  if(role!=='host')return;
  ['unit-list','unit-list-pt'].forEach(id=>{
    const ul=document.getElementById(id);if(!ul)return;
    ul.innerHTML='';
    const dispGold=gold-pendingQueue.reduce((s,i)=>s+i.cost,0);
    const usedWeight=calcQueueWeight(pendingQueue);
    const quota=waveActive?waveQuota-quotaUsed:calcQuota(waveNum+1)+_bonusQuota;
    Object.entries(UNIT_DEFS).forEach(([key,def])=>{
      const canAfford=def.cost<=dispGold;
      const hasQuota=(def.weight??1)+usedWeight<=quota;
      const active=gameState==='playing'||gameState==='paused';
      const ok=canAfford&&hasQuota&&active;
      const card=document.createElement('div');
      card.className='unit-card'+(ok?'':' disabled');
      card.setAttribute('tabindex','-1');
      card.innerHTML=`<div class="unit-icon">${def.icon}</div>
        <div class="unit-info"><div class="unit-name">${def.name}</div><div class="unit-desc">${def.desc}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
          <div class="unit-cost">💰${def.cost}</div>
          <div style="font-size:0.6rem;color:#74b9ff">⚡${def.weight??1}</div>
        </div>`;
      bindCardEvents(card,!ok,()=>enqueue('unit',key));
      ul.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════
//  SKILL CARDS (attacker)
// ═══════════════════════════════════════════════
function buildSkillCards(){
  if(role!=='host')return;
  ['skill-list','skill-list-pt'].forEach(id=>{
    const sl=document.getElementById(id);if(!sl)return;
    sl.innerHTML='';
    const dispGold=gold-pendingQueue.reduce((s,i)=>s+i.cost,0);
    const usedWeight=calcQueueWeight(pendingQueue);
    const quota=waveActive?waveQuota-quotaUsed:calcQuota(waveNum+1)+_bonusQuota;
    Object.entries(SKILL_DEFS).forEach(([key,def])=>{
      const unlocked=unlockedSkills.has(key);
      const canAfford=def.cost<=dispGold;
      const active=gameState==='playing'||gameState==='paused';
      const alreadyOn=key in activeSkillTimers;
      const usedThisWave=(def.type==='wave'||def.type==='timed'||def.type==='next')&&waveSkillsUsed.has(key);
      const w=def.weight??0;
      const hasQuota=w===0||usedWeight+w<=quota;
      let cls='skill-card';
      if(!unlocked)cls+=' locked';
      else if(!canAfford||alreadyOn||usedThisWave||!hasQuota)cls+=' disabled';
      const card=document.createElement('div');
      card.className=cls;card.setAttribute('tabindex','-1');
      const lockTag=unlocked?'':`<div class="skill-lock-tag">🔒 需突破${def.unlockAt??0}次解锁</div>`;
      const activeTag=alreadyOn?`<span class="skill-inline-tag" style="color:#00b894">✅ 已激活</span>`:usedThisWave?`<span class="skill-inline-tag" style="color:#636e72">⏳ 本波已用</span>`:'';
      const weightTag=unlocked&&w>0?`<div style="font-size:0.6rem;color:#74b9ff;margin-top:2px">⚡${w}</div>`:'';
      card.innerHTML=`<div class="skill-icon">${def.icon}</div>
        <div class="skill-info">
          <div class="skill-name">${def.name}${activeTag}</div>
          <div class="skill-desc">${def.desc}</div>${lockTag}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
          <div class="skill-cost">${unlocked?'💰'+def.cost:'🔒'}</div>${weightTag}
        </div>`;
      bindCardEvents(card,!(unlocked&&canAfford&&active&&!alreadyOn&&!usedThisWave),()=>{
        if(def.type==='targeted')openTargetOverlay(key);
        else enqueue('skill',key);
      });
      sl.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════
//  TURRET CARDS (defender)
// ═══════════════════════════════════════════════
function buildTurretCards(){
  if(role!=='guest')return;
  ['turret-list','turret-list-pt'].forEach(id=>{
    const tl=document.getElementById(id);if(!tl)return;
    tl.innerHTML='';
    FAKE_TURRETS.forEach((t,i)=>{
      const kdef=TURRET_KINDS[t.kind??'basic'];
      const active=t.active;
      const hp=t.hp??0,maxHp=t.maxHp??t.buildCost*3;
      const hpPct=active?Math.round(hp/maxHp*100):0;
      const repairCost=active&&hp<maxHp?Math.ceil((1-hp/maxHp)*t.buildCost*2):0;
      const canBuild=!active&&defenderGold>=t.buildCost;
      const canRepair=active&&hp<maxHp&&defenderGold>=repairCost;
      const isPlaying=gameState==='playing'||gameState==='paused'||gameState==='lobby';

      const card=document.createElement('div');
      card.className=`turret-card ${active?'active':'dead'}`;
      const hpColor=hpPct>60?'#00b894':hpPct>30?'#fdcb6e':'#e17055';
      card.innerHTML=`
        <div class="turret-icon">${kdef.icon}</div>
        <div class="turret-info">
          <div class="turret-name">${kdef.label} <span style="font-size:0.6rem;color:#636e72">(${t.c},${t.r})</span></div>
          <div class="turret-stats">${active?`HP <span style="color:${hpColor}">${hpPct}%</span> · 💰${t.buildCost}`:`💀 未建造 · 💰${t.buildCost}`}</div>
          ${active?`<div class="turret-hp-bar"><div class="turret-hp-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>`:''}
        </div>
        <div class="turret-btns">
          ${!active?`<button class="tbt build" ${(!canBuild||!isPlaying)?'disabled':''} data-idx="${i}">🏗️ 建造</button>`:''}
          ${active&&hp<maxHp?`<button class="tbt repair" ${(!canRepair||!isPlaying)?'disabled':''} data-idx="${i}">🔧 修复<br>💰${repairCost}</button>`:''}
        </div>`;
      if(!active&&canBuild&&isPlaying){
        card.querySelector('.build')?.addEventListener('click',()=>sendCmd({action:'build',turretIdx:i}));
      }
      if(active&&hp<maxHp&&canRepair&&isPlaying){
        card.querySelector('.repair')?.addEventListener('click',()=>sendCmd({action:'repair',turretIdx:i}));
      }
      tl.appendChild(card);
    });
  });
}

function openTargetOverlay(skillKey){

function updateSendBtn(){
  const fieldClear=spawnQueue.length===0&&enemies.every(e=>e.dead||e.reached)&&waveActive&&quotaUsed<waveQuota;
  const showEndWave=fieldClear&&pendingQueue.length===0&&role==='host';
  ['btn-send','btn-send-pt'].forEach(id=>{
    const b=document.getElementById(id);if(!b)return;
    if(showEndWave){
      b.textContent='⏭ 结束本波';
      b.style.background='#00b894';b.style.color='#fff';
      b.disabled=false;
      b.onclick=()=>{
        if(role==='host'){
          // send end wave command to self (host triggers directly)
          _waveForceEnd=true;renderActiveSkills();
        } else {
          sendCmd({action:'endWave'});
        }
      };
    } else {
      b.textContent='发兵';
      b.style.background='';b.style.color='';
      b.disabled=!queueMode||pendingQueue.length===0||role!=='host';
      b.onclick=()=>sendWave();
    }
    b.style.display=(queueMode||showEndWave)&&role==='host'?'block':'none';
  });
}

    const pw=document.createElement('div');pw.className='qi-row-wrap';

    const pr=document.createElement('div');pr.className='qi-row pending-row';

function renderActiveSkills(){
  if(role!=='host')return;
  if(!_qlInited)_initQueuePanels();
  const curChips=[];
  onFieldUnits.forEach(({icon,name},uid)=>curChips.push({icon,badge:name,id:'u'+uid}));
  Object.keys(activeSkillTimers).forEach(key=>{
    const def=SKILL_DEFS[key],t=activeSkillTimers[key];
    curChips.push({icon:def.icon,badge:t>=9999?(def.type==='next'?'次波':'中'):Math.ceil(t)+'s',id:'s'+key});
  });
  const curFieldIds=new Set(curChips.map(c=>c.id));
  ['queue-list','queue-list-pt'].forEach(qlId=>{
    const ql=document.getElementById(qlId);if(!ql)return;
    const fieldRow=ql.querySelector('.field-row');if(!fieldRow)return;
    [...fieldRow.querySelectorAll('.qi-chip')].forEach(el=>{if(!curFieldIds.has(el.dataset.chipId)){el.closest('.qi-chip-wrap')?.remove();}});
    curChips.forEach(({icon,badge,id})=>{
      const existing=fieldRow.querySelector(`.qi-chip[data-chip-id="${id}"]`);
      if(existing){const b=existing.querySelector('.qi-badge');if(b)b.textContent=badge;}
      else{
        const wrap=document.createElement('div');wrap.className='qi-chip-wrap';
        const chip=document.createElement('div');chip.className='qi-chip field';
        chip.dataset.chipId=id;
        chip.innerHTML=`${icon}<span class="qi-badge">${badge}</span>`;
        if(!_prevFieldIds.has(id))chip.classList.add('new');
        wrap.appendChild(chip);fieldRow.appendChild(wrap);
      }
    });
    const pendingRow=ql.querySelector('.pending-row');if(!pendingRow)return;
    const newSig=pendingQueue.map(i=>i.uid).join(',');
    if(pendingRow.dataset.sig!==newSig){
      pendingRow.innerHTML='';
      pendingQueue.forEach(item=>{
        const def=item.kind==='unit'?UNIT_DEFS[item.key]:SKILL_DEFS[item.key];
        const wrap=document.createElement('div');wrap.className='qi-chip-wrap';
        const chip=document.createElement('div');chip.className='qi-chip pending';
        chip.dataset.uid=item.uid;chip.title=def.name;
        chip.innerHTML=`${def.icon}`;
        wrap.appendChild(chip);pendingRow.appendChild(wrap);
      });
      pendingRow.dataset.sig=newSig;
    }
  });
  _prevFieldIds=curFieldIds;
  _prevPendingCount=pendingQueue.length;
  updateSendBtn();
}

// ═══════════════════════════════════════════════
//  INSTANT SKILLS (host only)
// ═══════════════════════════════════════════════
function applyInstantSkill(key,targetIdx){
  if(key==='missile'){
    const t=targetIdx!=null?FAKE_TURRETS[targetIdx]:null;
    if(!t||!t.active){showToast('🎯 目标已摧毁或无效','info');return;}
    damageTurret(t,t.maxHp??9999);
    const tx=t.c*TILE+TILE/2,ty=t.r*TILE+TILE/2;
    addBlast(tx,ty);addBlast(tx,ty);
    showToast('🎯 导弹命中，炮塔摧毁！','skill');
    log(`🎯 导弹精准打击炮台，摧毁！`);
    broadcastState();return;
  }
  if(key==='rocket'){
    const targets=FAKE_TURRETS.filter(t=>t.active);
    if(!targets.length){showToast('🚀 无炮塔目标','info');return;}
    targets.sort((a,b)=>(a.hp??a.maxHp??0)-(b.hp??b.maxHp??0));
    const t=targets[0];
    const dmg=(t.maxHp??200)*0.85;
    const destroyed=damageTurret(t,dmg);
    const tx=t.c*TILE+TILE/2,ty=t.r*TILE+TILE/2;addBlast(tx,ty);
    if(destroyed){showToast('🚀 火箭命中，炮塔摧毁！','skill');log(`🚀 火箭弹命中并摧毁炮台！`);}
    else{showToast(`🚀 火箭命中，重创！HP ${Math.round(t.hp/t.maxHp*100)}%`,'skill');}
    broadcastState();return;
  }
  if(key==='double'){
    const alive=enemies.filter(e=>!e.dead&&!e.reached);
    if(!alive.length){log('⚡ 无场上兵员可翻倍');return;}
    if(!waveActive){waveNum++;waveActive=true;spawnTimer=0;log(`🌊 第${waveNum}波！`);}
    const mods={...activeSkills};
    const lastQueueDelay=spawnQueue.length?Math.max(...spawnQueue.map(i=>i.delay)):spawnTimer;
    let delay=Math.max(lastQueueDelay,spawnTimer)+0.5;
    alive.forEach(e=>{
      spawnQueue.push({type:e.type,delay,mods:{...mods,hpMult:e.hp/e.def.hp,speedMult:e.speed/e.def.speed,shield:e.hasShield}});
      delay+=0.2;
    });
    log(`⚡ 增兵令！${alive.length} 只援兵出发`);showToast('⚡ 增兵令！援兵出发！','skill');
  }
}

// ═══════════════════════════════════════════════
//  ENQUEUE (attacker)
// ═══════════════════════════════════════════════
function enqueue(kind,key,targetIdx){
  if(role!=='host')return;
  if(gameState!=='playing'&&gameState!=='paused')return;
  const def=kind==='unit'?UNIT_DEFS[key]:SKILL_DEFS[key];
  if(!def||def.cost>gold)return;
  if(kind==='skill'&&(key in activeSkillTimers))return;
  if(kind==='skill'&&(def.type==='wave'||def.type==='timed'||def.type==='next')&&waveSkillsUsed.has(key)){showToast('⏳ 本波已使用过该技能！','warn');return;}
  const unitWeight=def.weight??(kind==='unit'?1:0);
  if(!queueMode&&waveActive&&unitWeight>0&&quotaUsed+unitWeight>waveQuota){showToast('📦 本波战力配额已满！','warn');return;}
  if(queueMode){
    if(unitWeight>0){
      const usedWeight=calcQueueWeight(pendingQueue);
      const quota=waveActive?waveQuota-quotaUsed:calcQuota(waveNum+1)+_bonusQuota;
      if(usedWeight+unitWeight>quota){showToast(`📦 配额不足！`,'warn');return;}
    }
    pendingQueue.push({kind,key,cost:def.cost,targetIdx,uid:Math.random().toString(36).slice(2)});
    if(kind==='skill'&&(def.type==='wave'||def.type==='timed'||def.type==='next'))waveSkillsUsed.add(key);
    updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
  } else {
    gold-=def.cost;
    if(kind==='unit'){
      if(!waveActive){
        waveNum++;waveActive=true;spawnTimer=0;_waveForceEnd=false;
        waveQuota=calcQuota(waveNum)+_bonusQuota;_bonusQuota=0;quotaUsed=0;
        log(`🌊 第${waveNum}波！配额 ${waveQuota.toFixed(1)}⚡`);
        enablePauseBtn(true);
      }
      quotaUsed+=unitWeight;
      spawnQueue.push({type:key,delay:0,mods:{...activeSkills}});
      log(`⚔️ 派遣 ${def.icon}${def.name}`);
    } else if(def.type==='instant'||def.type==='targeted'){
      applyInstantSkill(key,targetIdx);
    } else {
      if(waveActive)quotaUsed+=unitWeight;
      const ef={};def.apply(ef);
      if(def.type==='wave'||def.type==='timed'){
        Object.assign(activeSkills,ef);activeSkillTimers[key]=def.duration>0?def.duration:9999;
        waveSkillsUsed.add(key);log(`✨ ${def.icon}${def.name} 已激活！`);
      } else if(def.type==='next'){
        Object.assign(nextSkills,ef);activeSkillTimers[key]=9999;
        waveSkillsUsed.add(key);log(`📌 ${def.icon}${def.name} 将在下波生效`);
      }
    }
    updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
  }
}

function sendWave(){flushQueue();}

function flushQueue(){
  if(role!=='host')return;
  if(!pendingQueue.length){showToast('📋 队列为空','info');return;}
  const totalCost=pendingQueue.reduce((s,i)=>s+i.cost,0);
  if(totalCost>gold){showToast(`💸 金币不足！需 💰${totalCost}，现有 💰${gold}`,'warn');return;}
  if(waveActive){
    const neededWeight=calcQueueWeight(pendingQueue);
    const remaining=waveQuota-quotaUsed;
    if(neededWeight>remaining){showToast(`📦 战力超配！`,'warn');return;}
  }
  gold-=totalCost;
  if(!waveActive){
    waveNum++;waveActive=true;spawnTimer=0;_waveForceEnd=false;
    waveQuota=calcQuota(waveNum)+_bonusQuota;_bonusQuota=0;quotaUsed=0;
    log(`🌊 第${waveNum}波！战力配额 ${waveQuota.toFixed(1)}⚡`);
    enablePauseBtn(true);
  }
  const mods={...activeSkills};
  const lastQueueDelay=spawnQueue.length?Math.max(...spawnQueue.map(i=>i.delay)):spawnTimer;
  let delay=Math.max(lastQueueDelay,spawnTimer);
  const snapshot=[...pendingQueue];
  snapshot.forEach(item=>{
    if(item.kind==='unit')quotaUsed+=UNIT_DEFS[item.key]?.weight??1;
    if(item.kind==='skill')quotaUsed+=SKILL_DEFS[item.key]?.weight??0;
  });
  pendingQueue.length=0;updateHUD();
  for(const item of snapshot){
    if(item.kind==='unit'){
      spawnQueue.push({type:item.key,delay,mods:{...mods}});
      delay+=0.2;
    } else {
      const skillDelay=delay*1000;const skillKey=item.key;delay+=0.2;
      setTimeout(()=>{
        const def=SKILL_DEFS[skillKey];
        if(def.type==='instant'||def.type==='targeted'){applyInstantSkill(skillKey,item.targetIdx);}
        else{
          const ef={};def.apply(ef);
          if(def.type==='wave'||def.type==='timed'){Object.assign(activeSkills,ef);activeSkillTimers[skillKey]=def.duration>0?def.duration:9999;waveSkillsUsed.add(skillKey);log(`✨ ${def.icon}${def.name} 已激活！`);}
          else if(def.type==='next'){Object.assign(nextSkills,ef);activeSkillTimers[skillKey]=9999;waveSkillsUsed.add(skillKey);}
        }
        updateHUD();buildSkillCards();renderActiveSkills();
      },skillDelay);
    }
  }
  const unitCount=snapshot.filter(i=>i.kind==='unit').length;
  log(`⚔️ 发兵！共${unitCount}只（已用 ${quotaUsed.toFixed(1)}/${waveQuota.toFixed(1)}⚡）`);
  updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
}

// ═══════════════════════════════════════════════
//  WAVE UPDATE (host only)
// ═══════════════════════════════════════════════
function updateWave(dt){
  if(role!=='host'||!waveActive)return;
  spawnTimer+=dt*gameSpeed;
  while(spawnQueue.length&&spawnQueue[0].delay<=spawnTimer){
    const item=spawnQueue.shift();
    enemies.push(new Enemy(item.type,item.mods??{}));
  }
  const fieldClear=!spawnQueue.length&&enemies.every(e=>e.dead||e.reached);

  // Force end
  if(_waveForceEnd){
    _endWave('early');return;
  }
  // Field clear + quota remaining: wait for player
  if(fieldClear&&quotaUsed<waveQuota&&enemies.length>0){return;}
  // Normal wave end
  if(fieldClear&&quotaUsed>=waveQuota&&enemies.length>0){_endWave('normal');return;}
}

function _endWave(reason){
  const survived=enemies.filter(e=>e.reached).length;
  const died=enemies.filter(e=>e.dead).length;
  const leftover=Math.max(0,waveQuota-quotaUsed);
  _bonusQuota=Math.round(leftover*0.5);
  waveActive=false;_waveForceEnd=false;
  activeSkills={};activeSkillTimers={};waveSkillsUsed=new Set();
  let income=waveGold(waveNum+1);
  const incomeBonus=Object.values(nextSkills).reduce((a,e)=>a+(e.incomeBonus??0),0);
  income=Math.round(income*(1+incomeBonus));
  gold+=income;nextSkills={};
  log(`✅ 第${waveNum}波结束 突破${survived} 阵亡${died} | 攻方+💰${income}`);
  // Defender wave income
  const defIncome=60+waveNum*20;
  defenderGold+=defIncome;
  log(`💰 守方获得波间收入 +${defIncome}（共${Math.floor(defenderGold)}）`);
  enemies=[];
  scaleTurrets(waveNum+1);
  if(waveNum>=15){endGame();return;}
  pendingQueue=[];
  setQueueMode(true);
  enablePauseBtn(false);
  updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
  // Notify guest of inter-wave state
  broadcastState();
}

// ═══════════════════════════════════════════════
//  DEFENDER COMMANDS (received from guest OR from UI if guest=local-defender)
// ═══════════════════════════════════════════════
function execDefenderCmd(cmd){
  if(role!=='host')return;
  const isPlaying=gameState==='playing'||gameState==='paused';
  if(!isPlaying)return;
  if(cmd.action==='build'){
    const t=FAKE_TURRETS[cmd.turretIdx];
    if(!t||t.active){broadcastState();return;}
    if(defenderGold<t.buildCost){
      // tell guest not enough gold (broadcast will update)
      broadcastState();return;
    }
    defenderGold-=t.buildCost;
    t.active=true;
    scaleTurrets(Math.max(1,waveNum));
    const kname=TURRET_KINDS[t.kind??'basic']?.label??'炮台';
    log(`🏗️ 守方建造${kname}！花费💰${t.buildCost}（剩余💰${Math.floor(defenderGold)}）`);
    broadcastState();
  } else if(cmd.action==='repair'){
    const t=FAKE_TURRETS[cmd.turretIdx];
    if(!t||!t.active){broadcastState();return;}
    const repCost=Math.ceil((1-t.hp/t.maxHp)*t.buildCost*2);
    if(defenderGold<repCost){broadcastState();return;}
    defenderGold-=repCost;t.hp=t.maxHp;
    const kname=TURRET_KINDS[t.kind??'basic']?.label??'炮台';
    log(`🔧 守方修复${kname}，花费💰${repCost}`);
    broadcastState();
  } else if(cmd.action==='endWave'){
    _waveForceEnd=true;
    renderActiveSkills();
  }
}

// ═══════════════════════════════════════════════
//  NETWORK — state serialization
// ═══════════════════════════════════════════════
function serializeState(){
  return {
    enemies: enemies.map(e=>({id:e.id,x:e.x,y:e.y,hp:e.hp,maxHp:e.maxHp,type:e.type,reached:e.reached,dead:e.dead,hasShield:e.hasShield,progress:e.progress})),
    turrets: FAKE_TURRETS.map(t=>({c:t.c,r:t.r,kind:t.kind,hp:t.hp??0,maxHp:t.maxHp??0,active:!!t.active})),
    blasts: blasts.map(b=>({x:b.x,y:b.y,life:b.life,r:b.r,vx:b.vx,vy:b.vy})),
    wave:waveNum, waveActive, defenderGold, attackerGold:gold, attackerQuota:waveQuota, quotaUsed,
    breachCount, gameState,
  };
}

let _stateTimer=null;
function broadcastState(){
  if(role!=='host'||!conn||conn.open===false)return;
  conn.send({type:'state',data:serializeState()});
}

function applyRemoteState(data){
  if(role!=='guest')return;
  // Apply turrets
  data.turrets.forEach((ts,i)=>{
    const t=FAKE_TURRETS[i];if(!t)return;
    t.hp=ts.hp;t.maxHp=ts.maxHp;t.active=ts.active;
  });
  // Apply meta
  waveNum=data.wave;waveActive=data.waveActive;
  defenderGold=data.defenderGold;gold=data.attackerGold;
  waveQuota=data.attackerQuota;quotaUsed=data.quotaUsed;
  breachCount=data.breachCount;
  if(data.gameState&&data.gameState!==gameState){
    gameState=data.gameState;
    if(gameState==='over')showEndOverlay();
  }
  if(role==='guest') buildTurretCards();
  // Reconstruct enemies for rendering
  enemies=data.enemies.map(es=>{
    const e=Object.create(Enemy.prototype);
    Object.assign(e,es);e.def=UNIT_DEFS[es.type]||UNIT_DEFS.grunt;
    return e;
  });
  // Blasts
  blasts.length=0;data.blasts.forEach(b=>blasts.push({...b}));
  updateHUD();buildTurretCards();
}

// ═══════════════════════════════════════════════
//  NETWORK — PeerJS
// ═══════════════════════════════════════════════
function generatePeerId(){
  return 'tb-'+Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,8);
}

function startHost(){
  role='host';
  const peerId=generatePeerId();
  peer=new Peer(peerId,{debug:0});
  peer.on('open',id=>{
    log('🏠 主机已建立，等待对手加入...');
    showHostQR(id);
  });
  peer.on('connection',c=>{
    conn=c;
    c.on('open',()=>{
      updateConnBadge('connected','🟢 已连接');
      log('🎮 守方已加入！游戏开始！');
      closeOverlay();
      // Hide QR overlay if any
      document.querySelectorAll('.qr-overlay').forEach(el=>el.remove());
      startGame();
    });
    c.on('data',msg=>{
      if(msg.type==='cmd')execDefenderCmd(msg);
    });
    c.on('close',()=>{
      updateConnBadge('disconnected','🔴 已断开');
      log('⚠️ 守方已断开');
    });
    c.on('error',e=>console.error('conn err',e));
  });
  peer.on('error',e=>{log('❌ PeerJS错误: '+e.type);});
}

function joinAsGuest(hostId){
  role='guest';
  const peerId=generatePeerId();
  peer=new Peer(peerId,{debug:0});
  peer.on('open',()=>{
    log('📱 正在连接主机...');
    conn=peer.connect(hostId,{reliable:true});
    conn.on('open',()=>{
      updateConnBadge('connected','🟢 已连接');
      log('✅ 已连接！等待游戏开始...');
      closeOverlay();
      setupGuestMode();
    });
    conn.on('data',msg=>{
      if(msg.type==='state')applyRemoteState(msg.data);
    });
    conn.on('close',()=>{
      updateConnBadge('disconnected','🔴 已断开');
      log('⚠️ 与主机断开');
    });
    conn.on('error',e=>console.error('conn err',e));
  });
  peer.on('error',e=>{log('❌ PeerJS错误: '+e.type);showToast('连接失败: '+e.type,'warn');});
}

function sendCmd(cmd){
  if(role==='guest'&&conn&&conn.open){
    conn.send({type:'cmd',...cmd});
  } else if(role==='host'){
    execDefenderCmd(cmd);
  }
}

  _qlInited=false;_prevFieldIds=new Set();_prevPendingCount=0;

  reachedMilestones=new Set();
  gameSpeed=SPEED_STEPS[speedIdx];gameState='playing';

  });

  if(animId)cancelAnimationFrame(animId);
  lastTime=performance.now();
  requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(hostGameLoop);});

  // Start broadcasting state every 100ms
  _stateTimer=setInterval(()=>{if(role==='host')broadcastState();},100);
}

let lastTime=0, animId=null;

function hostGameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  if(gameState!=='paused'){
    drawMap();drawFakeTurrets();
    updateFakeTurrets(dt);
    updateBlasts(dt);drawBlasts();
    for(const e of enemies)e.update(dt);
    for(const e of enemies)e.draw();
    // tick skill timers
    let skillsChanged=false;
    for(const key of Object.keys(activeSkillTimers)){
      if(activeSkillTimers[key]<9999){
        activeSkillTimers[key]-=dt*gameSpeed;
        if(activeSkillTimers[key]<=0){
          delete activeSkillTimers[key];
          const ef={};SKILL_DEFS[key].apply(ef);
          for(const k of Object.keys(ef))delete activeSkills[k];
          log(`⏱ ${SKILL_DEFS[key].icon}${SKILL_DEFS[key].name} 已结束`);
          skillsChanged=true;
        }
      }
    }
    if(skillsChanged){buildSkillCards();renderActiveSkills();}
    else renderActiveSkills();
    updateHUD();
    updateWave(dt);
  } else {
    drawMap();drawFakeTurrets();drawBlasts();
    for(const e of enemies)e.draw();
    renderActiveSkills();
  }
  animId=requestAnimationFrame(hostGameLoop);
}

// ── Guest render loop (canvas only, no physics) ──
let guestAnimId=null;
function startGuestRenderLoop(){
  if(guestAnimId)cancelAnimationFrame(guestAnimId);
  function guestLoop(){
    drawMap();
    for(const t of FAKE_TURRETS){if(!t.active)continue;drawFakeTurrets();}
    // Draw enemies from remote state
    for(const e of enemies){
      if(e.dead||e.reached)continue;
      const def=UNIT_DEFS[e.type]||UNIT_DEFS.grunt;
      const r=def.size*(TILE/40);
      ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);
      ctx.fillStyle=def.color;ctx.fill();
      if(e.hasShield){ctx.strokeStyle='#74b9ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,r+3,0,Math.PI*2);ctx.stroke();}
      ctx.font=`${TILE*.32}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(def.icon,e.x,e.y);
      const bw=r*2.2,bh=3,bx=e.x-bw/2,by=e.y-r-5;
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=e.hp/e.maxHp>.5?'#55efc4':'#fdcb6e';
      ctx.fillRect(bx,by,bw*(Math.max(0,e.hp/e.maxHp)),bh);
    }
    drawBlasts();
    updatePeerInfo();
    guestAnimId=requestAnimationFrame(guestLoop);
  }
  guestLoop();
}

function updatePeerInfo(){
  const pi=document.getElementById('peer-info');

updateCanvasResolution();
drawMap();
updateSpeedDisplay();

// Per-frame peer info update for host
setInterval(()=>{
  if(role==='host'&&gameState==='playing')updatePeerInfo();
},500);
</script>
