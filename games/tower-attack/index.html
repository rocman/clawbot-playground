<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tower Attack — 进攻方</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1b2e;color:#eee;
  font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;}

/* ══════════════════════════════════
   COMMON
══════════════════════════════════ */
body{display:flex;flex-direction:column;}

/* ── Top bar (portrait only) ── */
#header-portrait{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;
}
#header-portrait h1{font-size:1rem;letter-spacing:1px;color:#e94560;}

/* Stats */
.stat-row{display:flex;gap:8px;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:3px;font-size:0.75rem;}
.stat .label{color:#aaa;}
.stat .val{font-weight:bold;color:#fdcb6e;}

/* ── Content row ── */
#content{flex:1;min-height:0;display:flex;overflow:hidden;}

/* ══════════════════════════════════
   LANDSCAPE
   body → column: content(row: map | sidebar)
══════════════════════════════════ */
@media (orientation:landscape){
  #header-portrait{display:none;}
  #content{flex-direction:row;}

  /* sidebar: fills ALL remaining space beside map */
  #sidebar{
    display:flex!important;flex-direction:column;
    flex:1;min-width:200px;min-height:0;align-self:stretch;
    background:#16213e;border-left:2px solid #0f3460;overflow:hidden;
  }
  #sidebar-header{
    flex-shrink:0;padding:8px 12px;border-bottom:1px solid #0f3460;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  #sidebar-header h1{font-size:0.9rem;color:#e94560;letter-spacing:1px;white-space:nowrap;}

  /* panel-scroll fills remaining sidebar */
  #panel-scroll{
    flex:1;min-height:0;flex-direction:column!important;
    flex-wrap:nowrap!important;width:100%!important;
  }

  /* map: square, fills content height */
  #map-wrap{flex:0 0 auto;height:100%;width:auto;aspect-ratio:1/1;max-width:calc(100vh - 0px);}
  #map-area{width:100%;height:100%;max-height:none;}
}

/* ══════════════════════════════════
   PORTRAIT
   body → column: header / content(col: map) / panel-scroll / wave-bar
══════════════════════════════════ */
@media (orientation:portrait){
  #content{flex-direction:column;align-items:center;flex:1;min-height:0;}
  #sidebar{display:none;}
  #map-wrap{width:100%;flex:0 0 auto;}
  #map-area{width:100%;max-height:100vw;}
  #panel-scroll{flex-direction:row;width:100%;}
}

/* ── Sidebar (landscape only, default hidden) ── */
#sidebar{display:none;}

/* ── Map wrapper ── */
#map-wrap{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#0d1b2e;overflow:hidden;padding:8px;
}
#map-area{flex-shrink:0;position:relative;overflow:hidden;aspect-ratio:1/1;width:100%;}
canvas{display:block;width:100%;height:100%;}

/* ── Toast ── */
#toast-container{
  position:absolute;inset:0;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;z-index:50;
}
.toast{
  padding:10px 22px;border-radius:10px;font-size:1rem;font-weight:bold;
  text-align:center;white-space:pre-line;line-height:1.4;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  animation:toastIn .25s ease, toastOut .5s ease 2.2s forwards;
  max-width:85%;
}
.toast.breach{background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;}
.toast.milestone{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#2d3436;font-size:1.1rem;}
@keyframes toastIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes toastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.8)}}

/* ── Milestone strip ── */

/* ── Panel scroll ── */
#panel-scroll{
  flex:1;min-width:0;min-height:0;overflow:hidden;
  padding:6px 8px 8px;display:flex;gap:6px;flex-direction:column;
}

/* ── Panels ── */
.panel{
  flex:1;min-width:0;min-height:0;
  background:#16213e;border:1px solid #0f3460;border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;
}
/* landscape: queue 固定高度由内容撑开，log 吃剩余空间 */
#build-panel { flex: 2 1 0; }
#queue-panel { flex: 0 0 auto; }
#log-panel   { flex: 1 1 0; min-height: 60px; }
.panel-title{
  font-size:0.68rem;font-weight:bold;color:#aaa;letter-spacing:.5px;text-transform:uppercase;
  padding:6px 8px 4px;border-bottom:1px solid #0f3460;flex-shrink:0;
}

/* ── Panel tabs ── */
.panel-tabs{display:flex;flex-shrink:0;border-bottom:1px solid #0f3460;}
.ptab{
  flex:1;padding:6px 0;border:none;background:none;
  color:#aaa;font-size:0.72rem;font-weight:bold;cursor:pointer;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.ptab.active{color:#fdcb6e;border-bottom-color:#fdcb6e;}
.tab-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:6px;}
.tab-body.hidden{display:none!important;}
/* tech panel wrapper: tree scrolls, confirm bar fixed at bottom */
.tech-panel-wrap{padding:0;gap:0;display:flex;flex-direction:column;}
.tech-tree-wrap{flex:1;min-height:0;min-width:0;overflow-y:auto;overflow-x:auto;padding:8px 6px 4px;}
.tech-confirm-bar{flex-shrink:0;padding:6px 8px;border-top:1px solid #0f3460;background:#16213e;}
.tech-confirm-btn{
  width:100%;padding:8px;border:none;border-radius:6px;cursor:pointer;
  font-size:0.8rem;font-weight:bold;
  background:#444;color:#888;transition:background .2s,color .2s;
}
.tech-confirm-btn:not(:disabled){background:#6c5ce7;color:#fff;}
.tech-confirm-btn:not(:disabled):hover{background:#5541d1;}
/* selected node style */
/* selected node style handled in .tech-node block below */
.tech-tier{display:flex;flex-direction:row;gap:6px;justify-content:center;margin-bottom:4px;}
.tech-connectors{display:flex;flex-direction:row;gap:6px;justify-content:center;height:18px;margin-bottom:0;}
.tech-connector-col{flex:0 0 72px;display:flex;justify-content:center;align-items:center;}
.tech-connector-col svg{display:block;}
.tech-node{
  flex:0 0 72px;width:72px;height:116px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#1a2a4a;border:1px solid transparent;border-radius:8px;
  padding:6px 4px;gap:3px;cursor:pointer;transition:background .15s,outline-color .15s;
  position:relative;box-sizing:border-box;
  outline:2px solid transparent;outline-offset:-1px;
}
.tech-node:hover:not(.locked):not(.maxed){background:#1e3260;}
.tech-node.locked{opacity:0.45;cursor:not-allowed;}
.tech-node.maxed{outline-color:#fdcb6e;background:#2a2010;}
.tech-node.affordable{outline-color:#00b894;}
.tech-node.selected{outline-color:#e94560;background:#2a1525;}
.tech-node .tn-icon{font-size:1.5rem;line-height:1;}
.tech-node .tn-name{font-size:0.6rem;color:#ccc;text-align:center;line-height:1.2;word-break:keep-all;}
.tech-node .tn-lvl{font-size:0.55rem;color:#fdcb6e;font-weight:bold;}
.tech-node .tn-cost{font-size:0.52rem;color:#aaa;}
.tech-node .tn-desc{font-size:0.48rem;color:#888;text-align:center;line-height:1.2;}

/* ── Unit cards ── */
.unit-card{background:#1a2a4a;border:1px solid #0f3460;border-radius:6px;
  padding:5px 8px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.unit-card:focus,.unit-card:focus-visible{outline:none;box-shadow:none;}
.unit-card.hover{background:#1e3360;}
.unit-card.pressed{background:#162040;}
.unit-card.disabled{opacity:.4;cursor:not-allowed;}
.unit-icon{font-size:1.3rem;flex-shrink:0;}
.unit-info{flex:1;min-width:0;}
.unit-name{font-size:0.76rem;font-weight:bold;}
.unit-desc{font-size:0.6rem;color:#aaa;margin-top:1px;}
.unit-cost{font-size:0.72rem;color:#fdcb6e;font-weight:bold;flex-shrink:0;}

/* ── Skill cards ── */
.skill-card{
  background:#1a2a4a;border:1px solid #0f3460;border-radius:6px;
  padding:5px 8px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.skill-card:focus,.skill-card:focus-visible{outline:none;box-shadow:none;}
.skill-card.hover{background:#1e3360;}
.skill-card.pressed{background:#162040;}
.skill-card.disabled{opacity:.4;cursor:not-allowed;}
.skill-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6);}
.skill-icon{font-size:1.3rem;flex-shrink:0;}
.skill-info{flex:1;min-width:0;}
.skill-name{font-size:0.76rem;font-weight:bold;}
.skill-desc{font-size:0.6rem;color:#aaa;margin-top:1px;}
.skill-cost{font-size:0.72rem;color:#fdcb6e;font-weight:bold;flex-shrink:0;}
.skill-lock-tag{font-size:0.58rem;color:#e94560;margin-top:1px;}

/* ── Queue ── */
#queue-list,#queue-list-pt{
  padding:4px 6px;
  display:flex;flex-direction:column;gap:2px;
  min-width:0;overflow:hidden;
}
.qi-row-wrap{display:flex;align-items:center;gap:4px;overflow:hidden;height:40px;flex-shrink:0;}
.qi-row-label{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-size:0.58rem;color:#666;letter-spacing:1px;
  flex-shrink:0;white-space:nowrap;
}
.qi-row{
  display:flex;flex-wrap:nowrap;
  gap:6px;flex:1;min-width:0;
  overflow-x:auto;
  padding:2px 0 4px;
  scrollbar-width:thin;
  -webkit-overflow-scrolling:touch;
}
.qi-row::-webkit-scrollbar{height:3px;}
.qi-row::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
@keyframes chipIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.qi-chip.new{animation:chipIn .2s ease forwards;}
  width:30px;height:30px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:6px;border:1.5px solid;
  font-size:1rem;line-height:1;
  flex-shrink:0;position:relative;
  user-select:none;
}
.qi-chip.field{background:#0a1a2e;border-color:#0984e3;}
.qi-chip.pending{background:#0a2a1a;border-color:#00b894;cursor:pointer;}
.qi-chip.pending:active{filter:brightness(1.4);}
.qi-chip .qi-badge{
  position:absolute;bottom:2px;right:3px;
  font-size:0.5rem;color:#aaa;line-height:1;
}
.qi-chip.pending .qi-rm-hint{
  position:absolute;top:1px;right:2px;
  font-size:0.55rem;color:#ff7675;opacity:0;
  transition:opacity .15s;
}
.qi-chip.pending:hover .qi-rm-hint,
.qi-chip.pending:active .qi-rm-hint{opacity:1;}
.queue-empty-msg{color:#555;font-size:0.72rem;padding:8px;text-align:center;}

/* ── Log ── */
#log{flex:1;min-height:0;overflow-y:auto;padding:6px 8px;font-size:0.68rem;color:#aaa;line-height:1.6;}
#log p{margin-bottom:2px;}

/* ── Wave bar ── */
#wave-bar{
  flex-shrink:0;display:flex;flex-direction:row;align-items:stretch;
  gap:5px;padding:7px 8px;background:#16213e;border-top:1px solid #0f3460;
}
.wave-btn{
  flex:1;border:none;border-radius:6px;cursor:pointer;
  font-size:0.8rem;font-weight:bold;transition:background .2s;
  display:flex;align-items:center;justify-content:center;height:44px;
}
.wave-btn:disabled{background:#444;color:#888;cursor:not-allowed;}
#btn-send{flex:0 0 auto;background:#e94560;color:#fff;border-radius:6px;}
#btn-send:hover:not(:disabled){background:#c0392b;}
#send-group,#send-group-pt{display:contents;}
/* 悬浮发兵按钮 */
.btn-send-float{display:none;}/* 废弃，改用 btn-send-inline */
.btn-send-inline{
  flex-shrink:0;width:36px;
  align-self:stretch;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#e94560;color:#fff;
  border:none;border-left:1px solid #0f3460;
  font-size:0.72rem;font-weight:700;cursor:pointer;
  writing-mode:vertical-rl;letter-spacing:2px;
}
.btn-send-inline:hover:not(:disabled){background:#c0392b;}
.btn-send-inline:disabled{background:#555;color:#888;cursor:not-allowed;}
#queue-panel,#queue-panel-pt{
  display:flex!important;flex-direction:row!important;align-items:stretch;
}
#queue-panel .panel-title,#queue-panel-pt .panel-title{display:none;}
/* 队列模式时显示发兵按钮 */
#btn-send:hover:not(:disabled){background:#c0392b;}
#btn-pause-atk{flex:0 0 25%;background:#fdcb6e;color:#2d3436;}
#btn-pause-atk:hover:not(:disabled){background:#e6b655;}
#btn-pause-atk:disabled,#btn-send:disabled{background:#444;color:#888;}
#btn-mode{flex:0 0 25%;background:#6c5ce7;color:#fff;}
#btn-mode:hover{background:#5541d1;}
#speed-group-atk{flex:1;display:flex;flex-direction:row;align-items:stretch;height:44px;}
.speed-adj-atk{
  flex:0 0 40px!important;width:40px!important;min-width:40px;max-width:40px;
  padding:0!important;font-size:1.2rem;font-weight:bold;text-align:center;
  border-radius:0!important;
  background:#0f3460;color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.speed-adj-atk:hover:not(:disabled){background:#1a4a8a;}
.speed-adj-atk:disabled{color:#555;cursor:not-allowed;}
#btn-speed-dn-atk{border-radius:6px 0 0 6px;}
#btn-speed-up-atk{border-radius:0 6px 6px 0;}
#speed-display-atk{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:bold;color:#0f3460;background:#fff;
}

/* ── Overlay ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);gap:12px;z-index:100;
}
#overlay.hidden{display:none;}
#overlay h2{font-size:1.6rem;color:#e94560;}
#overlay p{color:#aaa;font-size:0.88rem;text-align:center;max-width:300px;}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:bold;}
.btn.red{background:#e94560;color:#fff;}
</style>
</head>
<body>

<!-- Portrait top bar -->
<header id="header-portrait">
  <h1>⚔️ Tower Attack</h1>
  <div class="stat-row">
    <div class="stat"><span class="label">💰</span><span class="val" id="hud-gold-p">0</span></div>
    <div class="stat"><span class="label">🌊</span><span class="val" id="hud-wave-p">0/15</span></div>
    <div class="stat"><span class="label">💥</span><span class="val" id="hud-breach-p">0</span></div>
    <div class="stat"><span class="label">📦</span><span class="val" id="hud-quota-p">—</span></div>
  </div>
</header>

<div id="content">
  <!-- Map -->
  <div id="map-wrap">
    <div id="map-area">
      <canvas id="canvas"></canvas>
      <div id="toast-container"></div>
    </div>
  </div>

  <!-- Portrait: panel-scroll below map, inside #content -->
  <div id="panel-scroll-pt">
    <div id="panel-cols-pt">
    <div class="panel" id="build-panel-pt">
      <div class="panel-tabs">
        <button class="ptab active" id="tab-units-pt" onclick="switchTab('units')">🪖 兵种</button>
        <button class="ptab" id="tab-skills-pt" onclick="switchTab('skills')">✨ 技能</button>
        <button class="ptab" id="tab-tech-pt" onclick="switchTab('tech')">🔬 科技</button>
      </div>
      <div id="unit-list-pt" class="tab-body"></div>
      <div id="skill-list-pt" class="tab-body hidden"></div>
      <div id="tech-panel-pt" class="tab-body hidden tech-panel-wrap">
        <div id="tech-tree-pt" class="tech-tree-wrap"></div>
        <div class="tech-confirm-bar" id="tech-confirm-pt">
          <button class="tech-confirm-btn" id="btn-tech-confirm-pt" disabled onclick="confirmTech()">投入研究 💰0</button>
        </div>
      </div>
    </div>
    <div id="panel-right-pt">
      <div class="panel" id="log-panel-pt">
        <div class="panel-title">📡 战报</div>
        <div id="log-pt"></div>
      </div>
      <div class="panel" id="queue-panel-pt">
        <div class="panel-title">⚔️ 场上兵员/技能</div>
        <div id="queue-list-pt"><div class="queue-empty-msg">暂无激活技能</div></div>
        <button class="btn-send-inline" id="btn-send-pt" disabled onclick="sendWave()">发兵</button>
      </div>
    </div>
    </div>
    <!-- wave bar 固定在附属栏底部 -->
    <div id="wave-bar-pt">
      <button class="wave-btn" id="btn-mode-pt">单发 ↓</button>
      <div id="speed-group-atk-pt">
        <button class="speed-adj-atk" id="btn-speed-dn-atk-pt">−</button>
        <div id="speed-display-atk-pt">1×</div>
        <button class="speed-adj-atk" id="btn-speed-up-atk-pt">+</button>
      </div>
      <button class="wave-btn" id="btn-pause-atk-pt" disabled>⏸ 暂停</button>
    </div>
  </div>

  <!-- Sidebar (landscape only) -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>⚔️ Tower Attack</h1>
      <div class="stat-row">
        <div class="stat"><span class="label">💰</span><span class="val" id="hud-gold-l">0</span></div>
        <div class="stat"><span class="label">🌊</span><span class="val" id="hud-wave-l">0/15</span></div>
        <div class="stat"><span class="label">💥</span><span class="val" id="hud-breach-l">0</span></div>
        <div class="stat"><span class="label">📦</span><span class="val" id="hud-quota-l">—</span></div>
      </div>
    </div>

    <!-- panel scroll -->
    <div id="panel-scroll">
      <div class="panel" id="build-panel">
        <div class="panel-tabs">
          <button class="ptab active" id="tab-units" onclick="switchTab('units')">🪖 兵种</button>
          <button class="ptab" id="tab-skills" onclick="switchTab('skills')">✨ 技能</button>
          <button class="ptab" id="tab-tech" onclick="switchTab('tech')">🔬 科技</button>
        </div>
        <div id="unit-list" class="tab-body"></div>
        <div id="skill-list" class="tab-body hidden"></div>
        <div id="tech-panel" class="tab-body hidden tech-panel-wrap">
          <div id="tech-tree" class="tech-tree-wrap"></div>
          <div class="tech-confirm-bar" id="tech-confirm">

          </div>

      <div class="panel" id="queue-panel">

      <div class="panel" id="log-panel">
        <div class="panel-title">📡 战报</div>
        <div id="log"></div>
      </div>
    </div>

    <!-- wave bar inside sidebar for landscape -->
    <div id="wave-bar">
      <button class="wave-btn" id="btn-mode">单发 ↓</button>
      <div id="speed-group-atk">
        <button class="speed-adj-atk" id="btn-speed-dn-atk">−</button>
        <div id="speed-display-atk">1×</div>
        <button class="speed-adj-atk" id="btn-speed-up-atk">+</button>
      </div>
      <button class="wave-btn" id="btn-pause-atk" disabled>⏸ 暂停</button>
    </div>
  </div>
</div>

<div id="overlay">
  <h2>⚔️ Tower Attack</h2>
  <p>扮演进攻方，编排兵种与技能，突破守方防线！</p>
  <p style="font-size:.75rem;color:#555;">当前为单机预览 — 对战模式开发中</p>
  <button class="btn red" id="btn-start">开始进攻</button>
</div>

<style>
/* Portrait-only panels — now inside #content, so flex:1 works correctly */
#panel-scroll-pt{
  display:none;flex:1;min-height:0;width:100%;max-width:100%;overflow:hidden;
  padding:0;gap:0;flex-direction:column;box-sizing:border-box;
}
#wave-bar-pt{
  display:flex;flex-shrink:0;width:100%;
  flex-direction:row;align-items:stretch;
  gap:5px;padding:7px 8px;background:#16213e;border-top:1px solid #0f3460;
}
#panel-cols-pt{
  flex:1;min-height:0;width:100%;max-width:100%;overflow:hidden;
  padding:4px 8px;gap:6px;flex-direction:row;display:flex;
  align-items:stretch;box-sizing:border-box;
}
/* left col: build panel, takes half */
#build-panel-pt{ flex:0 0 calc(50% - 3px);min-width:0;min-height:0;max-height:100%;overflow:hidden; }

// tech state: {nodeId: currentLevel (0=locked,1-3)}
let techLevels={};
// persistent perms built from tech levels
let techPerms={};

function rebuildTechPerms(){
  techPerms={};
  for(const def of TECH_DEFS){
    const lv=techLevels[def.id]||0;
    if(lv>0) def.effect(lv,techPerms);
  }
}

function canUnlockTech(def){
  if(!def.req) return true;
  return (techLevels[def.req]||0)>=1;
}

// pending selections: Set of tech ids queued but not yet paid
let techPending=new Set();

function techPendingCost(){
  let total=0;  for(const id of techPending){
    const def=TECH_DEFS.find(d=>d.id===id);
    const lv=(techLevels[id]||0);
    total+=def.costs[lv];
  }
  return total;
}

function toggleTechPending(id){
  const def=TECH_DEFS.find(d=>d.id===id);
  if(!def) return;
  if(techPending.has(id)){
    techPending.delete(id);
    // also deselect anything that depended on this node via pending chain
    for(const d of TECH_DEFS){
      if(d.req===id && techPending.has(d.id) && (techLevels[id]||0)<1){
        techPending.delete(d.id);
      }
    }
  } else {
    const lv=techLevels[id]||0;
    if(lv>=3) return;
    // prerequisite: actually unlocked OR already pending
    const reqMet=!def.req||(techLevels[def.req]||0)>=1||techPending.has(def.req);
    if(!reqMet) return;
    techPending.add(id);
  }
  buildTechTree();
  updateTechConfirmBar();
}

function updateTechConfirmBar(){
  const cost=techPendingCost();
  const canAfford=cost<=gold;
  ['btn-tech-confirm','btn-tech-confirm-pt'].forEach(id=>{
    const b=document.getElementById(id);if(!b)return;
    b.disabled=cost===0;
    b.textContent=cost>0?`投入研究 💰${cost}`:'投入研究';
    b.style.background=cost>0?(canAfford?'#6c5ce7':'#c0392b'):'';
    b.style.color=cost>0?'#fff':'';
  });
}

function confirmTech(){
  const cost=techPendingCost();
  if(cost>gold){showToast('💸 金币不足！','warn');return;}
  gold-=cost;
  const names=[];
  for(const id of techPending){
    const def=TECH_DEFS.find(d=>d.id===id);
    techLevels[id]=(techLevels[id]||0)+1;
    names.push(`${def.icon}${def.name}Lv${techLevels[id]}`);
  }
  techPending.clear();
  rebuildTechPerms();
  log(`🔬 研究完成：${names.join(' · ')}`);
  updateHUD();buildTechTree();buildUnitCards();updateTechConfirmBar();
}

function buildTechTree(){
  ['tech-tree','tech-tree-pt'].forEach(containerId=>{
    const wrap=document.getElementById(containerId);if(!wrap)return;
    wrap.innerHTML='';
    for(let tier=1;tier<=4;tier++){
      const nodes=TECH_DEFS.filter(d=>d.tier===tier);
      if(tier>1){
        const connRow=document.createElement('div');connRow.className='tech-connectors';
        nodes.forEach(()=>{
          const col=document.createElement('div');col.className='tech-connector-col';
          col.innerHTML=`<svg width="2" height="18"><line x1="1" y1="0" x2="1" y2="18" stroke="#0f3460" stroke-width="2"/></svg>`;
          connRow.appendChild(col);
        });
        wrap.appendChild(connRow);
      }
      const row=document.createElement('div');row.className='tech-tier';
      nodes.forEach(def=>{
        const lv=techLevels[def.id]||0;
        const pending=techPending.has(def.id);
        // req unlocked = actually unlocked OR pending in current selection
        const reqUnlocked=!def.req||(techLevels[def.req]||0)>=1||techPending.has(def.req);
        const cost=lv<3?def.costs[lv]:0;
        // affordable = prereq met + not maxed + not already pending (gold only checked at confirm)
        const affordable=reqUnlocked&&lv<3&&!pending;
        const maxed=lv>=3;
        const node=document.createElement('div');
        let cls='tech-node';
        if(maxed) cls+=' maxed';
        else if(pending) cls+=' selected';
        else if(!reqUnlocked) cls+=' locked';
        else if(affordable) cls+=' affordable';
        node.className=cls;
        // show next-level desc if pending, otherwise current level desc
        const dispLv=pending?lv+1:lv;
        const desc=dispLv>0?def.desc[dispLv-1]:def.desc[0];
        const stars='⭐'.repeat(lv)+(pending?'🔸':'')+'○'.repeat(Math.max(0,3-lv-(pending?1:0)));
        node.innerHTML=`
          <div class="tn-icon">${def.icon}</div>
          <div class="tn-name">${def.name}</div>
          <div class="tn-lvl">${stars}</div>
          ${maxed?'<div class="tn-cost" style="color:#fdcb6e">满级</div>'
                 :pending?`<div class="tn-cost" style="color:#e94560">-💰${cost}</div>`
                         :`<div class="tn-cost">💰${cost}</div>`}
          <div class="tn-desc">${desc}</div>`;
        if(!maxed&&reqUnlocked){
          node.addEventListener('click',()=>toggleTechPending(def.id));
        }
        row.appendChild(node);
      });
      wrap.appendChild(row);
    }
  });
}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const mapArea=document.getElementById('map-area');
let TILE=30;

function updateCanvasResolution(){
  const size=Math.round(mapArea.getBoundingClientRect().width);
  if(size<60) return;
  if(canvas.width===size&&canvas.height===size) return;
  TILE=size/COLS; canvas.width=size; canvas.height=size;
  rebuildWP(); drawMap();
}
let roTimer;
const ro=new ResizeObserver(()=>{clearTimeout(roTimer);roTimer=setTimeout(updateCanvasResolution,30);});
ro.observe(mapArea);

// ═══════════════════════════════════════════════
//  PATH
// ═══════════════════════════════════════════════
let PATH_WP=[];
function buildPath(){
  let start=null;
  outer:for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(MAP_LAYOUT[r][c]===T_START){start={c,r};break outer;}
  const visited=new Set(),path=[];
  let cur=start; visited.add(`${cur.c},${cur.r}`);
  path.push({x:cur.c*TILE+TILE/2,y:cur.r*TILE+TILE/2});
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(true){
    let moved=false;
    for(const[dc,dr]of dirs){
      const nc=cur.c+dc,nr=cur.r+dr,key=`${nc},${nr}`;
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS||visited.has(key)) continue;
      const t=MAP_LAYOUT[nr][nc];
      if(t===T_PATH||t===T_END){
        visited.add(key);path.push({x:nc*TILE+TILE/2,y:nr*TILE+TILE/2});
        cur={c:nc,r:nr};moved=true;if(t===T_END) return path;break;
      }
    }
    if(!moved) break;
  }
  return path;
}
function rebuildWP(){PATH_WP=buildPath();}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
const TC={[T_GRASS]:'#0d1b2e',[T_PATH]:'#c8a05a',[T_START]:'#e94560',[T_END]:'#00b894'};

function drawMap(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t=MAP_LAYOUT[r][c];
    ctx.fillStyle=TC[t]??TC[T_GRASS]; ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=.5;ctx.strokeRect(c*TILE,r*TILE,TILE,TILE);
    if(t===T_START||t===T_END){
      ctx.font=`${TILE*.52}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(t===T_START?'🚩':'🏁',c*TILE+TILE/2,r*TILE+TILE/2);
    }
  }
}

// Computed live stats, rebuilt each wave
function scaleTurrets(wave){
  const w=Math.max(1,wave);
  const dmgMult  = 1 + (w-1)*0.10;
  const rateMult = 1 + (w-1)*0.06;
  const rangeBon = Math.floor((w-1)/4)*0.35;
  for(const t of FAKE_TURRETS){
    // active 只由 defenderGold 购买决定，scaleTurrets 只更新战斗属性
    t.dmg   = t.baseDmg  * dmgMult;
    t.rate  = t.baseRate * rateMult;
    t.range = t.baseRange + rangeBon;
    t.tier  = w<=4?0:w<=8?1:w<=12?2:3;
  }
}

const TURRET_COLORS=['#2d3436','#5a3e1b','#5c1a1a','#2a0a4a'];

function updateFakeTurrets(dt){
  for(const t of FAKE_TURRETS){
    if(!t.active) continue;
    if(t.cd>0){t.cd-=dt*gameSpeed;continue;}
    const range=(t.range??2.2)*TILE;
    const tx=t.c*TILE+TILE/2, ty=t.r*TILE+TILE/2;
    let best=null,bestD=Infinity;
    for(const e of enemies){
      if(e.dead||e.reached) continue;
      const d=Math.hypot(e.x-tx,e.y-ty);
      if(d<range&&d<bestD){bestD=d;best=e;}
    }
    if(best){
      best.takeDamage(t.dmg??18); t.cd=1/(t.rate??1);
      const tier=t.tier??0;
      ctx.strokeStyle=TURRET_RINGS[tier]+'99';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(best.x,best.y);ctx.stroke();
    }
  }
}

function drawFakeTurrets(){
  for(const t of FAKE_TURRETS){
    if(!t.active) continue;
    const tx=t.c*TILE+TILE/2, ty=t.r*TILE+TILE/2, r=TILE*.35;
    const tier=t.tier??0;
    ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);
    ctx.fillStyle=TURRET_COLORS[tier];ctx.fill();
    ctx.strokeStyle=TURRET_RINGS[tier];ctx.lineWidth=tier>0?2:1.5;ctx.stroke();
    if(tier>=2){
      ctx.strokeStyle=TURRET_RINGS[tier]+'44';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(tx,ty,r+3,0,Math.PI*2);ctx.stroke();
    }
    ctx.font=`${TILE*.34}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🏰',tx,ty);
    if(tier>0){
      ctx.font=`bold ${TILE*.22}px sans-serif`;ctx.fillStyle=TURRET_RINGS[tier];
      ctx.fillText(['','★','★★','★★★'][tier],tx,ty+r+TILE*.18);
    }
  }
}

// ═══════════════════════════════════════════════
//  ENEMY
// ═══════════════════════════════════════════════
let _enemyIdCounter=0;
class Enemy{
  constructor(type,mods){
    this.id=++_enemyIdCounter;
    this.type=type; this.def=UNIT_DEFS[type];
    this.hp=this.def.hp*(mods?.hpMult??1); this.maxHp=this.hp;
    this.speed=this.def.speed*(mods?.speedMult??1);
    this.hasShield=mods?.shield??false;
    this.progress=0;
    if(!PATH_WP.length) rebuildWP();
    this.x=PATH_WP[0]?.x??0; this.y=PATH_WP[0]?.y??0;
    this.dead=false; this.reached=false;
    onFieldUnits.set(this.id,{icon:this.def.icon,name:this.def.name});
  }
  takeDamage(d){
    if(this.hasShield){this.hasShield=false;return;}
    this.hp-=d;
    if(this.hp<=0){
      this.dead=true;
      onFieldUnits.delete(this.id);
      // 守方杀敌奖励：按兵种造价的 40% 结算
      defenderGold+=Math.round(this.def.cost*0.6);
    }
  }
  update(dt){
    if(this.dead||this.reached) return;
    let rem=this.speed*dt*gameSpeed;
    while(rem>0){
      const wp=PATH_WP[Math.floor(this.progress)+1];
      if(!wp){this.reached=true;onBreach(this);onFieldUnits.delete(this.id);return;}
      const dx=wp.x-this.x,dy=wp.y-this.y,dist=Math.hypot(dx,dy);
      if(dist<=rem){this.x=wp.x;this.y=wp.y;this.progress++;rem-=dist;}
      else{this.x+=dx/dist*rem;this.y+=dy/dist*rem;this.progress+=rem/TILE;rem=0;}
    }
  }
  draw(){
    if(this.dead) return;
    const r=this.def.size*(TILE/40);
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=this.def.color;ctx.fill();
    if(this.hasShield){
      ctx.strokeStyle='#74b9ff';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(this.x,this.y,r+3,0,Math.PI*2);ctx.stroke();
    }
    ctx.font=`${TILE*.32}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.def.icon,this.x,this.y);
    const bw=r*2.2,bh=3,bx=this.x-bw/2,by=this.y-r-5;
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=this.hp/this.maxHp>.5?'#55efc4':'#fdcb6e';
    ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
  }
}

let state='idle';
let gold=0,waveNum=0,breachCount=0,gameSpeed=1,speedIdx=1;
const SPEED_STEPS=[0.5,1,2,3,4];
let enemies=[],spawnQueue=[],spawnTimer=0,waveActive=false;
let waveQuota=0,quotaUsed=0;  // 本波配额 & 已用次数

// 配额公式：10 + floor(wave/3)*2，第1波10次，每3波+2
function calcQuota(wave){ return 10 + Math.floor(wave/3)*2; }
let onFieldUnits=new Map(); // id -> {icon,name} for currently alive enemies
let activeSkills={},nextSkills={};
// activeSkillTimers: {skillKey: remainingSeconds}
let activeSkillTimers={};
let unlockedSkills=new Set(['rush','income']);
let lastTime=0,animId=null;
const reachedMilestones=new Set();
// defender economy
let defenderGold=120; // 起始资金，够建2座基础塔

function waveGold(n){
  const base=100+(n-1)*30;
  const mult=techPerms.incomeBonus||1;
  const bonus=techPerms.waveBonus||0;
  const interest=Math.floor((gold||0)*(techPerms.interestRate||0));
  return Math.round(base*mult)+bonus+interest;
}

function checkMilestones(){
  for(const ms of MILESTONES){
    if(!reachedMilestones.has(ms.at)&&breachCount>=ms.at){
      reachedMilestones.add(ms.at);
      gold+=ms.gold;
      if(ms.unlock) unlockedSkills.add(ms.unlock);
      showToast(`🏆 ${ms.label}\n+💰${ms.gold}${ms.unlock?' · 解锁'+SKILL_DEFS[ms.unlock].icon:''}`, 'milestone');
      log(`🏆 里程碑：${ms.desc} +💰${ms.gold}`);
      updateHUD();buildSkillCards();
    }
  }
}

function updateHUD(){
  const wv=`${waveNum}/15`;

  // 队列待发占用
  const qCost=pendingQueue.reduce((s,i)=>s+i.cost,0);
  const qCount=pendingQueue.filter(i=>i.kind!=='skill'||SKILL_DEFS[i.key].type!=='instant').length;

  // HUD 显示值 = 实际值 - 队列占用（仅用于 UI 可购检验，不改变实际变量）
  const dispGold=gold-qCost;
  const baseQuota=waveActive
    ? `${waveQuota-quotaUsed-qCount}/${waveQuota}`
    : `${calcQuota(waveNum+1)-qCount}`;

  const goldStr=`${dispGold}`;
  const quotaStr=baseQuota;

  [['hud-gold-p',goldStr],['hud-gold-l',goldStr],
   ['hud-wave-p',wv],['hud-wave-l',wv],
   ['hud-breach-p',breachCount],['hud-breach-l',breachCount],
   ['hud-quota-p',quotaStr],['hud-quota-l',quotaStr]].forEach(([id,v])=>{
    const el=document.getElementById(id); if(el) el.textContent=v;
  });
}

function log(msg){
  ['log','log-pt'].forEach(id=>{
    const div=document.getElementById(id); if(!div) return;

function switchTab(tab){
  ['unit-list','skill-list','tech-panel','tab-units','tab-skills','tab-tech'].forEach(id=>{
    both(id,el=>{
      if(id.endsWith('-list')||id.startsWith('tech-panel')){
        const show=(id.startsWith('unit')?tab==='units':id.startsWith('skill')?tab==='skills':tab==='tech');
        el.classList.toggle('hidden',!show);
      } else {
        el.classList.toggle('active',
          id.startsWith('tab-units')?tab==='units':

      }
    });

// ═══════════════════════════════════════════════
//  UNIT CARDS
function bindCardEvents(card, isDisabled, onClick){
  if(isDisabled) return;
  let touchMoved=false;
  // 触摸端：touchstart/touchend 直接触发，阻止后续 click 重复执行
  card.addEventListener('touchstart', ()=>{ touchMoved=false; card.classList.add('pressed'); }, {passive:true});
  card.addEventListener('touchmove',  ()=>{ touchMoved=true;  card.classList.remove('pressed'); }, {passive:true});
  card.addEventListener('touchend', e=>{
    card.classList.remove('pressed');
    if(!touchMoved){
      e.preventDefault(); // 阻止 touchend 后触发的 click
      onClick();
    }
  });
  // 桌面端 fallback
  card.addEventListener('mouseenter', ()=>card.classList.add('hover'));
  card.addEventListener('mouseleave', ()=>card.classList.remove('hover','pressed'));
  card.addEventListener('mousedown',  ()=>card.classList.add('pressed'));
  card.addEventListener('mouseup',    ()=>card.classList.remove('pressed'));
  card.addEventListener('click', ()=>{ onClick(); });
}

// ═══════════════════════════════════════════════
function buildUnitCards(){
  ['unit-list','unit-list-pt'].forEach(id=>{
    const ul=document.getElementById(id); if(!ul) return;
    ul.innerHTML='';
    const dispGold=gold-pendingQueue.reduce((s,i)=>s+i.cost,0);
    Object.entries(UNIT_DEFS).forEach(([key,def])=>{
      const canAfford=def.cost<=dispGold;
      const active=state==='playing'||state==='paused';
      const card=document.createElement('div');
      card.className='unit-card'+((canAfford&&active)?'':' disabled');
      card.setAttribute('tabindex','-1');
      card.innerHTML=`<div class="unit-icon">${def.icon}</div>
        <div class="unit-info"><div class="unit-name">${def.name}</div><div class="unit-desc">${def.desc}</div></div>
        <div class="unit-cost">💰${def.cost}</div>`;
      bindCardEvents(card, !(canAfford&&active), ()=>enqueue('unit',key));
      ul.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════
//  SKILL CARDS
// ═══════════════════════════════════════════════
function buildSkillCards(){
  ['skill-list','skill-list-pt'].forEach(id=>{
    const sl=document.getElementById(id); if(!sl) return;
    sl.innerHTML='';
    const dispGold=gold-pendingQueue.reduce((s,i)=>s+i.cost,0);
    Object.entries(SKILL_DEFS).forEach(([key,def])=>{
      const unlocked=unlockedSkills.has(key);
      const canAfford=def.cost<=dispGold;
      const active=state==='playing'||state==='paused';
      const alreadyOn=key in activeSkillTimers;
      const card=document.createElement('div');
      let cls='skill-card';
      if(!unlocked) cls+=' locked';
      else if(!canAfford||alreadyOn) cls+=' disabled';
      card.className=cls;
      card.setAttribute('tabindex','-1');
      const lockTag=unlocked?'':
        `<div class="skill-lock-tag">🔒 需突破${def.unlockAt??0}次解锁</div>`;
      const activeTag=alreadyOn?`<div class="skill-lock-tag" style="color:#00b894">✅ 已激活</div>`:'';
      card.innerHTML=`<div class="skill-icon">${def.icon}</div>
        <div class="skill-info">
          <div class="skill-name">${def.name}</div>
          <div class="skill-desc">${def.desc}</div>${lockTag}${activeTag}
        </div>
        <div class="skill-cost">${unlocked?'💰'+def.cost:'🔒'}</div>`;
      bindCardEvents(card, !(unlocked&&canAfford&&active&&!alreadyOn), ()=>enqueue('skill',key));
      sl.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════
//  QUEUE MODE & PENDING QUEUE
// ═══════════════════════════════════════════════
let queueMode=false;         // false=单发模式，true=队列模式
let pendingQueue=[];         // [{kind:'unit'|'skill', key, cost}]

function setQueueMode(on){
  queueMode=on;
  // 发兵按钮：队列模式显示，单发模式隐藏
  ['btn-send','btn-send-pt'].forEach(id=>{
    const b=document.getElementById(id);if(!b)return;
    b.style.display=on?'flex':'none';
    b.disabled=on?(pendingQueue.length===0):true;
  });
  // 模式切换按钮文案
  ['btn-mode','btn-mode-pt'].forEach(id=>{
    const b=document.getElementById(id);if(!b)return;
    b.textContent=on?'队列 ↓':'单发 ↓';
    b.title=on?'当前队列模式，点击切换为单发':'当前单发模式，点击切换为队列';
  });
  // queue-mode class 控制 padding
  document.body.classList.toggle('queue-mode',on);
  buildUnitCards();buildSkillCards();
}

function applyInstantSkill(key){
  if(key==='double'){
    const alive=enemies.filter(e=>!e.dead&&!e.reached);
    if(!alive.length){log('⚡ 无场上兵员可翻倍');return;}
    if(!waveActive){
      waveNum++;waveActive=true;spawnTimer=0;
      log(`🌊 第${waveNum}波！`);
      ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
    }
    const mods={...techPerms,...activeSkills};
    // 以当前 spawnTimer 为基准（或队列末尾 delay）依次排队，避免一口气全部出场
    const lastQueueDelay=spawnQueue.length?Math.max(...spawnQueue.map(i=>i.delay)):spawnTimer;
    let delay=Math.max(lastQueueDelay,spawnTimer)+0.5;
    alive.forEach(e=>{
      spawnQueue.push({type:e.type, delay, mods:{...mods,
        hpMult: e.hp/e.def.hp,
        speedMult: e.speed/e.def.speed,
        shield: e.hasShield,
      }});
      delay+=0.2;
    });
    log(`⚡ 增兵令！${alive.length} 只援兵依次从起点出发`);
    showToast('⚡ 增兵令！援兵出发！','skill');
  }
}

function enqueue(kind,key){
  if(state!=='playing'&&state!=='paused') return;
  const def=kind==='unit'?UNIT_DEFS[key]:SKILL_DEFS[key];
  if(!def||def.cost>gold) return;
  if(kind==='skill'&&(key in activeSkillTimers)) return;
  // 配额检查：单发模式下波进行中才检查（队列模式在 flushQueue 时统一检查）
  if(!queueMode&&waveActive&&key!=='double'&&quotaUsed>=waveQuota){
    showToast('📦 本波配额已用完！','warn');return;
  }

  if(queueMode){
    // ── 队列模式：入待命队列（不扣钱，发兵时统一结算）──
    if(!waveActive){
      const nextQuota=calcQuota(waveNum+1);
      if(pendingQueue.filter(i=>i.kind!=='skill'||SKILL_DEFS[i.key].type!=='instant').length>=nextQuota){
        showToast('📦 本波配额已满！','warn');return;
      }
    }
    pendingQueue.push({kind,key,cost:def.cost});
    log(`📋 ${def.icon}${def.name} 列队`);
    updateHUD();buildUnitCards();buildSkillCards();
    ['btn-send','btn-send-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
    renderActiveSkills();
  } else {
    // ── 单发模式：直接上场 ──
    gold-=def.cost;
    if(kind==='unit'){
      if(!waveActive){
        waveNum++;waveActive=true;spawnTimer=0;
        waveQuota=calcQuota(waveNum);quotaUsed=0;
        log(`🌊 第${waveNum}波！配额 ${waveQuota} 次`);
        ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
      }
      quotaUsed++;
      const mods={...techPerms,...activeSkills};
      spawnQueue.push({type:key,delay:0,mods});
      log(`⚔️ 派遣 ${def.icon}${def.name}（配额 ${quotaUsed}/${waveQuota}）`);
    } else if(def.type==='instant'){
      applyInstantSkill(key);
    } else {
      if(waveActive) quotaUsed++;
      const ef={};def.apply(ef);
      if(def.type==='wave'||def.type==='timed'){
        Object.assign(activeSkills,ef);
        activeSkillTimers[key]=def.duration>0?def.duration:9999;
        log(`✨ ${def.icon}${def.name} 已激活！`);
      } else if(def.type==='next'){
        Object.assign(nextSkills,ef);
        activeSkillTimers[key]=9999;
        log(`📌 ${def.icon}${def.name} 将在下波生效`);
      }
    }
    updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
  }
}

function clearCardFocus(){
  if(document.activeElement) document.activeElement.blur();
  // remove :active from any card that may be stuck (mobile touch)
  document.querySelectorAll('.unit-card,.skill-card').forEach(el=>el.classList.remove('active'));
  requestAnimationFrame(()=>document.querySelectorAll('.unit-card,.skill-card').forEach(el=>el.blur()));
}

function flushQueue(){
  if(!pendingQueue.length) return;
  // 发兵时统一扣钱，先检查总费用
  const totalCost=pendingQueue.reduce((s,i)=>s+i.cost,0);
  if(totalCost>gold){showToast('💸 金币不足，无法发兵！','warn');return;}
  // 波进行中检查配额是否够用
  if(waveActive){
    const needed=pendingQueue.length;
    const remaining=waveQuota-quotaUsed;
    if(needed>remaining){showToast(`📦 配额不足！本波剩余 ${remaining} 次，队列共 ${needed} 项`,'warn');return;}
  }
  gold-=totalCost;
  if(!waveActive){
    waveNum++;waveActive=true;spawnTimer=0;
    waveQuota=calcQuota(waveNum);quotaUsed=0;
    log(`🌊 第${waveNum}波！配额 ${waveQuota} 次`);
    ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
  }
  const mods={...techPerms,...activeSkills};
  let delay=0;
  const snapshot=[...pendingQueue];
  for(let i=0;i<snapshot.length;i++){
    const item=snapshot[i];
    if(item.kind==='unit'){
      quotaUsed++;
      spawnQueue.push({
        type:item.key, delay, mods:{...mods},
        onSpawn:()=>{
          const pi=pendingQueue.findIndex(p=>p.kind==='unit'&&p.key===item.key);
          if(pi>=0) pendingQueue.splice(pi,1);
          if(pendingQueue.length===0) setQueueMode(true);
          renderActiveSkills();
        }
      });
      delay+=0.2;
    } else {
      quotaUsed++;
      const skillDelay=delay*1000;
      const skillKey=item.key;
      delay+=0.2;
      setTimeout(()=>{
        const def=SKILL_DEFS[skillKey];
        if(def.type==='instant'){
          applyInstantSkill(skillKey);
        } else {
          const ef={};def.apply(ef);
          if(def.type==='wave'||def.type==='timed'){
            Object.assign(activeSkills,ef);
            activeSkillTimers[skillKey]=def.duration>0?def.duration:9999;
            log(`✨ ${def.icon}${def.name} 已激活！`);
          } else if(def.type==='next'){
            Object.assign(nextSkills,ef);
            activeSkillTimers[skillKey]=9999;
            log(`📌 ${def.icon}${def.name} 将在下波生效`);
          }
        }
        const pi=pendingQueue.findIndex(p=>p.kind==='skill'&&p.key===skillKey);
        if(pi>=0) pendingQueue.splice(pi,1);
        if(pendingQueue.length===0) setQueueMode(true);
        updateHUD();buildSkillCards();renderActiveSkills();
      }, skillDelay);
    }
  }
  log(`⚔️ 发兵！共${snapshot.filter(i=>i.kind==='unit').length}只（配额 ${quotaUsed}/${waveQuota}）`);
  updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
}

// ═══════════════════════════════════════════════
//  ACTIVE SKILLS + PENDING QUEUE PANEL
// ═══════════════════════════════════════════════
let _prevFieldCount=0, _prevPendingCount=0;
function renderActiveSkills(){
  const curFieldCount=onFieldUnits.size+Object.keys(activeSkillTimers).length;
  const curPendingCount=pendingQueue.length;

  ['queue-list','queue-list-pt'].forEach(id=>{
    const ql=document.getElementById(id); if(!ql) return;
    ql.innerHTML='';

    // ── 场上行（蓝色，始终渲染）──
    const fieldChips=[];
    onFieldUnits.forEach(({icon,name})=>fieldChips.push({icon,badge:name}));
    Object.keys(activeSkillTimers).forEach(key=>{
      const def=SKILL_DEFS[key],t=activeSkillTimers[key];
      fieldChips.push({icon:def.icon,badge:t>=9999?(def.type==='next'?'次波':'中'):Math.ceil(t)+'s'});
    });
    const fieldWrap=document.createElement('div');fieldWrap.className='qi-row-wrap';
    const fieldLbl=document.createElement('div');fieldLbl.className='qi-row-label';fieldLbl.textContent='场上';
    const fieldRow=document.createElement('div');fieldRow.className='qi-row';
    fieldChips.forEach(({icon,badge},i)=>{
      const chip=document.createElement('div');chip.className='qi-chip field';
      if(curFieldCount>_prevFieldCount && i===fieldChips.length-1) chip.classList.add('new');
      chip.innerHTML=`${icon}<span class="qi-badge">${badge}</span>`;
      fieldRow.appendChild(chip);
    });
    fieldWrap.appendChild(fieldLbl);fieldWrap.appendChild(fieldRow);
    ql.appendChild(fieldWrap);
    if(curFieldCount>_prevFieldCount) fieldRow.scrollLeft=fieldRow.scrollWidth;

    // ── 队列行（绿色，始终渲染，点击移除）──
    const pendingWrap=document.createElement('div');pendingWrap.className='qi-row-wrap';
    const pendingLbl=document.createElement('div');pendingLbl.className='qi-row-label';pendingLbl.textContent='队列';
    const pendingRow=document.createElement('div');pendingRow.className='qi-row';
    pendingQueue.forEach((item,idx)=>{
      const def=item.kind==='unit'?UNIT_DEFS[item.key]:SKILL_DEFS[item.key];
      const chip=document.createElement('div');chip.className='qi-chip pending';
      if(curPendingCount>_prevPendingCount && idx===pendingQueue.length-1) chip.classList.add('new');
      chip.title=`${def.name}（点击移除）`;
      chip.innerHTML=`${def.icon}<span class="qi-rm-hint">✕</span>`;
      const doRemove=()=>{
        pendingQueue.splice(idx,1);
        if(pendingQueue.length===0)
          ['btn-send','btn-send-pt'].forEach(bid=>{const b=document.getElementById(bid);if(b)b.disabled=true;});
        updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
      };
      let touchMoved=false;
      chip.addEventListener('touchstart',()=>{touchMoved=false;},{passive:true});
      chip.addEventListener('touchmove', ()=>{touchMoved=true; },{passive:true});
      chip.addEventListener('touchend',  e=>{if(!touchMoved){e.preventDefault();doRemove();}});
      chip.addEventListener('click',doRemove);
      pendingRow.appendChild(chip);
    });
    pendingWrap.appendChild(pendingLbl);pendingWrap.appendChild(pendingRow);
    ql.appendChild(pendingWrap);
    if(curPendingCount>_prevPendingCount) pendingRow.scrollLeft=pendingRow.scrollWidth;
  });

  _prevFieldCount=curFieldCount;
  _prevPendingCount=curPendingCount;
}

// ═══════════════════════════════════════════════
//  WAVE
// ═══════════════════════════════════════════════
function sendWave(){
  // 主按钮：列队模式=发兵，直接模式=无意义（卡片直接上场）
  if(queueMode) flushQueue();
}

function toggleDeployMode(){
  setQueueMode(!queueMode);
  showToast(queueMode?'📋 队列模式：选好后点发兵':'⚡ 单发模式：点卡片即上场','info');
}

function updateWave(dt){
  if(!waveActive) return;
  spawnTimer+=dt*gameSpeed;
  while(spawnQueue.length&&spawnQueue[0].delay<=spawnTimer){
    const item=spawnQueue.shift();
    enemies.push(new Enemy(item.type,item.mods??{}));
    if(item.onSpawn) item.onSpawn();
  }

  const fieldClear=!spawnQueue.length&&enemies.every(e=>e.dead||e.reached);

  // ── 破产检测：配额未用完，场上清空，且买不起任何东西 ──
  if(fieldClear&&quotaUsed<waveQuota&&enemies.length>0){
    const cheapest=Math.min(...Object.values(UNIT_DEFS).map(d=>d.cost),
                             ...Object.entries(SKILL_DEFS).filter(([k])=>unlockedSkills.has(k)).map(([,d])=>d.cost));
    if(gold<cheapest){
      defeatGame();return;
    }
  }

  // ── 正常波结束：配额用完 + 场上清空 ──
  if(fieldClear&&quotaUsed>=waveQuota&&enemies.length>0){
    const survived=enemies.filter(e=>e.reached).length;
    const died=enemies.filter(e=>e.dead).length;
    waveActive=false;
    activeSkills={};activeSkillTimers={};  // clear all skill effects
    const incomeBonus=Object.values(nextSkills).reduce((a,e)=>a+(e.incomeBonus??0),0);
    const interest=Object.values(nextSkills).reduce((a,e)=>a+(e.interest??0),0);
    let income=waveGold(waveNum+1);
    income=Math.round(income*(1+incomeBonus));
    const interestBonus=Math.round(gold*interest);
    gold+=income+interestBonus;
    nextSkills={};
    log(`✅ 第${waveNum}波结束 突破${survived} 阵亡${died} | +💰${income}${interestBonus>0?' 利息+💰'+interestBonus:''}`);
    const nextW=waveNum+1;
    const tierNames=['普通','🟠加强','🔴精英','💜恶魔'];
    const nextTier=nextW<=4?0:nextW<=8?1:nextW<=12?2:3;
    if(nextTier>0&&(nextW===5||nextW===9||nextW===13)) log(`⚠️ 第${nextW}波起守方炮塔升级为${tierNames[nextTier]}！`);
    enemies=[];
    scaleTurrets(waveNum+1);
    if(waveNum>=15){endGame();return;}
    pendingQueue=[];
    setQueueMode(true); // 波结束后重置为列队模式
    ['btn-send','btn-send-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
    ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
    updateHUD();buildUnitCards();buildSkillCards();renderActiveSkills();
  }
}

// ═══════════════════════════════════════════════
//  SPEED & PAUSE
// ═══════════════════════════════════════════════
function updateSpeedDisplay(){
  gameSpeed=SPEED_STEPS[speedIdx];
  const txt=gameSpeed+'×';
  ['speed-display-atk','speed-display-atk-pt'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=txt;});
  ['btn-speed-dn-atk','btn-speed-dn-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=speedIdx===0;});
  ['btn-speed-up-atk','btn-speed-up-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=speedIdx===SPEED_STEPS.length-1;});
}

function togglePause(){
  if(state==='playing'){
    state='paused';
    ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent='▶ 继续';});
  } else if(state==='paused'){
    state='playing';
    ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent='⏸ 暂停';});
  }
}

['btn-speed-dn-atk','btn-speed-dn-atk-pt'].forEach(id=>{
  const b=document.getElementById(id);
  if(b) b.addEventListener('click',()=>{if(speedIdx>0){speedIdx--;updateSpeedDisplay();}});
});
['btn-speed-up-atk','btn-speed-up-atk-pt'].forEach(id=>{
  const b=document.getElementById(id);
  if(b) b.addEventListener('click',()=>{if(speedIdx<SPEED_STEPS.length-1){speedIdx++;updateSpeedDisplay();}});
});
['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{
  const b=document.getElementById(id);if(b) b.addEventListener('click',togglePause);
});
['btn-send','btn-send-pt'].forEach(id=>{
  const b=document.getElementById(id);if(b) b.addEventListener('click',sendWave);
});
['btn-mode','btn-mode-pt'].forEach(id=>{
  const b=document.getElementById(id);if(b) b.addEventListener('click',toggleDeployMode);
});

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  if(state!=='paused'){
    const realDt=dt*gameSpeed;
    drawMap();drawFakeTurrets();updateFakeTurrets(dt);
    for(const e of enemies) e.update(dt);
    for(const e of enemies) e.draw();
    // 守方收益：仅靠杀敌赏金（在 takeDamage 中结算），无时间自然收益
    // 有钱就按 buildCost 从最便宜的塔开始建
    const affordable = FAKE_TURRETS
      .filter(t => !t.active)
      .sort((a,b) => a.buildCost - b.buildCost);
    for(const t of affordable){
      if(defenderGold >= t.buildCost){
        defenderGold -= t.buildCost;
        t.active = true;
        scaleTurrets(Math.max(1, waveNum));
        log(`🏰 守方建造新炮塔！花费💰${t.buildCost}（当前共${FAKE_TURRETS.filter(t=>t.active).length}座）`);
      }
    }
    drawMap();drawFakeTurrets();updateFakeTurrets(dt);
    for(const e of enemies) e.update(dt);
    for(const e of enemies) e.draw();
    // tick timed skill timers
    let skillsChanged=false;
    for(const key of Object.keys(activeSkillTimers)){
      if(activeSkillTimers[key]<9999){
        activeSkillTimers[key]-=realDt;
        if(activeSkillTimers[key]<=0){
          delete activeSkillTimers[key];
          // remove effect
          const ef={};SKILL_DEFS[key].apply(ef);
          for(const k of Object.keys(ef)) delete activeSkills[k];
          log(`⏱ ${SKILL_DEFS[key].icon}${SKILL_DEFS[key].name} 已结束`);
          skillsChanged=true;
        }
      }
    }
    if(skillsChanged){buildSkillCards();renderActiveSkills();}
    else if(waveActive) renderActiveSkills(); // refresh timer display each frame (throttle below)
    updateWave(dt);
  }
  animId=requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════
//  START / END
// ═══════════════════════════════════════════════
function startGame(){
  // ensure canvas is sized and PATH_WP is built before spawning enemies
  updateCanvasResolution();
  if(!PATH_WP.length) rebuildWP();

  // keep techLevels across runs (persistent progression); just rebuild perms
  techPending.clear();
  rebuildTechPerms();
  const startBonus=techPerms.startGoldBonus||0;
  gold=waveGold(1)+startBonus;waveNum=0;breachCount=0;
  enemies=[];spawnQueue=[];waveActive=false;waveQuota=0;quotaUsed=0;onFieldUnits=new Map();
  activeSkills={};nextSkills={};activeSkillTimers={};
  defenderGold=120;
  unlockedSkills=new Set(['rush','income']);
  reachedMilestones.clear();
  gameSpeed=1;speedIdx=1;state='playing';
  queueMode=false;pendingQueue=[];
  for(const t of FAKE_TURRETS){t.cd=0;t.active=false;}
  scaleTurrets(1);
  ['btn-pause-atk','btn-pause-atk-pt'].forEach(id=>{const b=document.getElementById(id);if(b){b.disabled=true;b.textContent='⏸ 暂停';}});
  setQueueMode(true);
  updateSpeedDisplay();updateHUD();
  buildUnitCards();buildSkillCards();renderActiveSkills();buildTechTree();
  log(`⚔️ 开始！首波资金💰${gold}${startBonus>0?'（含科技奖励+'+startBonus+'）':''}，共15波，突破防线！`);
  if(animId) cancelAnimationFrame(animId);
  lastTime=performance.now();
  requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(gameLoop);});
}

function defeatGame(){
  state='gameOver';
  log('💀 弹尽粮绝，守方胜利！');
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`<h2 style="color:#a29bfe">🏰 守方胜利</h2>
    <p>第 ${waveNum} 波，弹尽粮绝</p>
    <p>累计突破 <strong style="color:#fdcb6e;font-size:1.2em">${breachCount}</strong> 次</p>
    <button class="btn red" id="btn-restart">再来一局</button>`;
  document.getElementById('btn-restart').addEventListener('click',()=>{
    ov.classList.add('hidden');startGame();
  });
}

function endGame(){
  state='gameOver';
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`<h2>⚔️ 进攻结束</h2>
    <p>共发动 ${waveNum} 波进攻</p>
    <p>累计突破 <strong style="color:#fdcb6e;font-size:1.2em">${breachCount}</strong> 次</p>
    <button class="btn red" id="btn-restart">再来一局</button>`;
  document.getElementById('btn-restart').addEventListener('click',()=>{
    ov.classList.add('hidden');startGame();
  });
}

document.getElementById('btn-start').addEventListener('click',()=>{
  document.getElementById('overlay').classList.add('hidden');startGame();
});

// pre-render tech tree so it's browsable before game starts
rebuildTechPerms();
buildTechTree();

// fix renderQueues variable leak
var sl; // suppress lint
