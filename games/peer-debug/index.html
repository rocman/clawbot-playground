<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peer Debug – ntfy.sh</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1b2e;
    color: #c8d8e8;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
  }

  /* ── LOBBY ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    gap: 32px;
  }
  #lobby h1 {
    font-size: 1.6rem;
    color: #7dd3fc;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #lobby .room-label {
    font-size: 0.85rem;
    color: #64748b;
  }
  #lobby .room-id {
    font-size: 1.1rem;
    color: #94a3b8;
    letter-spacing: 1px;
  }

  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
  }

  .card {
    background: #112240;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 24px 28px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .card .badge {
    font-size: 0.75rem;
    font-weight: bold;
    padding: 4px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge-host   { background: #7f1d1d; color: #fca5a5; }
  .badge-guest  { background: #1e3a8a; color: #93c5fd; }
  .badge-observer { background: #3b0764; color: #d8b4fe; }

  .card a {
    color: #7dd3fc;
    font-size: 0.8rem;
    word-break: break-all;
    text-align: center;
    text-decoration: none;
  }
  .card a:hover { text-decoration: underline; }

  .qr-wrap {
    background: #fff;
    border-radius: 6px;
    padding: 6px;
    display: inline-block;
  }

  /* ── ROOM ── */
  #room { display: none; flex-direction: column; height: 100vh; }

  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #0a1628;
    border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
  }
  #topbar .badge { font-size: 0.75rem; font-weight: bold; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 1px; }
  #topbar .room-info { font-size: 0.85rem; color: #94a3b8; flex: 1; }
  #status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #64748b;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #22c55e; }
  #status-dot.error     { background: #ef4444; }
  #status-text { font-size: 0.78rem; color: #64748b; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-entry {
    font-size: 0.8rem;
    line-height: 1.5;
    padding: 6px 10px;
    border-radius: 6px;
    background: #0f1f36;
    border-left: 3px solid #1e3a5f;
    word-break: break-all;
  }
  .log-entry.from-host     { border-color: #ef4444; }
  .log-entry.from-guest    { border-color: #3b82f6; }
  .log-entry.from-observer { border-color: #a855f7; }
  .log-entry.from-ai       { border-color: #f59e0b; }
  .log-entry.system        { border-color: #475569; color: #64748b; font-style: italic; }

  .log-ts   { color: #475569; margin-right: 6px; }
  .log-from { font-weight: bold; margin-right: 6px; }
  .from-host-label     { color: #fca5a5; }
  .from-guest-label    { color: #93c5fd; }
  .from-observer-label { color: #d8b4fe; }
  .from-ai-label       { color: #fcd34d; }

  #observer-bar {
    display: none;
    padding: 12px 20px;
    background: #0a1628;
    border-top: 1px solid #1e3a5f;
    gap: 10px;
    flex-shrink: 0;
  }
  #observer-bar input {
    flex: 1;
    background: #112240;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 8px 12px;
    color: #c8d8e8;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
  }
  #observer-bar input:focus { border-color: #a855f7; }
  #observer-bar button {
    background: #3b0764;
    color: #d8b4fe;
    border: 1px solid #7c3aed;
    border-radius: 6px;
    padding: 8px 18px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  #observer-bar button:hover { background: #5b21b6; }
</style>
</head>
<body>

<!-- LOBBY (no hash) -->
<div id="lobby">
  <h1>🔗 Peer Debug</h1>
  <div>
    <div class="room-label">Room ID</div>
    <div class="room-id" id="lobby-room-id">—</div>
  </div>
  <div class="cards" id="cards"></div>
  <p style="font-size:0.75rem;color:#334155;margin-top:8px;">Powered by ntfy.sh · no WebRTC required</p>
</div>

<!-- ROOM (with hash) -->
<div id="room">
  <div id="topbar">
    <span class="badge" id="role-badge"></span>
    <span class="room-info" id="room-info"></span>
    <div id="status-dot"></div>
    <span id="status-text">connecting…</span>
  </div>
  <div id="log"></div>
  <div id="observer-bar" style="display:none;flex-direction:row;">
    <input id="cmd-input" type="text" placeholder='JSON cmd or plain text…' />
    <button id="send-btn">发送</button>
  </div>
</div>

<script>
(function () {
  // ── Helpers ──────────────────────────────────────────────────────────────
  function randId() {
    return 'tb-' + Math.random().toString(36).slice(2, 8);
  }

  function parseHash() {
    const h = location.hash.slice(1);
    const params = {};
    h.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) params[k] = decodeURIComponent(v || '');
    });
    return params;
  }

  function ts() {
    return new Date().toLocaleTimeString('en-GB', { hour12: false });
  }

  function pageUrl(room, role) {
    return location.origin + location.pathname + '#room=' + room + '&role=' + role;
  }

  // ── LOBBY ────────────────────────────────────────────────────────────────
  function showLobby() {
    const room = randId();
    document.getElementById('lobby-room-id').textContent = room;

    const roles = [
      { role: 'host',     label: 'Host',     badgeClass: 'badge-host' },
      { role: 'guest',    label: 'Guest',    badgeClass: 'badge-guest' },
      { role: 'observer', label: 'Observer', badgeClass: 'badge-observer' },
    ];

    const cards = document.getElementById('cards');
    roles.forEach(({ role, label, badgeClass }) => {
      const url = pageUrl(room, role);

      const card = document.createElement('div');
      card.className = 'card';

      const badge = document.createElement('span');
      badge.className = 'badge ' + badgeClass;
      badge.textContent = label;

      const link = document.createElement('a');
      link.href = url;
      link.textContent = url;

      const qrWrap = document.createElement('div');
      qrWrap.className = 'qr-wrap';
      qrWrap.id = 'qr-' + role;

      card.appendChild(badge);
      card.appendChild(link);
      card.appendChild(qrWrap);
      cards.appendChild(card);

      // Generate QR after DOM insert
      setTimeout(() => {
        new QRCode(qrWrap, {
          text: url,
          width: 120,
          height: 120,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }, 0);
    });
  }

  // ── ROOM ─────────────────────────────────────────────────────────────────
  function showRoom(room, role) {
    document.getElementById('lobby').style.display = 'none';
    const roomEl = document.getElementById('room');
    roomEl.style.display = 'flex';

    // Badge
    const badge = document.getElementById('role-badge');
    const badgeMap = { host: 'badge-host', guest: 'badge-guest', observer: 'badge-observer' };
    badge.className = 'badge ' + (badgeMap[role] || '');
    badge.textContent = role.toUpperCase();

    document.getElementById('room-info').textContent = 'Room: ' + room;
    document.title = role.toUpperCase() + ' · ' + room;

    const logEl = document.getElementById('log');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function setStatus(state, text) {
      dot.className = state;      // 'connected' | 'error' | ''
      statusText.textContent = text;
    }

    function appendLog(payload, isSystem) {
      const entry = document.createElement('div');
      if (isSystem) {
        entry.className = 'log-entry system';
        entry.innerHTML = '<span class="log-ts">' + ts() + '</span>' + escHtml(payload);
      } else {
        const from = (payload.from || 'unknown').toLowerCase();
        entry.className = 'log-entry from-' + from;

        const labelClass = 'from-' + from + '-label';
        const timeStr = payload.ts
          ? new Date(payload.ts).toLocaleTimeString('en-GB', { hour12: false })
          : ts();

        const msgText = payload.msg || '';
        const dataText = payload.data ? ' | ' + JSON.stringify(payload.data) : '';
        const typeText = '[' + (payload.type || '?') + '] ';

        entry.innerHTML =
          '<span class="log-ts">' + timeStr + '</span>' +
          '<span class="log-from ' + labelClass + '">' + escHtml(from) + '</span>' +
          '<span style="color:#64748b">' + escHtml(typeText) + '</span>' +
          escHtml(msgText + dataText);
      }
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const NTFY_BASE = 'https://ntfy.sh/' + room;

    function publish(payload) {
      payload.ts = payload.ts || Date.now();
      return fetch(NTFY_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).catch(err => appendLog('publish error: ' + err.message, true));
    }

    // ── Subscribe via SSE ──
    appendLog('Connecting to ntfy.sh/' + room + ' as ' + role + '…', true);

    const es = new EventSource(NTFY_BASE + '/sse');

    es.addEventListener('open', () => {
      setStatus('connected', 'connected');
      appendLog('SSE stream open', true);
      // Send init message
      publish({ type: 'init', from: role, msg: role + ' joined' });
    });

    es.addEventListener('message', e => {
      try {
        const ev = JSON.parse(e.data);
        if (!ev.message) return; // keep-alive or heartbeat frame with no message
        let payload;
        try {
          payload = JSON.parse(ev.message);
        } catch (_) {
          payload = { type: 'raw', from: 'unknown', msg: ev.message };
        }
        appendLog(payload, false);
      } catch (err) {
        appendLog('parse error: ' + err.message, true);
      }
    });

    es.addEventListener('error', () => {
      setStatus('error', 'disconnected – retrying…');
    });

    // ── Role-specific periodic actions ──
    if (role === 'host') {
      setInterval(() => {
        publish({
          type: 'state',
          from: 'host',
          msg: 'status broadcast',
          data: { uptime: Math.floor(performance.now() / 1000), ts: Date.now() },
        });
      }, 5000);
    }

    if (role === 'guest') {
      setInterval(() => {
        publish({ type: 'heartbeat', from: 'guest', msg: 'alive' });
      }, 3000);
    }

    if (role === 'observer') {
      const bar = document.getElementById('observer-bar');
      bar.style.display = 'flex';

      const input = document.getElementById('cmd-input');
      const btn   = document.getElementById('send-btn');

      function sendCmd() {
        const raw = input.value.trim();
        if (!raw) return;
        let msgValue = raw;
        // Try to detect if user typed JSON object themselves
        let data;
        try {
          data = JSON.parse(raw);
        } catch (_) {
          data = undefined;
        }
        const payload = data && typeof data === 'object'
          ? Object.assign({ type: 'cmd', from: 'observer' }, data)
          : { type: 'cmd', from: 'observer', msg: raw };
        publish(payload);
        input.value = '';
      }

      btn.addEventListener('click', sendCmd);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') sendCmd(); });
    }
  }

  // ── Entry point ──────────────────────────────────────────────────────────
  const params = parseHash();
  if (params.room && params.role) {
    showRoom(params.room, params.role);
  } else {
    showLobby();
  }
})();
</script>
</body>
</html>
