<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peer Debug Room</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LANDING PAGE ── */
    #landing {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      gap: 32px;
    }

    #landing h1 {
      color: #58a6ff;
      font-size: 1.8rem;
      letter-spacing: 2px;
    }

    #landing .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      text-align: center;
    }

    .room-id-display {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 24px;
      color: #ffa657;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    .role-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .role-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px 24px;
      min-width: 180px;
      text-align: center;
      text-decoration: none;
      color: #c9d1d9;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .role-card:hover {
      transform: translateY(-2px);
    }
    .role-card.host { border-color: #f78166; }
    .role-card.host:hover { background: #1c1218; border-color: #ff7b72; }
    .role-card.guest { border-color: #3fb950; }
    .role-card.guest:hover { background: #111c14; border-color: #56d364; }
    .role-card.observer { border-color: #58a6ff; }
    .role-card.observer:hover { background: #0f1e33; border-color: #79c0ff; }

    .role-card .role-icon { font-size: 2rem; margin-bottom: 8px; }
    .role-card .role-name { font-size: 1rem; font-weight: bold; letter-spacing: 1px; }
    .role-card .role-desc { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }

    .qr-grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .qr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .qr-item .qr-label {
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    .qr-item.host .qr-label { color: #f78166; }
    .qr-item.guest .qr-label { color: #3fb950; }
    .qr-item.observer .qr-label { color: #58a6ff; }

    .qr-item canvas, .qr-item img {
      border-radius: 6px;
      background: #fff;
      padding: 4px;
    }

    /* ── ROOM PAGE ── */
    #room {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .badge.host { background: #3d1c1c; color: #f78166; border: 1px solid #f78166; }
    .badge.guest { background: #0e2319; color: #3fb950; border: 1px solid #3fb950; }
    .badge.observer { background: #0c1f36; color: #58a6ff; border: 1px solid #58a6ff; }

    .room-info {
      color: #8b949e;
      font-size: 0.85rem;
    }
    .room-info span {
      color: #ffa657;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8b949e;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.connecting { background: #ffa657; animation: pulse 1s infinite; }
    .status-dot.connected { background: #3fb950; }
    .status-dot.error { background: #f78166; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.8rem;
      color: #8b949e;
    }

    .peer-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: #8b949e;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
    }

    .log-entry {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.5;
      border-left: 3px solid transparent;
      background: rgba(255,255,255,0.02);
    }
    .log-entry.system { border-left-color: #58a6ff; color: #79c0ff; }
    .log-entry.recv { border-left-color: #3fb950; color: #c9d1d9; }
    .log-entry.sent { border-left-color: #ffa657; color: #d2a679; }
    .log-entry.cmd { border-left-color: #f78166; color: #ffa198; }
    .log-entry.error { border-left-color: #f85149; color: #ffa198; }

    .log-ts {
      color: #484f58;
      margin-right: 6px;
      font-size: 0.75rem;
    }

    .observer-panel {
      display: none;
      padding: 12px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      gap: 8px;
      flex-shrink: 0;
    }
    .observer-panel.visible {
      display: flex;
    }

    .cmd-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .cmd-input:focus {
      border-color: #58a6ff;
    }
    .cmd-input::placeholder {
      color: #484f58;
    }

    .cmd-btn {
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .cmd-btn:hover { background: #388bfd; }
    .cmd-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- LANDING: no hash -->
<div id="landing">
  <h1>🔭 Peer Debug Room</h1>
  <p class="subtitle">上帝视角调试通道 · 三方实时观测</p>
  <div class="room-id-display" id="landingRoomId"></div>

  <div class="role-cards">
    <a class="role-card host" id="linkHost" href="#">
      <div class="role-icon">⚔️</div>
      <div class="role-name">HOST</div>
      <div class="role-desc">攻方 · 广播状态</div>
    </a>
    <a class="role-card guest" id="linkGuest" href="#">
      <div class="role-icon">🛡️</div>
      <div class="role-name">GUEST</div>
      <div class="role-desc">守方 · 接收状态</div>
    </a>
    <a class="role-card observer" id="linkObserver" href="#">
      <div class="role-icon">👁️</div>
      <div class="role-name">OBSERVER</div>
      <div class="role-desc">上帝视角 · 发指令</div>
    </a>
  </div>

  <div class="qr-grid" id="qrGrid"></div>
</div>

<!-- ROOM: with hash -->
<div id="room">
  <div class="header">
    <span class="badge" id="roleBadge"></span>
    <span class="room-info">房间 <span id="roomIdDisplay"></span></span>
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">初始化中...</span>
    <span class="peer-count" id="peerCount"></span>
  </div>
  <div class="log-container" id="logContainer"></div>
  <div class="observer-panel" id="observerPanel">
    <input class="cmd-input" id="cmdInput" type="text" placeholder="输入指令发送给 host，例如：ping / reset / snapshot" />
    <button class="cmd-btn" id="cmdBtn" disabled>发送</button>
  </div>
</div>

<script>
(function() {
  // ── Utilities ──────────────────────────────────────────────
  function randId(len) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  function ts() {
    return new Date().toISOString().slice(11, 23);
  }

  function parseHash() {
    const hash = location.hash.slice(1);
    const params = {};
    hash.split('&').forEach(part => {
      const [k, v] = part.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  // ── Log (room view) ─────────────────────────────────────────
  const logContainer = document.getElementById('logContainer');

  function addLog(text, type = 'system') {
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + type;
    entry.innerHTML = `<span class="log-ts">${ts()}</span>${escHtml(text)}`;
    logContainer.insertBefore(entry, logContainer.firstChild);
    // cap at 300 entries
    while (logContainer.children.length > 300) {
      logContainer.removeChild(logContainer.lastChild);
    }
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Status indicator ────────────────────────────────────────
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const peerCountEl = document.getElementById('peerCount');

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function setPeerCount(n) {
    peerCountEl.textContent = n > 0 ? `已连接 ${n} 个 peer` : '';
  }

  // ── ICE config ──────────────────────────────────────────────
  const ICE = {
    iceServers: [
      {urls: 'stun:stun.l.google.com:19302'},
      {urls: 'stun:stun1.l.google.com:19302'},
      {urls: 'stun:stun.cloudflare.com:3478'},
    ]
  };

  // ── MAIN ────────────────────────────────────────────────────
  const params = parseHash();
  const role = params.role;
  const roomId = params.room;

  if (!role || !roomId) {
    // Landing page
    showLanding();
  } else {
    showRoom(roomId, role);
  }

  // ── Landing page ────────────────────────────────────────────
  function showLanding() {
    const rid = 'room-' + randId(6);
    const base = location.href.split('#')[0];

    document.getElementById('landing').style.display = 'flex';
    document.getElementById('landingRoomId').textContent = rid;

    const roles = ['host', 'guest', 'observer'];
    const urls = {};
    roles.forEach(r => {
      urls[r] = `${base}#room=${rid}&role=${r}`;
      document.getElementById('link' + r.charAt(0).toUpperCase() + r.slice(1)).href = urls[r];
    });

    // QR codes
    const qrGrid = document.getElementById('qrGrid');
    const qrLabels = {host: '⚔️ HOST', guest: '🛡️ GUEST', observer: '👁️ OBSERVER'};
    roles.forEach(r => {
      const item = document.createElement('div');
      item.className = 'qr-item ' + r;

      const label = document.createElement('div');
      label.className = 'qr-label';
      label.textContent = qrLabels[r];

      const qrEl = document.createElement('div');
      qrEl.id = 'qr-' + r;

      item.appendChild(label);
      item.appendChild(qrEl);
      qrGrid.appendChild(item);

      new QRCode(qrEl, {
        text: urls[r],
        width: 100,
        height: 100,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    });
  }

  // ── Room page ────────────────────────────────────────────────
  function showRoom(roomId, role) {
    document.getElementById('room').style.display = 'flex';

    // header
    const badge = document.getElementById('roleBadge');
    const icons = {host: '⚔️', guest: '🛡️', observer: '👁️'};
    badge.className = 'badge ' + role;
    badge.textContent = icons[role] + ' ' + role.toUpperCase();

    document.getElementById('roomIdDisplay').textContent = roomId;
    setStatus('connecting', '连接中...');

    if (role === 'observer') {
      document.getElementById('observerPanel').classList.add('visible');
    }

    if (role === 'host') {
      runHost(roomId);
    } else if (role === 'guest') {
      runGuest(roomId);
    } else if (role === 'observer') {
      runObserver(roomId);
    }
  }

  // ── HOST ─────────────────────────────────────────────────────
  function runHost(roomId) {
    const peerId = roomId + '-host';
    addLog(`正在创建 Host Peer: ${peerId}`, 'system');

    const peer = new Peer(peerId, { config: ICE });
    const connections = [];

    peer.on('open', id => {
      addLog(`Peer 已就绪，ID: ${id}`, 'system');
      setStatus('connected', '等待连接...');
      startBroadcast();
    });

    peer.on('connection', conn => {
      addLog(`新连接来自: ${conn.peer}`, 'system');
      connections.push(conn);
      setPeerCount(connections.length);
      setStatus('connected', `已连接 ${connections.length} 个 peer`);

      conn.on('data', data => {
        const msg = typeof data === 'string' ? data : JSON.stringify(data);
        addLog(`收到来自 ${conn.peer} 的指令: ${msg}`, 'cmd');
        // Execute cmd (currently just log it)
        console.log('[HOST CMD]', conn.peer, data);
      });

      conn.on('close', () => {
        const idx = connections.indexOf(conn);
        if (idx > -1) connections.splice(idx, 1);
        addLog(`连接断开: ${conn.peer}`, 'error');
        setPeerCount(connections.length);
        setStatus('connected', connections.length ? `已连接 ${connections.length} 个 peer` : '等待连接...');
      });

      conn.on('error', err => {
        addLog(`连接错误 [${conn.peer}]: ${err.message}`, 'error');
      });
    });

    peer.on('error', err => {
      addLog(`Peer 错误: ${err.message}`, 'error');
      setStatus('error', err.type || '错误');
    });

    function broadcast(msg) {
      const dead = [];
      connections.forEach((conn, i) => {
        try {
          if (conn.open) conn.send(msg);
          else dead.push(i);
        } catch(e) {
          dead.push(i);
        }
      });
      // Remove dead connections (reverse order)
      dead.reverse().forEach(i => connections.splice(i, 1));
    }

    function startBroadcast() {
      setInterval(() => {
        const state = {
          type: 'state',
          ts: Date.now(),
          hp: Math.floor(Math.random() * 100),
          pos: { x: +(Math.random() * 100).toFixed(2), y: +(Math.random() * 100).toFixed(2) },
          score: Math.floor(Math.random() * 9999),
        };
        broadcast(state);
        if (connections.length > 0) {
          addLog(`广播 → [${connections.length}] hp:${state.hp} pos:(${state.pos.x},${state.pos.y}) score:${state.score}`, 'sent');
        }
      }, 1000);
    }
  }

  // ── GUEST ─────────────────────────────────────────────────────
  function runGuest(roomId) {
    const hostId = roomId + '-host';
    const myId = roomId + '-guest-' + randId(4);
    addLog(`正在创建 Guest Peer: ${myId}`, 'system');

    const peer = new Peer(myId, { config: ICE });

    peer.on('open', id => {
      addLog(`Peer 已就绪，ID: ${id}`, 'system');
      addLog(`正在连接 Host: ${hostId}`, 'system');
      setStatus('connecting', `连接 host 中...`);

      const conn = peer.connect(hostId, { reliable: true });

      conn.on('open', () => {
        addLog(`已连接 Host！`, 'system');
        setStatus('connected', '已连接 host');
        setPeerCount(1);

        // heartbeat every 2s
        setInterval(() => {
          const hb = { type: 'heartbeat', ts: Date.now(), from: myId };
          conn.send(hb);
          addLog(`→ 心跳 ts:${hb.ts}`, 'sent');
        }, 2000);
      });

      conn.on('data', data => {
        const msg = typeof data === 'string' ? data : JSON.stringify(data);
        addLog(`← host 广播: ${msg}`, 'recv');
      });

      conn.on('close', () => {
        addLog('与 host 的连接已断开', 'error');
        setStatus('error', '连接断开');
        setPeerCount(0);
      });

      conn.on('error', err => {
        addLog(`连接错误: ${err.message}`, 'error');
        setStatus('error', '连接错误');
      });
    });

    peer.on('error', err => {
      addLog(`Peer 错误: ${err.message}`, 'error');
      setStatus('error', err.type || '错误');
    });
  }

  // ── OBSERVER ──────────────────────────────────────────────────
  function runObserver(roomId) {
    const hostId = roomId + '-host';
    const myId = roomId + '-observer-' + randId(4);
    addLog(`正在创建 Observer Peer: ${myId}`, 'system');

    const peer = new Peer(myId, { config: ICE });
    let hostConn = null;

    const cmdInput = document.getElementById('cmdInput');
    const cmdBtn = document.getElementById('cmdBtn');

    cmdBtn.addEventListener('click', sendCmd);
    cmdInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendCmd();
    });

    function sendCmd() {
      const val = cmdInput.value.trim();
      if (!val || !hostConn || !hostConn.open) return;
      hostConn.send({ type: 'cmd', cmd: val, from: myId, ts: Date.now() });
      addLog(`→ CMD: ${val}`, 'cmd');
      cmdInput.value = '';
    }

    peer.on('open', id => {
      addLog(`Peer 已就绪，ID: ${id}`, 'system');
      addLog(`正在连接 Host: ${hostId}`, 'system');
      setStatus('connecting', '连接 host 中...');

      const conn = peer.connect(hostId, { reliable: true });
      hostConn = conn;

      conn.on('open', () => {
        addLog('已连接 Host！开始观测...', 'system');
        setStatus('connected', '观测中');
        setPeerCount(1);
        cmdBtn.disabled = false;
      });

      conn.on('data', data => {
        const msg = typeof data === 'string' ? data : JSON.stringify(data);
        addLog(`← host: ${msg}`, 'recv');
      });

      conn.on('close', () => {
        addLog('与 host 的连接已断开', 'error');
        setStatus('error', '连接断开');
        setPeerCount(0);
        cmdBtn.disabled = true;
      });

      conn.on('error', err => {
        addLog(`连接错误: ${err.message}`, 'error');
        setStatus('error', '连接错误');
        cmdBtn.disabled = true;
      });
    });

    peer.on('error', err => {
      addLog(`Peer 错误: ${err.message}`, 'error');
      setStatus('error', err.type || '错误');
    });
  }

})();
</script>
</body>
</html>
