<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Bridge</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117; color: #e6edf3;
  display: flex; flex-direction: column; height: 100dvh;
}
#header {
  padding: 12px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex; align-items: center; gap: 10px;
}
#dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #f85149; flex-shrink: 0; transition: background .3s;
}
#dot.connecting { background: #d29922; animation: pulse 1s infinite; }
#dot.connected  { background: #3fb950; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#status-text { font-size: 13px; color: #8b949e; }
#messages {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 75%; padding: 8px 12px;
  border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word;
}
.msg.me  { background: #1f6feb; align-self: flex-end; border-bottom-right-radius: 3px; }
.msg.ai  { background: #21262d; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.sys { background: transparent; color: #8b949e; font-size: 12px; align-self: center; font-style: italic; }
#input-row {
  padding: 12px 16px; background: #161b22;
  border-top: 1px solid #30363d;
  display: flex; gap: 8px;
}
#input {
  flex: 1; padding: 10px 14px;
  background: #0d1117; color: #e6edf3;
  border: 1px solid #30363d; border-radius: 8px;
  font-size: 14px; outline: none;
}
#input:focus { border-color: #1f6feb; }
#send-btn {
  padding: 10px 18px;
  background: #1f6feb; color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-weight: 500;
}
#send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }
#send-btn:not(:disabled):hover { background: #388bfd; }
</style>
</head>
<body>

<div id="header">
  <div id="dot" class="connecting"></div>
  <span id="status-text">Connecting…</span>
</div>

<div id="messages"></div>

<div id="input-row">
  <input id="input" placeholder="Send a message…" disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script>
const params    = new URLSearchParams(location.search);
const TARGET_ID = params.get('peer');

const dot     = document.getElementById('dot');
const statusT = document.getElementById('status-text');
const msgs    = document.getElementById('messages');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

let conn = null;

function addMsg(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(cls, text) {
  dot.className = cls;
  statusT.textContent = text;
}

if (!TARGET_ID) {
  setStatus('', 'Missing ?peer= param');
  addMsg('⚠️ Invalid link — no peer ID', 'sys');
} else {
  addMsg('Connecting to ' + TARGET_ID + '…', 'sys');
  setStatus('connecting', 'Connecting…');

  const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true, path: '/' });

  peer.on('open', (myId) => {
    addMsg('My ID: ' + myId, 'sys');
    conn = peer.connect(TARGET_ID, { reliable: true });

    conn.on('open', () => {
      setStatus('connected', 'Connected');
      addMsg('Connected to AI bridge ✓', 'sys');
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    });

    conn.on('data', (data) => {
      try {
        const obj = typeof data === 'string' ? JSON.parse(data) : data;
        if (obj.type === 'from-ai') addMsg(obj.text, 'ai');
        else if (obj.type === 'hello') addMsg('Handshake OK ✓', 'sys');
        else addMsg(JSON.stringify(obj), 'ai');
      } catch(_) { addMsg(String(data), 'ai'); }
    });

    conn.on('close', () => {
      setStatus('', 'Disconnected');
      addMsg('Connection closed', 'sys');
      input.disabled = true;
      sendBtn.disabled = true;
    });

    conn.on('error', (e) => addMsg('Error: ' + e.message, 'sys'));
  });

  peer.on('error', (e) => {
    setStatus('', 'Error: ' + e.type);
    addMsg('PeerJS error: ' + e.type, 'sys');
  });
}

function sendMsg() {
  const text = input.value.trim();
  if (!text || !conn || !conn.open) return;
  conn.send(JSON.stringify({ type: 'user-msg', text }));
  addMsg(text, 'me');
  input.value = '';
}

sendBtn.onclick = sendMsg;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
</script>
</body>
</html>
