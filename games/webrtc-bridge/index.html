<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Bridge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117; color: #e6edf3;
  display: flex; flex-direction: column; height: 100dvh;
}
#header {
  padding: 12px 16px; background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex; align-items: center; gap: 10px;
}
#dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #f85149; flex-shrink: 0; transition: background .3s;
}
#dot.connecting { background: #d29922; animation: pulse 1s infinite; }
#dot.connected  { background: #3fb950; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#status-text { font-size: 13px; color: #8b949e; }
#messages {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 75%; padding: 8px 12px;
  border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word;
}
.msg.me  { background: #1f6feb; align-self: flex-end; border-bottom-right-radius: 3px; }
.msg.ai  { background: #21262d; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.sys { background: transparent; color: #8b949e; font-size: 12px; align-self: center; font-style: italic; }
#input-row {
  padding: 12px 16px; background: #161b22;
  border-top: 1px solid #30363d;
  display: flex; gap: 8px;
}
#input {
  flex: 1; padding: 10px 14px;
  background: #0d1117; color: #e6edf3;
  border: 1px solid #30363d; border-radius: 8px;
  font-size: 14px; outline: none;
}
#input:focus { border-color: #1f6feb; }
#send-btn {
  padding: 10px 18px; background: #1f6feb; color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-weight: 500;
}
#send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }
#send-btn:not(:disabled):hover { background: #388bfd; }
</style>
</head>
<body>
<div id="header">
  <div id="dot" class="connecting"></div>
  <span id="status-text">Connecting…</span>
</div>
<div id="messages"></div>
<div id="input-row">
  <input id="input" placeholder="Send a message…" disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const TARGET_ID = params.get('peer');
const PEERJS_WS = 'wss://0.peerjs.com/peerjs?key=peerjs';

const dot     = document.getElementById('dot');
const statusT = document.getElementById('status-text');
const msgs    = document.getElementById('messages');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

let ws, pc, dc;
let myId      = null;
let connId    = 'dc_' + Math.random().toString(36).slice(2, 12);
let retryTimer = null;

function addMsg(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(cls, text) {
  dot.className = cls;
  statusT.textContent = text;
}

// ── PeerJS 信令 WS（纯手写，不用 PeerJS 库）─────────────────
function connectSignal() {
  if (!TARGET_ID) {
    setStatus('', 'Missing ?peer= param');
    addMsg('⚠️ Invalid link — no peer ID', 'sys');
    return;
  }

  myId = myId || crypto.randomUUID();
  const token = Math.random().toString(36).slice(2);
  const url   = PEERJS_WS + '&id=' + encodeURIComponent(myId) + '&token=' + token + '&version=1.5.4';

  ws = new WebSocket(url);
  setStatus('connecting', 'Signal connecting…');

  ws.onopen  = () => addMsg('Signal WS open', 'sys');
  ws.onclose = () => {
    addMsg('Signal WS closed, reconnecting…', 'sys');
    setTimeout(connectSignal, 3000);
  };
  ws.onerror = () => addMsg('Signal WS error', 'sys');

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'OPEN') {
      addMsg('Registered, my ID: ' + myId, 'sys');
      startRTC();   // 每次注册成功就发起连接

    } else if (msg.type === 'ANSWER') {
      const sdp = msg.payload.sdp;
      addMsg('Got answer, setting remote desc…', 'sys');
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(sdp));
      } catch(e) { addMsg('setRemoteDesc err: ' + e.message, 'sys'); }

    } else if (msg.type === 'CANDIDATE') {
      const c = msg.payload.candidate;
      if (c && c.candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); }
        catch(e) { /* ignore */ }
      }

    } else if (msg.type === 'HEARTBEAT') {
      ws.send(JSON.stringify({ type: 'HEARTBEAT' }));

    } else if (msg.type === 'LEAVE' || msg.type === 'EXPIRE') {
      addMsg('Peer left, retrying in 3s…', 'sys');
      clearTimeout(retryTimer);
      retryTimer = setTimeout(startRTC, 3000);
    }
  };
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ── 原生 WebRTC ───────────────────────────────────────────────
async function startRTC() {
  if (pc) { try { pc.close(); } catch(e){} }
  connId = 'dc_' + Math.random().toString(36).slice(2, 12);

  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

  // 创建 DataChannel（我们是 offerer）
  dc = pc.createDataChannel(connId, { ordered: true });

  dc.onopen = () => {
    setStatus('connected', 'Connected · ' + TARGET_ID);
    addMsg('Connected ✓', 'sys');
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  };

  dc.onmessage = (e) => {
    try {
      const obj = JSON.parse(e.data);
      if (obj.type === 'from-ai') addMsg(obj.text, 'ai');
      else if (obj.type === 'hello') addMsg('Handshake OK ✓', 'sys');
      else addMsg(JSON.stringify(obj), 'ai');
    } catch(_) { addMsg(String(e.data), 'ai'); }
  };

  dc.onclose = () => {
    setStatus('connecting', 'Disconnected, retrying…');
    input.disabled = true;
    sendBtn.disabled = true;
    addMsg('DataChannel closed, retrying in 3s…', 'sys');
    retryTimer = setTimeout(startRTC, 3000);
  };

  // ICE → 发给 server（PeerJS CANDIDATE 格式）
  pc.onicecandidate = (evt) => {
    if (evt.candidate) {
      wsSend({
        type: 'CANDIDATE',
        dst: TARGET_ID,
        payload: {
          candidate: {
            candidate:        evt.candidate.candidate,
            sdpMid:           evt.candidate.sdpMid,
            sdpMLineIndex:    evt.candidate.sdpMLineIndex,
            usernameFragment: evt.candidate.usernameFragment
          },
          type:         'data',
          connectionId: connId
        }
      });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') {
      addMsg('RTC failed, retrying in 3s…', 'sys');
      clearTimeout(retryTimer);
      retryTimer = setTimeout(startRTC, 3000);
    }
  };

  // 创建 offer → 发给 server（PeerJS OFFER 格式）
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  setStatus('connecting', 'Negotiating…');
  addMsg('Sending offer…', 'sys');

  wsSend({
    type: 'OFFER',
    dst:  TARGET_ID,
    payload: {
      sdp:          { type: offer.type, sdp: offer.sdp },
      type:         'data',
      connectionId: connId,
      label:        connId,
      reliable:     true,
      serialization: 'json'
    }
  });
}

// ── Send ─────────────────────────────────────────────────────
function sendMsg() {
  const text = input.value.trim();
  if (!text || !dc || dc.readyState !== 'open') return;
  dc.send(JSON.stringify({ type: 'user-msg', text }));
  addMsg(text, 'me');
  input.value = '';
}

sendBtn.onclick = sendMsg;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── Boot ─────────────────────────────────────────────────────
connectSignal();
</script>
</body>
</html>
