<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Bridge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117; color: #e6edf3;
  display: flex; flex-direction: column; height: 100dvh;
}
#header {
  padding: 12px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex; align-items: center; gap: 10px;
}
#status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #f85149; flex-shrink: 0;
  transition: background .3s;
}
#status-dot.connecting { background: #d29922; }
#status-dot.connected  { background: #3fb950; }
#status-text { font-size: 13px; color: #8b949e; }
#messages {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 75%; padding: 8px 12px;
  border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word;
}
.msg.me   { background: #1f6feb; align-self: flex-end; border-bottom-right-radius: 3px; }
.msg.ai   { background: #21262d; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.sys  { background: transparent; color: #8b949e; font-size: 12px; align-self: center; }
#input-row {
  padding: 12px 16px;
  background: #161b22;
  border-top: 1px solid #30363d;
  display: flex; gap: 8px;
}
#input {
  flex: 1; padding: 10px 14px;
  background: #0d1117; color: #e6edf3;
  border: 1px solid #30363d; border-radius: 8px;
  font-size: 14px; outline: none;
}
#input:focus { border-color: #1f6feb; }
#send-btn {
  padding: 10px 18px;
  background: #1f6feb; color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-weight: 500;
}
#send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }
#send-btn:not(:disabled):hover { background: #388bfd; }
</style>
</head>
<body>

<div id="header">
  <div id="status-dot"></div>
  <span id="status-text">Connecting…</span>
</div>

<div id="messages"></div>

<div id="input-row">
  <input id="input" placeholder="Send a message…" disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script>
const params  = new URLSearchParams(location.search);
const WS_URL  = params.get('ws');
const ROOM_ID = params.get('room');

const dot     = document.getElementById('status-dot');
const statusT = document.getElementById('status-text');
const msgs    = document.getElementById('messages');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

let ws, pc, dc;

function addMsg(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(state, text) {
  dot.className = state;
  statusT.textContent = text;
}

// ── WebRTC ───────────────────────────────────────────────────
async function setupRTC() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

  dc = pc.createDataChannel('ai-bridge');

  dc.onopen = () => {
    setStatus('connected', 'Connected · Room ' + ROOM_ID);
    addMsg('Connected to AI bridge ✓', 'sys');
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  };

  dc.onmessage = (e) => {
    try {
      const obj = JSON.parse(e.data);
      if (obj.type === 'from-ai') addMsg(obj.text, 'ai');
      else if (obj.type === 'hello') addMsg('Handshake OK · ' + JSON.stringify(obj), 'sys');
      else addMsg(e.data, 'ai');
    } catch(_) { addMsg(e.data, 'ai'); }
  };

  dc.onclose  = () => {
    setStatus('', 'Disconnected');
    input.disabled = true;
    sendBtn.disabled = true;
    addMsg('Connection closed', 'sys');
  };

  pc.onicecandidate = (evt) => {
    if (evt.candidate) {
      wsSend({ type: 'signal', payload: {
        type: 'candidate',
        candidate: evt.candidate.candidate,
        mid: evt.candidate.sdpMid || '0'
      }});
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') setStatus('', 'RTC Failed');
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  wsSend({ type: 'signal', payload: { type: 'offer', type: offer.type, sdp: offer.sdp } });
  setStatus('connecting', 'Negotiating…');
}

// ── Signaling WS ─────────────────────────────────────────────
function connectWS() {
  if (!WS_URL || !ROOM_ID) {
    setStatus('', 'Missing ws= or room= params');
    addMsg('⚠️ Invalid link — missing ws or room parameter', 'sys');
    return;
  }

  const url = WS_URL + (WS_URL.includes('?') ? '&' : '?') + 'room=' + ROOM_ID;
  ws = new WebSocket(url);

  ws.onopen = async () => {
    setStatus('connecting', 'Signal connected, starting WebRTC…');
    await setupRTC();
  };

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type !== 'signal') return;
    const p = msg.payload;
    if (p.type === 'answer') {
      await pc.setRemoteDescription(new RTCSessionDescription(p));
    } else if (p.type === 'candidate') {
      const cand = {
        candidate: p.candidate,
        sdpMid: p.mid || '0',
        sdpMLineIndex: 0
      };
      try { await pc.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {}
    }
  };

  ws.onclose = () => {
    setStatus('', 'Signal WS closed');
    addMsg('Signal server disconnected', 'sys');
    input.disabled = true;
    sendBtn.disabled = true;
  };

  ws.onerror = () => setStatus('', 'Signal WS error');
}

// ── Send ─────────────────────────────────────────────────────
function sendMsg() {
  const text = input.value.trim();
  if (!text || !dc || dc.readyState !== 'open') return;
  dc.send(JSON.stringify({ type: 'user-msg', text }));
  addMsg(text, 'me');
  input.value = '';
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

sendBtn.onclick = sendMsg;
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

// ── Boot ─────────────────────────────────────────────────────
addMsg('Room: ' + (ROOM_ID || '(none)'), 'sys');
connectWS();
</script>
</body>
</html>
