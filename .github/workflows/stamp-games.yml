name: Stamp Game Versions

on:
  push:
    branches:
      - main
    paths:
      - 'games/**'

jobs:
  stamp:
    # 跳过 workflow 自身产生的 stamp commit，避免循环触发
    if: "!startsWith(github.event.head_commit.message, 'chore: stamp build version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate build version (MMDD-N)
        id: ver
        run: |
          # 当前上海日期，格式 MMDD
          TODAY=$(TZ='Asia/Shanghai' date '+%m%d')

          # 统计今天已有多少个 stamp commit（含本次之前的），序号 = count + 1
          COUNT=$(git log --oneline --after="$(TZ='Asia/Shanghai' date '+%Y-%m-%d')T00:00:00+08:00" \
                    --grep="chore: stamp build version" | wc -l | tr -d ' ')
          SEQ=$((COUNT + 1))

          VERSION="${TODAY}-${SEQ}"
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_commit=$SHORT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION ($SHORT_COMMIT)"

      - name: Stamp __BUILD_VERSION__ and write version.json for changed games only
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHORT_COMMIT="${{ steps.ver.outputs.short_commit }}"

          # 只处理本次 commit 实际改动的游戏目录
          CHANGED_GAMES=$(git diff --name-only HEAD~1 HEAD | grep '^games/' | cut -d/ -f2 | sort -u)

          if [ -z "$CHANGED_GAMES" ]; then
            echo "No game directories changed, skipping."
            exit 0
          fi

          for GAME in $CHANGED_GAMES; do
            GAME_DIR="games/$GAME"
            if [ ! -d "$GAME_DIR" ]; then
              echo "Directory $GAME_DIR not found, skipping."
              continue
            fi

            HTML="$GAME_DIR/index.html"

            # 1. 替换 HTML 占位符
            if [ -f "$HTML" ] && grep -q '__BUILD_VERSION__' "$HTML"; then
              sed -i "s|__BUILD_VERSION__|${VERSION}|g" "$HTML"
              echo "Stamped HTML: $HTML"
            fi

            # 2. 写 version.json
            VERSION_FILE="$GAME_DIR/version.json"
            UPDATED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            printf '{\n  "game": "%s",\n  "version": "%s",\n  "commit": "%s",\n  "updatedAt": "%s"\n}\n' \
              "$GAME" "$VERSION" "$SHORT_COMMIT" "$UPDATED_AT" > "$VERSION_FILE"
            echo "Written: $VERSION_FILE"
          done

      - name: Commit stamped files back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git add games/
          git commit -m "chore: stamp build version [${{ steps.ver.outputs.version }}]"
          git push origin main

      - name: Sync games/ to pages branch
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          git fetch origin pages
          cp -r games/ /tmp/games-stamped/

          git checkout pages
          rm -rf games/
          cp -r /tmp/games-stamped/ games/

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "pages branch already up to date."
            exit 0
          fi

          git add games/
          git commit -m "deploy: sync games from main [$VERSION]"
          git push origin pages
