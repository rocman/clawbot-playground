name: Stamp Game Versions

on:
  push:
    branches:
      - main
    paths:
      - 'games/**'

jobs:
  stamp:
    # 跳过 workflow 自身产生的 stamp commit，避免循环触发
    if: "!startsWith(github.event.head_commit.message, 'chore: stamp build version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate build version (human-friendly timestamp)
        id: ver
        run: |
          # 格式：2025-04-05 08:41 CST
          VERSION=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Stamp __BUILD_VERSION__ in all game HTML files
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # 替换 games/ 下所有 HTML 里的占位符
          find games/ -name "*.html" | while read FILE; do
            if grep -q '__BUILD_VERSION__' "$FILE"; then
              sed -i "s|__BUILD_VERSION__|${VERSION}|g" "$FILE"
              echo "Stamped: $FILE"
            else
              echo "No placeholder in: $FILE (skipped)"
            fi
          done

      - name: Commit stamped files back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Nothing to commit — no __BUILD_VERSION__ placeholders found."
            exit 0
          fi

          git add games/
          git commit -m "chore: stamp build version [${{ steps.ver.outputs.version }}]"
          git push origin main

      - name: Sync games/ to pages branch
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          git fetch origin pages

          # 暂存当前 games/ 内容（已 stamp）
          cp -r games/ /tmp/games-stamped/

          git checkout pages

          # 覆盖 pages 上的 games/
          rm -rf games/
          cp -r /tmp/games-stamped/ games/

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "pages branch already up to date."
            exit 0
          fi

          git add games/
          git commit -m "deploy: sync games from main [$VERSION]"
          git push origin pages
