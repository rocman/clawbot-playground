<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gracia Singer — Plan C Slice 0 (4DGS)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#111; font-family:system-ui,-apple-system,sans-serif; color:#fff; }
canvas { display:block; width:100%; height:100%; touch-action:none; }
#hud { position:fixed; top:12px; left:12px; z-index:10; pointer-events:none; }
#hud div { background:rgba(0,0,0,.6); padding:4px 10px; border-radius:6px; font-size:13px; margin-bottom:4px; backdrop-filter:blur(6px); }
#timeline-bar { position:fixed; bottom:0; left:0; right:0; height:40px; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); display:flex; align-items:center; padding:0 16px; gap:10px; z-index:10; }
#timeline-bar button { background:rgba(255,255,255,.15); border:none; color:#fff; font-size:18px; width:36px; height:28px; border-radius:6px; cursor:pointer; }
#timeline-bar button:hover { background:rgba(255,255,255,.3); }
#timeline-bar input[type=range] { flex:1; accent-color:#4af; height:4px; }
#timeline-bar .time { font-size:12px; min-width:80px; text-align:center; }
#loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity .4s; }
#loading-overlay.hidden { opacity:0; pointer-events:none; }
#loading-overlay .spinner { width:48px; height:48px; border:3px solid rgba(255,255,255,.2); border-top-color:#4af; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-overlay .status { margin-top:16px; font-size:14px; color:#aaa; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="status" id="load-status">Loading I-frame...</div>
</div>

<div id="hud">
  <div id="hud-info">Gracia Singer — Plan C Slice 0</div>
  <div id="hud-frame">Frame 0/299 · 0.0s</div>
  <div id="hud-fps"></div>
</div>

<div id="timeline-bar">
  <button id="btn-play" title="Play/Pause">▶</button>
  <input type="range" id="scrubber" min="0" max="299" value="0" step="1">
  <div class="time" id="time-display">0.0s / 30.2s</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
  "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { SplatMesh } from '@sparkjsdev/spark';

// ============================================================
// Configuration
// ============================================================
// 大文件(LFS)走 git.woa.com raw — LFS 文件不受 302 认证影响
const LFS_BASE = 'https://git.woa.com/dyson-sphere/ai-workspace/gracia/raw/feat/serve-singer/data/gracia_singer_v2/plan-c/web-export/slice_0/';
const IFRAME_URL = LFS_BASE + 'iframe_slice_0.ply.gz';
const BUNDLE_URL = LFS_BASE + 'pframes_bundle.bin.gz';
// 小文件部署在 Pages 本地 — 非 LFS 文件走 git.woa.com raw 会被 302 到登录页
const META_URL   = 'data/slice_0/slice_meta.json';

const TOTAL_FRAMES = 300;
const SLICE_DURATION_S = 30.2;

// ============================================================
// Scene setup
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
// Default: front view, looking at singer at (0, 1.0, 0)
camera.position.set(0, 1.3, 3.0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// State
// ============================================================
let splatMesh = null;
let bundleData = null;  // parsed 4DBL v3
let currentFrame = 0;
let playing = false;
let lastFrameTime = 0;
let meta = null;
let fpsCounter = { frames: 0, lastTime: performance.now(), value: 0 };

// DOM
const overlay = document.getElementById('loading-overlay');
const loadStatus = document.getElementById('load-status');
const hudFrame = document.getElementById('hud-frame');
const hudFps = document.getElementById('hud-fps');
const scrubber = document.getElementById('scrubber');
const timeDisplay = document.getElementById('time-display');
const btnPlay = document.getElementById('btn-play');

// ============================================================
// Data loading
// ============================================================
async function loadMeta() {
  loadStatus.textContent = 'Loading metadata...';
  const resp = await fetch(META_URL);
  meta = await resp.json();
  console.log('Meta:', meta);
}

async function loadIFrame() {
  loadStatus.textContent = 'Loading I-frame PLY (21 MB)...';
  // Spark.js SplatMesh: fetch file bytes first, then construct with fileBytes
  const resp = await fetch(IFRAME_URL);
  if (!resp.ok) throw new Error(`Failed to fetch I-frame: ${resp.status} ${resp.statusText}`);
  const buf = await resp.arrayBuffer();
  loadStatus.textContent = 'Parsing gaussians...';
  await new Promise(r => setTimeout(r, 0)); // yield for UI update
  splatMesh = new SplatMesh({ fileBytes: new Uint8Array(buf) });
  // Position the singer model
  splatMesh.position.set(0, 0, 0);
  splatMesh.quaternion.set(1, 0, 0, 0);
  scene.add(splatMesh);
  console.log(`I-frame loaded: ${splatMesh.splatCount} splats`);
}

async function loadBundle() {
  loadStatus.textContent = 'Loading P-frame bundle (32 MB)...';
  const resp = await fetch(BUNDLE_URL);
  const compressed = await resp.arrayBuffer();

  // Decompress gzip
  loadStatus.textContent = 'Decompressing P-frame bundle...';
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(compressed));
  writer.close();

  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const totalLen = chunks.reduce((s, c) => s + c.byteLength, 0);
  const raw = new Uint8Array(totalLen);
  let off = 0;
  for (const c of chunks) { raw.set(c, off); off += c.byteLength; }

  bundleData = parseBundle(raw.buffer);
  console.log('Bundle loaded:', bundleData.numFrames, 'P-frames');
}

function parseBundle(buf) {
  const dv = new DataView(buf);
  let off = 0;

  // Header (28B)
  const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
  const version = dv.getUint32(4, true);
  const numFrames = dv.getUint32(8, true);
  const numGaussians = dv.getUint32(12, true);
  const attrsPerPoint = dv.getUint32(16, true);
  const quantMode = dv.getUint32(20, true);
  const targetFps = dv.getUint32(24, true);
  off = 28;

  console.log(`Bundle: ${magic} v${version}, ${numFrames} frames, ${numGaussians} gaussians`);

  // Frame Index Table (12B per frame)
  const frameIndex = [];
  for (let i = 0; i < numFrames; i++) {
    frameIndex.push({
      sourceIdx: dv.getUint32(off, true),
      byteOffset: dv.getUint32(off + 4, true),
      flags: dv.getUint32(off + 8, true),
    });
    off += 12;
  }

  // Quantization Params (56B)
  const dcMin = [dv.getFloat32(off, true), dv.getFloat32(off+4, true), dv.getFloat32(off+8, true)];
  const dcMax = [dv.getFloat32(off+12, true), dv.getFloat32(off+16, true), dv.getFloat32(off+20, true)];
  const opMin = dv.getFloat32(off+24, true);
  const opMax = dv.getFloat32(off+28, true);
  const xyzDMin = [dv.getFloat32(off+32, true), dv.getFloat32(off+36, true), dv.getFloat32(off+40, true)];
  const xyzDMax = [dv.getFloat32(off+44, true), dv.getFloat32(off+48, true), dv.getFloat32(off+52, true)];
  off += 56;

  // I-frame baseline xyz (float32, N*3)
  const baselineXyz = new Float32Array(buf, off, numGaussians * 3);
  off += numGaussians * 3 * 4;

  // I-frame baseline shs_dc quantized (uint8, N*3)
  const baselineDc = new Uint8Array(buf, off, numGaussians * 3);
  off += numGaussians * 3;

  // I-frame baseline opacity quantized (uint8, N)
  const baselineOp = new Uint8Array(buf, off, numGaussians);
  off += numGaussians;

  // Frame size: xyz(int8, N*3) + dc(int8, N*3) + op(int8, N)
  const frameSize = numGaussians * 7;

  return {
    magic, version, numFrames, numGaussians, attrsPerPoint, quantMode, targetFps,
    frameIndex, dcMin, dcMax, opMin, opMax, xyzDMin, xyzDMax,
    baselineXyz, baselineDc, baselineOp,
    frameSize, raw: new Uint8Array(buf),
  };
}

// ============================================================
// P-frame application (modify splat attributes)
// ============================================================
// Current reconstructed state for chained decoding
let reconXyz = null;    // Float32Array(N*3)
let reconDcQ = null;    // Uint8Array(N*3)
let reconOpQ = null;    // Uint8Array(N)

function initReconState() {
  if (!bundleData) return;
  const N = bundleData.numGaussians;
  reconXyz = new Float32Array(bundleData.baselineXyz);  // copy
  reconDcQ = new Uint8Array(bundleData.baselineDc);
  reconOpQ = new Uint8Array(bundleData.baselineOp);
}

function applyFrame(frameNum) {
  if (!bundleData || !splatMesh || frameNum < 1 || frameNum >= TOTAL_FRAMES) return;

  const bd = bundleData;
  const fi = frameNum - 1;  // P-frame index (frame 1 → index 0)
  const entry = bd.frameIndex[fi];
  const dataOff = entry.byteOffset;
  const N = bd.numGaussians;
  const isRefresh = entry.flags === 2;

  // Read frame data
  const xyzDelta = new Int8Array(bd.raw.buffer, dataOff, N * 3);
  const dcDelta = new Int8Array(bd.raw.buffer, dataOff + N * 3, N * 3);
  const opDelta = new Int8Array(bd.raw.buffer, dataOff + N * 6, N);

  if (isRefresh) {
    // Reset to I-frame baseline, then apply delta
    for (let i = 0; i < N * 3; i++) {
      const c = i % 3;
      const scale = (bd.xyzDMax[c] - bd.xyzDMin[c]) / 255.0;
      reconXyz[i] = bd.baselineXyz[i] + (xyzDelta[i] + 128) * scale + bd.xyzDMin[c];
    }
    for (let i = 0; i < N * 3; i++) {
      reconDcQ[i] = Math.max(0, Math.min(255, bd.baselineDc[i] + dcDelta[i]));
    }
    for (let i = 0; i < N; i++) {
      reconOpQ[i] = Math.max(0, Math.min(255, bd.baselineOp[i] + opDelta[i]));
    }
  } else {
    // Inter-frame: apply delta to previous reconstruction
    for (let i = 0; i < N * 3; i++) {
      const c = i % 3;
      const scale = (bd.xyzDMax[c] - bd.xyzDMin[c]) / 255.0;
      reconXyz[i] += (xyzDelta[i] + 128) * scale + bd.xyzDMin[c];
    }
    for (let i = 0; i < N * 3; i++) {
      reconDcQ[i] = Math.max(0, Math.min(255, reconDcQ[i] + dcDelta[i]));
    }
    for (let i = 0; i < N; i++) {
      reconOpQ[i] = Math.max(0, Math.min(255, reconOpQ[i] + opDelta[i]));
    }
  }

  // TODO: Apply reconXyz / reconDcQ / reconOpQ to splatMesh
  // Spark.js SplatMesh currently does not expose a public API to mutate individual
  // splat positions/colors/opacity after initial load. For this first version,
  // we display the I-frame statically. P-frame playback will be implemented
  // once we have a suitable mutation API or custom shader injection.
}

// ============================================================
// Timeline & Playback
// ============================================================
function frameToTime(f) {
  return (f / (TOTAL_FRAMES - 1)) * SLICE_DURATION_S;
}

function updateHud() {
  const t = frameToTime(currentFrame);
  hudFrame.textContent = `Frame ${currentFrame}/${TOTAL_FRAMES-1} · ${t.toFixed(1)}s`;
  timeDisplay.textContent = `${t.toFixed(1)}s / ${SLICE_DURATION_S}s`;
  scrubber.value = currentFrame;
}

btnPlay.addEventListener('click', () => {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸' : '▶';
  if (playing) lastFrameTime = performance.now();
});

scrubber.addEventListener('input', () => {
  currentFrame = parseInt(scrubber.value);
  // For now, just update HUD (P-frame application TODO)
  updateHud();
});

// ============================================================
// Render loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  // FPS counter
  fpsCounter.frames++;
  const now = performance.now();
  if (now - fpsCounter.lastTime > 1000) {
    fpsCounter.value = Math.round(fpsCounter.frames * 1000 / (now - fpsCounter.lastTime));
    fpsCounter.frames = 0;
    fpsCounter.lastTime = now;
    hudFps.textContent = `${fpsCounter.value} fps`;
  }

  // Advance frame if playing
  if (playing && bundleData) {
    const fps = meta?.target_fps || 10;
    if (now - lastFrameTime > 1000 / fps) {
      currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
      lastFrameTime = now;
      // applyFrame(currentFrame);  // TODO: apply when mutation API available
      updateHud();
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// Init
// ============================================================
async function init() {
  try {
    await loadMeta();
    await loadIFrame();
    overlay.classList.add('hidden');
    updateHud();
    animate();

    // Load bundle in background
    loadBundle().then(() => {
      initReconState();
      console.log('P-frame bundle ready — playback available');
      loadStatus.textContent = 'Ready';
    });
  } catch (err) {
    loadStatus.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
