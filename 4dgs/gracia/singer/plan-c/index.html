<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gracia Singer — Plan C Slice 0 (4DGS)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#111; font-family:system-ui,-apple-system,sans-serif; color:#fff; }
canvas { display:block; width:100%; height:100%; touch-action:none; }
#hud { position:fixed; top:12px; left:12px; z-index:10; pointer-events:none; }
#hud div { background:rgba(0,0,0,.6); padding:4px 10px; border-radius:6px; font-size:13px; margin-bottom:4px; backdrop-filter:blur(6px); }
#timeline-bar { position:fixed; bottom:0; left:0; right:0; height:40px; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); display:flex; align-items:center; padding:0 16px; gap:10px; z-index:10; }
#timeline-bar button { background:rgba(255,255,255,.15); border:none; color:#fff; font-size:18px; width:36px; height:28px; border-radius:6px; cursor:pointer; }
#timeline-bar button:hover { background:rgba(255,255,255,.3); }
#timeline-bar input[type=range] { flex:1; accent-color:#4af; height:4px; }
#timeline-bar .time { font-size:12px; min-width:80px; text-align:center; }
#loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity .4s; }
#loading-overlay.hidden { opacity:0; pointer-events:none; }
#loading-overlay .spinner { width:48px; height:48px; border:3px solid rgba(255,255,255,.2); border-top-color:#4af; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-overlay .status { margin-top:16px; font-size:14px; color:#aaa; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="status" id="load-status">Loading I-frame...</div>
</div>

<div id="hud">
  <div id="hud-info">Gracia Singer — Plan C Slice 0</div>
  <div id="hud-frame">Frame 0/299 · 0.0s</div>
  <div id="hud-fps"></div>
</div>

<div id="timeline-bar">
  <button id="btn-play" title="Play/Pause">▶</button>
  <input type="range" id="scrubber" min="0" max="299" value="0" step="1">
  <div class="time" id="time-display">0.0s / 30.2s</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
  "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { SplatMesh } from '@sparkjsdev/spark';
import { dyno } from '@sparkjsdev/spark';

// ============================================================
// Configuration
// ============================================================
// 大文件(LFS)走 git.woa.com raw — LFS 文件不受 302 认证影响
const LFS_BASE = 'https://git.woa.com/dyson-sphere/ai-workspace/gracia/raw/feat/serve-singer/data/gracia_singer_v2/plan-c/web-export/slice_0/';
const IFRAME_URL = LFS_BASE + 'iframe_slice_0.ply.gz';
const BUNDLE_URL = LFS_BASE + 'pframes_bundle.bin.gz';
// 小文件部署在 Pages 本地 — 非 LFS 文件走 git.woa.com raw 会被 302 到登录页
const META_URL   = 'data/slice_0/slice_meta.json';

const TOTAL_FRAMES = 300;
const SLICE_DURATION_S = 30.2;
const DELTA_K = 256;  // texture width factor for delta packing

// ============================================================
// Scene setup
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
// Default: front view, looking at singer at (0, 1.0, 0)
camera.position.set(0, 1.3, 3.0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// State
// ============================================================
let splatMesh = null;
let bundleData = null;  // parsed 4DBL v3
let currentFrame = 0;
let playing = false;
let lastFrameTime = 0;
let meta = null;
let fpsCounter = { frames: 0, lastTime: performance.now(), value: 0 };

// dyno uniforms & textures for P-frame playback
let uFrameIndex = null;
let deltaTexture = null;
let deltaSampler = null;
let deltaTexW = 0, deltaTexH = 0;

// DOM
const overlay = document.getElementById('loading-overlay');
const loadStatus = document.getElementById('load-status');
const hudFrame = document.getElementById('hud-frame');
const hudFps = document.getElementById('hud-fps');
const scrubber = document.getElementById('scrubber');
const timeDisplay = document.getElementById('time-display');
const btnPlay = document.getElementById('btn-play');

// ============================================================
// Data loading
// ============================================================
async function loadMeta() {
  loadStatus.textContent = 'Loading metadata...';
  const resp = await fetch(META_URL);
  meta = await resp.json();
  console.log('Meta:', meta);
}

async function loadIFrame() {
  loadStatus.textContent = 'Loading I-frame PLY (21 MB)...';
  // credentials: 'include' + redirect: 'follow' required for git.woa.com cross-origin auth
  const resp = await fetch(IFRAME_URL, { credentials: 'include', redirect: 'follow' });
  if (!resp.ok) throw new Error(`Failed to fetch I-frame: ${resp.status} ${resp.statusText}`);
  const compressed = await resp.arrayBuffer();

  // Decompress gzip — the file is .ply.gz so browser gets raw gzip bytes
  loadStatus.textContent = 'Decompressing I-frame PLY...';
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(compressed));
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const totalLen = chunks.reduce((s, c) => s + c.byteLength, 0);
  const plyBytes = new Uint8Array(totalLen);
  let offset = 0;
  for (const chunk of chunks) {
    plyBytes.set(chunk, offset);
    offset += chunk.byteLength;
  }
  console.log(`I-frame decompressed: ${(compressed.byteLength/1e6).toFixed(1)} MB gz → ${(totalLen/1e6).toFixed(1)} MB ply`);

  loadStatus.textContent = 'Parsing gaussians...';
  await new Promise(r => setTimeout(r, 0)); // yield for UI update
  splatMesh = new SplatMesh({ fileBytes: plyBytes, fileType: 'ply' });

  // Pre-create a placeholder delta texture so deltaSampler is valid when objectModifier is built.
  // Will be replaced with real-sized texture once bundle is loaded.
  deltaTexW = DELTA_K * 2;
  deltaTexH = 1;
  const placeholderData = new Float32Array(deltaTexW * deltaTexH * 4);
  deltaTexture = new THREE.DataTexture(placeholderData, deltaTexW, deltaTexH,
    THREE.RGBAFormat, THREE.FloatType);
  deltaTexture.needsUpdate = true;
  deltaTexture.minFilter = THREE.NearestFilter;
  deltaTexture.magFilter = THREE.NearestFilter;
  deltaTexture.generateMipmaps = false;

  // Setup dyno objectModifier for P-frame playback
  uFrameIndex = dyno.dynoInt(0);
  deltaSampler = dyno.dynoSampler2D(deltaTexture);
  splatMesh.objectModifier = dyno.dynoBlock(
    { gsplat: dyno.Gsplat }, { gsplat: dyno.Gsplat },
    ({ gsplat }) => {
      const d = new dyno.Dyno({
        inTypes: {
          gsplat: dyno.Gsplat,
          frameIdx: "int",
          deltaTex: "sampler2D",
          deltaK: "int",
        },
        outTypes: { gsplat: dyno.Gsplat },
        globals: () => [dyno.unindent(`
          void fetchDelta(sampler2D dTex, int sIdx, int K,
                          out vec3 dPos, out vec3 dDC, out float dOp) {
            int row = sIdx / K;
            int col = (sIdx - row * K) * 2;
            vec4 t0 = texelFetch(dTex, ivec2(col, row), 0);
            vec4 t1 = texelFetch(dTex, ivec2(col + 1, row), 0);
            dPos = t0.xyz;
            dDC  = vec3(t0.w, t1.xy);
            dOp  = t1.z;
          }
        `)],
        statements: ({ inputs, outputs }) => dyno.unindentLines(`
          ${outputs.gsplat} = ${inputs.gsplat};
          if (${inputs.frameIdx} > 0) {
            int sIdx = ${inputs.gsplat}.index;
            vec3 dp; vec3 ddc; float dop;
            fetchDelta(${inputs.deltaTex}, sIdx, ${inputs.deltaK}, dp, ddc, dop);
            float SH_C0 = 0.28209479177;
            ${outputs.gsplat}.center = dp;
            ${outputs.gsplat}.rgba.rgb = SH_C0 * ddc + 0.5;
            ${outputs.gsplat}.rgba.a = dop;
          }
        `)
      });
      gsplat = d.apply({
        gsplat,
        frameIdx: uFrameIndex,
        deltaTex: deltaSampler,
        deltaK: dyno.dynoInt(DELTA_K),
      }).gsplat;
      return { gsplat };
    }
  );

  // 4DGS uses COLMAP/OpenCV coords (Y-down), Three.js uses OpenGL (Y-up)
  // Rotate 180° around X-axis to flip Y: quaternion (w=0, x=1, y=0, z=0)
  splatMesh.position.set(0, 0, 0);
  splatMesh.quaternion.set(0, 1, 0, 0);
  scene.add(splatMesh);
  console.log(`I-frame loaded: ${splatMesh.splatCount} splats`);
}

async function loadBundle() {
  loadStatus.textContent = 'Loading P-frame bundle (32 MB)...';
  const resp = await fetch(BUNDLE_URL, { credentials: 'include', redirect: 'follow' });
  const compressed = await resp.arrayBuffer();

  // Decompress gzip
  loadStatus.textContent = 'Decompressing P-frame bundle...';
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(compressed));
  writer.close();

  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const totalLen = chunks.reduce((s, c) => s + c.byteLength, 0);
  const raw = new Uint8Array(totalLen);
  let off = 0;
  for (const c of chunks) { raw.set(c, off); off += c.byteLength; }

  bundleData = parseBundle(raw.buffer);
  console.log('Bundle loaded:', bundleData.numFrames, 'P-frames');
}

function parseBundle(buf) {
  const dv = new DataView(buf);
  let off = 0;

  // Header (28B)
  const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
  const version = dv.getUint32(4, true);
  const numFrames = dv.getUint32(8, true);
  const numGaussians = dv.getUint32(12, true);
  const attrsPerPoint = dv.getUint32(16, true);
  const quantMode = dv.getUint32(20, true);
  const targetFps = dv.getUint32(24, true);
  off = 28;

  console.log(`Bundle: ${magic} v${version}, ${numFrames} frames, ${numGaussians} gaussians`);

  // Frame Index Table (12B per frame)
  const frameIndex = [];
  for (let i = 0; i < numFrames; i++) {
    frameIndex.push({
      sourceIdx: dv.getUint32(off, true),
      byteOffset: dv.getUint32(off + 4, true),
      flags: dv.getUint32(off + 8, true),
    });
    off += 12;
  }

  // Quantization Params (56B)
  const dcMin = [dv.getFloat32(off, true), dv.getFloat32(off+4, true), dv.getFloat32(off+8, true)];
  const dcMax = [dv.getFloat32(off+12, true), dv.getFloat32(off+16, true), dv.getFloat32(off+20, true)];
  const opMin = dv.getFloat32(off+24, true);
  const opMax = dv.getFloat32(off+28, true);
  const xyzDMin = [dv.getFloat32(off+32, true), dv.getFloat32(off+36, true), dv.getFloat32(off+40, true)];
  const xyzDMax = [dv.getFloat32(off+44, true), dv.getFloat32(off+48, true), dv.getFloat32(off+52, true)];
  off += 56;

  // I-frame baseline xyz (float32, N*3)
  const baselineXyz = new Float32Array(buf, off, numGaussians * 3);
  off += numGaussians * 3 * 4;

  // I-frame baseline shs_dc quantized (uint8, N*3)
  const baselineDc = new Uint8Array(buf, off, numGaussians * 3);
  off += numGaussians * 3;

  // I-frame baseline opacity quantized (uint8, N)
  const baselineOp = new Uint8Array(buf, off, numGaussians);
  off += numGaussians;

  // Frame size: xyz(int8, N*3) + dc(int8, N*3) + op(int8, N)
  const frameSize = numGaussians * 7;

  return {
    magic, version, numFrames, numGaussians, attrsPerPoint, quantMode, targetFps,
    frameIndex, dcMin, dcMax, opMin, opMax, xyzDMin, xyzDMax,
    baselineXyz, baselineDc, baselineOp,
    frameSize, raw: new Uint8Array(buf),
  };
}

// ============================================================
// P-frame application (modify splat attributes)
// ============================================================
// Current reconstructed state for chained decoding
let reconXyz = null;    // Float32Array(N*3)
let reconDcQ = null;    // Uint8Array(N*3)
let reconOpQ = null;    // Uint8Array(N)

function createDeltaTexture(N) {
  deltaTexW = DELTA_K * 2;  // 2 texels per gaussian (RGBA each)
  deltaTexH = Math.ceil(N / DELTA_K);
  const texData = new Float32Array(deltaTexW * deltaTexH * 4);
  const tex = new THREE.DataTexture(texData, deltaTexW, deltaTexH,
    THREE.RGBAFormat, THREE.FloatType);
  tex.needsUpdate = true;
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  console.log(`Delta texture: ${deltaTexW}×${deltaTexH}`);
  return tex;
}

function initReconState() {
  if (!bundleData) return;
  const N = bundleData.numGaussians;
  reconXyz = new Float32Array(bundleData.baselineXyz);  // copy
  reconDcQ = new Uint8Array(bundleData.baselineDc);
  reconOpQ = new Uint8Array(bundleData.baselineOp);

  // Recreate delta texture with correct size for N gaussians
  // (replaces placeholder created during loadIFrame)
  deltaTexW = DELTA_K * 2;
  deltaTexH = Math.ceil(N / DELTA_K);
  const texData = new Float32Array(deltaTexW * deltaTexH * 4);
  deltaTexture = new THREE.DataTexture(texData, deltaTexW, deltaTexH,
    THREE.RGBAFormat, THREE.FloatType);
  deltaTexture.needsUpdate = true;
  deltaTexture.minFilter = THREE.NearestFilter;
  deltaTexture.magFilter = THREE.NearestFilter;
  deltaTexture.generateMipmaps = false;
  // Update the sampler to reference the new texture
  deltaSampler.value = deltaTexture;
  console.log(`Delta texture ready: ${deltaTexW}×${deltaTexH} for ${N} gaussians`);
}

function uploadFrameToTexture() {
  // Write reconXyz / reconDcQ / reconOpQ into delta texture
  // Layout: 2 texels per gaussian, RGBA Float32
  // texel 0: (x, y, z, dc_r)  texel 1: (dc_g, dc_b, op, 0)
  const N = bundleData.numGaussians;
  const bd = bundleData;
  const data = deltaTexture.image.data; // Float32Array

  // Dequantize DC: uint8 → float via dc_min/dc_max linear map
  // Then convert to SH coefficient space: dc_float = dc_min + (q/255)*(dc_max-dc_min)
  // Opacity: op_float = op_min + (q/255)*(op_max-op_min)
  const dcScale = [
    (bd.dcMax[0] - bd.dcMin[0]) / 255.0,
    (bd.dcMax[1] - bd.dcMin[1]) / 255.0,
    (bd.dcMax[2] - bd.dcMin[2]) / 255.0,
  ];
  const opScale = (bd.opMax - bd.opMin) / 255.0;

  for (let i = 0; i < N; i++) {
    const t0 = i * 2 * 4;  // texel 0 base (4 floats per texel)
    const t1 = t0 + 4;     // texel 1 base
    // xyz: absolute position
    data[t0]     = reconXyz[i * 3];
    data[t0 + 1] = reconXyz[i * 3 + 1];
    data[t0 + 2] = reconXyz[i * 3 + 2];
    // dc_r
    data[t0 + 3] = bd.dcMin[0] + reconDcQ[i * 3] * dcScale[0];
    // dc_g, dc_b
    data[t1]     = bd.dcMin[1] + reconDcQ[i * 3 + 1] * dcScale[1];
    data[t1 + 1] = bd.dcMin[2] + reconDcQ[i * 3 + 2] * dcScale[2];
    // opacity (already in activation space from training)
    data[t1 + 2] = bd.opMin + reconOpQ[i] * opScale;
    data[t1 + 3] = 0;
  }

  // Upload to GPU
  const gl = renderer.getContext();
  const texProps = renderer.properties.get(deltaTexture);
  if (texProps.__webglTexture) {
    gl.bindTexture(gl.TEXTURE_2D, texProps.__webglTexture);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, deltaTexW, deltaTexH,
      gl.RGBA, gl.FLOAT, data);
  } else {
    deltaTexture.needsUpdate = true;
  }
}

function applyFrame(frameNum) {
  if (!bundleData || !splatMesh) return;

  // Frame 0 = I-frame (no delta)
  if (frameNum === 0) {
    uFrameIndex.value = 0;
    return;
  }

  if (frameNum < 1 || frameNum >= TOTAL_FRAMES) return;

  const bd = bundleData;
  const fi = frameNum - 1;  // P-frame index (frame 1 → index 0)
  const entry = bd.frameIndex[fi];
  const dataOff = entry.byteOffset;
  const N = bd.numGaussians;
  const isRefresh = entry.flags === 2;

  // Read frame data
  const xyzDelta = new Int8Array(bd.raw.buffer, dataOff, N * 3);
  const dcDelta = new Int8Array(bd.raw.buffer, dataOff + N * 3, N * 3);
  const opDelta = new Int8Array(bd.raw.buffer, dataOff + N * 6, N);

  if (isRefresh) {
    for (let i = 0; i < N * 3; i++) {
      const c = i % 3;
      const scale = (bd.xyzDMax[c] - bd.xyzDMin[c]) / 255.0;
      reconXyz[i] = bd.baselineXyz[i] + (xyzDelta[i] + 128) * scale + bd.xyzDMin[c];
    }
    for (let i = 0; i < N * 3; i++) {
      reconDcQ[i] = Math.max(0, Math.min(255, bd.baselineDc[i] + dcDelta[i]));
    }
    for (let i = 0; i < N; i++) {
      reconOpQ[i] = Math.max(0, Math.min(255, bd.baselineOp[i] + opDelta[i]));
    }
  } else {
    for (let i = 0; i < N * 3; i++) {
      const c = i % 3;
      const scale = (bd.xyzDMax[c] - bd.xyzDMin[c]) / 255.0;
      reconXyz[i] += (xyzDelta[i] + 128) * scale + bd.xyzDMin[c];
    }
    for (let i = 0; i < N * 3; i++) {
      reconDcQ[i] = Math.max(0, Math.min(255, reconDcQ[i] + dcDelta[i]));
    }
    for (let i = 0; i < N; i++) {
      reconOpQ[i] = Math.max(0, Math.min(255, reconOpQ[i] + opDelta[i]));
    }
  }

  // Upload decoded frame to GPU texture
  uploadFrameToTexture();
  uFrameIndex.value = frameNum;
}

// Seek to arbitrary frame (must replay from nearest refresh/I-frame)
function seekToFrame(targetFrame) {
  if (!bundleData || !reconXyz) return;
  if (targetFrame === 0) {
    // Reset recon state to I-frame baseline
    reconXyz.set(bundleData.baselineXyz);
    reconDcQ.set(bundleData.baselineDc);
    reconOpQ.set(bundleData.baselineOp);
    uFrameIndex.value = 0;
    return;
  }
  // Find nearest refresh frame before targetFrame
  let startFrame = 0;
  for (let f = targetFrame; f >= 1; f--) {
    if (bundleData.frameIndex[f - 1].flags === 2) {
      startFrame = f;
      break;
    }
  }
  if (startFrame === 0) {
    // Reset to I-frame baseline first
    reconXyz.set(bundleData.baselineXyz);
    reconDcQ.set(bundleData.baselineDc);
    reconOpQ.set(bundleData.baselineOp);
  }
  // Replay from startFrame (or 1) to targetFrame
  const from = startFrame === 0 ? 1 : startFrame;
  for (let f = from; f <= targetFrame; f++) {
    applyFrame(f);
  }
}

// ============================================================
// Timeline & Playback
// ============================================================
function frameToTime(f) {
  return (f / (TOTAL_FRAMES - 1)) * SLICE_DURATION_S;
}

function updateHud() {
  const t = frameToTime(currentFrame);
  hudFrame.textContent = `Frame ${currentFrame}/${TOTAL_FRAMES-1} · ${t.toFixed(1)}s`;
  timeDisplay.textContent = `${t.toFixed(1)}s / ${SLICE_DURATION_S}s`;
  scrubber.value = currentFrame;
}

btnPlay.addEventListener('click', () => {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸' : '▶';
  if (playing) lastFrameTime = performance.now();
});

scrubber.addEventListener('input', () => {
  currentFrame = parseInt(scrubber.value);
  if (bundleData && reconXyz) {
    seekToFrame(currentFrame);
  }
  updateHud();
});

// ============================================================
// Render loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  // FPS counter
  fpsCounter.frames++;
  const now = performance.now();
  if (now - fpsCounter.lastTime > 1000) {
    fpsCounter.value = Math.round(fpsCounter.frames * 1000 / (now - fpsCounter.lastTime));
    fpsCounter.frames = 0;
    fpsCounter.lastTime = now;
    hudFps.textContent = `${fpsCounter.value} fps`;
  }

  // Advance frame if playing
  if (playing && bundleData && reconXyz) {
    const fps = meta?.target_fps || 10;
    if (now - lastFrameTime > 1000 / fps) {
      currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
      if (currentFrame === 0) {
        // Loop back: reset recon state
        reconXyz.set(bundleData.baselineXyz);
        reconDcQ.set(bundleData.baselineDc);
        reconOpQ.set(bundleData.baselineOp);
        uFrameIndex.value = 0;
      } else {
        applyFrame(currentFrame);
      }
      lastFrameTime = now;
      updateHud();
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// Init
// ============================================================
async function init() {
  try {
    await loadMeta();
    await loadIFrame();
    overlay.classList.add('hidden');
    updateHud();
    animate();

    // Load bundle in background
    loadBundle().then(() => {
      initReconState();
      console.log('P-frame bundle ready — playback available');
      loadStatus.textContent = 'Ready';
    });
  } catch (err) {
    loadStatus.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
