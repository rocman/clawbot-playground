<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>3D Gaussian Splatting (3DGS) 最新进展报告 2025</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --accent: #06b6d4;
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #334155;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 40%, #0c1a3a 100%);
    border-bottom: 1px solid #312e81;
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(79,70,229,0.15) 0%, transparent 60%),
                radial-gradient(circle at 70% 50%, rgba(6,182,212,0.1) 0%, transparent 60%);
    animation: pulse 8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .header-content { position: relative; z-index: 1; }
  .header-badge {
    display: inline-block;
    background: rgba(79,70,229,0.3);
    border: 1px solid var(--primary);
    color: var(--primary-light);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;

  .header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--primary-light) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .header p {
    font-size: 1.1rem;
    color: var(--text-muted);
    max-width: 700px;
    margin: 0 auto 24px;
  }
  .header-meta {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }
  .header-meta span {
    color: var(--text-muted);
    font-size: 14px;
  }
  .header-meta strong { color: var(--accent); }

  /* Nav */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav ul {
    list-style: none;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .nav ul li a {
    display: block;
    padding: 16px 20px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav ul li a:hover {
    color: var(--text);
    border-bottom-color: var(--primary);
  }

  /* Main layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  /* Section */
  .section {
    margin-bottom: 60px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .icon-blue { background: rgba(79,70,229,0.2); }
  .icon-cyan { background: rgba(6,182,212,0.2); }
  .icon-green { background: rgba(34,197,94,0.2); }
  .icon-yellow { background: rgba(234,179,8,0.2); }
  .icon-purple { background: rgba(168,85,247,0.2); }
  .icon-red { background: rgba(239,68,68,0.2); }

  .section-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }
  .section-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .section-num {
    margin-left: auto;
    background: var(--bg3);
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Cards */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: var(--primary);
    box-shadow: var(--card-shadow);
  }

  /* Tech Cards Grid */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .tech-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.2s;
  }
  .tech-card:hover {
    border-color: var(--primary-light);
    transform: translateY(-2px);
    box-shadow: var(--card-shadow);
  }
  .tech-card-icon {
    font-size: 28px;
    margin-bottom: 12px;
  }
  .tech-card h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }
  .tech-card p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .tech-tag {
    display: inline-block;
    background: rgba(79,70,229,0.15);
    color: var(--primary-light);
    border: 1px solid rgba(79,70,229,0.3);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    margin-top: 12px;
    margin-right: 6px;
  }

  /* App Cards */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .app-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .app-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(6,182,212,0.15);
  }
  .app-card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-weight: 600;
    font-size: 15px;
  }
  .app-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-blue { background: rgba(79,70,229,0.15); color: var(--primary-light); border: 1px solid rgba(79,70,229,0.3); }
  .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
  .badge-cyan { background: rgba(6,182,212,0.15); color: var(--accent); border: 1px solid rgba(6,182,212,0.3); }

  /* Paper Cards */
  .paper-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    position: relative;

  .paper-card:hover {
    border-color: var(--primary-light);
    box-shadow: 0 4px 20px rgba(79,70,229,0.15);
  }
  .paper-num {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 28px;
    height: 28px;
    background: rgba(79,70,229,0.2);
    color: var(--primary-light);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .paper-content { padding-left: 40px; }
  .paper-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .paper-title a {
    color: inherit;
    text-decoration: none;
  }
  .paper-title a:hover {
    color: var(--primary-light);
  }
  .paper-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .paper-authors { font-size: 13px; color: var(--accent); }
  .paper-date { font-size: 12px; color: var(--text-muted); }
  .paper-abstract {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;

  .paper-abstract.expanded {
    max-height: 400px;
    opacity: 1;
    margin-top: 12px;
  }
  .paper-tags { margin-top: 10px; }

  /* Tool Cards */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;

    border-color: var(--green);

  .tool-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;

  }
  .tool-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .tool-lang {
    font-size: 11px;
    background: var(--bg3);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 8px;
  }

  /* Industry */
  .industry-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .industry-card h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .industry-card p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .industry-card ul {
    list-style: none;
    margin-top: 12px;
  }
  .industry-card ul li {
    font-size: 14px;
    color: var(--text-muted);

  /* Summary boxes */
  .summary-box {
    background: rgba(79,70,229,0.08);
    border: 1px solid rgba(79,70,229,0.25);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 30px;
  }
  .summary-box h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary-light);
    margin-bottom: 16px;
  }
  .summary-box p {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item {
    position: relative;
    padding-bottom: 28px;
  }
  .timeline-dot {
    position: absolute;
    left: -26px;
    top: 4px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
  }
  .timeline-date {
    font-size: 12px;
    color: var(--primary-light);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .timeline-content h4 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .timeline-content p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Footer */
  .footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 32px 40px;
    text-align: center;
    color: var(--text-muted);

  }
  .footer a { color: var(--primary-light); text-decoration: none; }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 40px 20px 32px; }
    .header h1 { font-size: 1.8rem; }
    .container { padding: 24px 16px 60px; }
    .nav { padding: 0 16px; }
    .tech-grid, .app-grid, .tool-grid, .stats-row { grid-template-columns: 1fr; }
    .header-meta { gap: 12px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
/* 交互样式 */
  .paper-title {
    cursor: pointer;
    transition: color 0.2s;
  }
  .paper-title:hover {
    color: var(--accent);
  }
  .paper-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .paper-toggle:hover {
    background: var(--bg3);
    color: var(--accent);
    border-color: var(--accent);
  }
  .paper-toggle .toggle-icon {
    font-size: 11px;
    transition: transform 0.2s;
  }
  .paper-toggle.expanded .toggle-icon {
    transform: rotate(90deg);
  }
  .paper-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .paper-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .paper-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
  }
</head>

<!-- Main Content -->
<div class="container">

  <!-- Overview Section -->
  <div id="overview" class="section">
    <div class="summary-box">
      <h2>🌐 技术背景与现状概述</h2>
      <p>
        3D Gaussian Splatting（3DGS）由 Kerbl 等人于 2023 年 SIGGRAPH 首次提出，通过使用数百万个三维高斯椭球来显式表示场景，结合可微分的 tile 光栅化渲染，实现了前所未有的实时高质量新视角合成。相比 NeRF，3DGS 训练速度提升 10-100 倍，渲染速度可达 100+ FPS，于是迅速席卷了计算机视觉、计算机图形学和机器人等领域。
      </p>
      <p style="margin-top:12px;">
        进入 2025 年，3DGS 研究呈现爆炸式增长态势：每周 ArXiv 新增数十篇相关论文，研究方向从最初的新视角合成，已拓展到动态场景重建、医疗影像、自动驾驶、机器人操作、数字人、卫星遥感等多个垂直领域。开源生态日臻完善，工业界也开始大规模落地应用。
      </p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">30+</div>
        <div class="stat-label">本报告收录论文</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">100+</div>
        <div class="stat-label">FPS 实时渲染速度</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">10x</div>
        <div class="stat-label">训练速度较 NeRF 提升</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">2025</div>
        <div class="stat-label">CVPR 大量收录 3DGS 论文</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">20+</div>
        <div class="stat-label">活跃开源实现项目</div>
      </div>
    </div>
  </div>

  <!-- Tech Advances Section -->
  <div id="tech" class="section">
    <div class="section-header">
      <div class="section-icon icon-blue">⚡</div>
      <div>
        <div class="section-title">技术进展</div>
        <div class="section-subtitle">算法改进 · 压缩加速 · 质量提升</div>
      </div>
      <div class="section-num">6 个方向</div>
    </div>

    <div class="tech-grid">
      <div class="tech-card">
        <div class="tech-card-icon">📱</div>
        <h3>移动端实时渲染</h3>
        <p>Mobile-GS（2026-03）提出专为移动设备优化的实时高斯溅射方法，解决了原始 3DGS 高计算量与大存储开销在移动端部署的核心瓶颈。通过轻量化高斯表示与自适应分辨率策略，在手机 GPU 上实现了高质量实时渲染。</p>
        <span class="tech-tag">移动端</span>
        <span class="tech-tag">实时渲染</span>
        <span class="tech-tag">轻量化</span>
      </div>

      <div class="tech-card">
        <div class="tech-card-icon">🗜️</div>
        <h3>渐进式压缩编码</h3>
        <p>ProGS（2026-03）首次提出面向 3DGS 数据的渐进式压缩编码框架。GSStream 则构建了基于 3DGS 的体积场景流式传输系统，解决了 3DGS 数据量大、难以实时传输的问题，为 XR 远程渲染奠定基础。</p>
        <span class="tech-tag">数据压缩</span>
        <span class="tech-tag">流式传输</span>
        <span class="tech-tag">带宽优化</span>
      </div>

      <div class="tech-card">
        <div class="tech-card-icon">🎬</div>
        <h3>动态场景 4D 重建</h3>
        <p>Mango-GS（2026-03）引入多帧节点引导的 4D 高斯溅射框架，显著提升动态场景重建的时空一致性。ReconDrive（2026-03）则专为自动驾驶场景设计了快速前向 4DGS 重建管线，无需耗时的每场景优化。</p>
        <span class="tech-tag">4D-GS</span>

<script>
  // 折叠/展开摘要
  document.addEventListener('DOMContentLoaded', () => {
    const paperCards = document.querySelectorAll('.paper-card');
    paperCards.forEach(card => {
      const title = card.querySelector('.paper-title');
      const abstract = card.querySelector('.paper-abstract');
      const tags = card.querySelector('.paper-tags');

      // 插入控制区
      const controlBar = document.createElement('div');
      controlBar.className = 'paper-actions';

      // 切换按钮
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'paper-toggle';
      toggleBtn.innerHTML = `📄 <span class="toggle-icon">▸</span> 展开摘要`;
      toggleBtn.onclick = () => {
        abstract.classList.toggle('expanded');
        toggleBtn.classList.toggle('expanded');
        toggleBtn.innerHTML = `📄 <span class="toggle-icon">▸</span> ` + 
          (abstract.classList.contains('expanded') ? '收起摘要' : '展开摘要');
      };

      // 搜索按钮（获取更多详情）
      const detailBtn = document.createElement('a');
      detailBtn.className = 'paper-btn info';
      const paperLink = card.querySelector('.paper-title a');
      detailBtn.href = paperLink ? paperLink.href : '#';
      detailBtn.target = '_blank';
      detailBtn.innerHTML = `🌐 查看详情`;
      detailBtn.title = '在新标签页打开论文页面';
      
      // GitHub 搜索按钮
      const githubBtn = document.createElement('button');
      githubBtn.className = 'paper-btn github';
      githubBtn.innerHTML = `🔍 代码/引用`;
      githubBtn.title = '搜索相关代码或引用';
      githubBtn.onclick = () => {
        const titleEl = card.querySelector('.paper-title');
        const titleText = titleEl.innerText.replace(/\[.*\]/g, '').trim();
        const searchUrl = `https://github.com/search?q=${encodeURIComponent(titleText)}&type=repositories`;
        window.open(searchUrl, '_blank');
      };

      controlBar.appendChild(toggleBtn);
      controlBar.appendChild(detailBtn);
      controlBar.appendChild(githubBtn);
      
      // 插入到 tags 后面
      tags.parentNode.insertBefore(controlBar, tags.nextSibling);
    });
  });
</script>
